<!DOCTYPE html>
<html lang="ko">
<head>
<base target="_top">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>인사 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  * { box-sizing: border-box; }
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');

  :root {
    --navy: #1a2b42;
    --navy-light: #2c4260;
    --accent: #3b82c4;
    --accent-soft: #eaf2fa;
    --bg: #f0f2f5;
    --card: #ffffff;
    --text: #1f2937;
    --text-mute: #8b95a1;
    --border: #e8eaee;
    --danger: #d64545;
    --success: #2a9d6f;
    --radius: 14px;
  }

  body {
    font-family: 'Pretendard', -apple-system, sans-serif;
    margin: 0;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  header {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
    color: white;
    padding: 16px 28px;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    flex-wrap: wrap;
    gap: 6px;
  }
  header h1 { margin: 0; font-size: 19px; font-weight: 700; letter-spacing: -0.2px; display: flex; align-items: center; gap: 8px; white-space: nowrap; }
  header .side { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); display: flex; align-items: center; gap: 10px; }
  header .updated { font-size: 11.5px; color: rgba(255,255,255,0.55); }

  nav {
    display: flex;
    justify-content: center;
    background: white;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    position: sticky;
    top: 0;
    z-index: 10;
    padding: 10px 16px;
    gap: 6px;
    scroll-padding-inline: 16px;
  }
  nav button {
    flex: none;
    padding: 9px 18px;
    border: none;
    background: transparent;
    cursor: pointer;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--text-mute);
    border-radius: 999px;
    white-space: nowrap;
    transition: all .15s ease;
  }
  nav button:hover { background: var(--bg); color: var(--text); }
  nav button.active { color: white; background: var(--navy); box-shadow: 0 2px 8px rgba(26,43,66,0.3); }
  nav button.retire-tab { color: var(--danger); }
  nav button.retire-tab.active { background: var(--danger); color: white; }

  .container { padding: 24px 20px 60px; max-width: 1080px; margin: 0 auto; }
  .section { display: none; }
  .section.active { display: block; animation: fadeIn .25s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 22px 24px;
    margin-bottom: 18px;
    box-shadow: 0 1px 2px rgba(20,30,45,0.04), 0 8px 20px -12px rgba(20,30,45,0.10);
    border: 1px solid var(--border);
  }
  .card h3 {
    margin: 0 0 16px;
    font-size: 14.5px;
    color: var(--navy);
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card h3::before {
    content: '';
    width: 4px; height: 14px;
    background: var(--accent);
    border-radius: 2px;
    display: inline-block;
  }
  .card.retire-card h3::before { background: var(--danger); }
  .card h4.sub {
    margin: 0 0 12px;
    font-size: 12.5px;
    color: var(--accent);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .3px;
  }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  @media (max-width: 700px) { .grid2 { grid-template-columns: 1fr; } }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    padding: 10px 12px;
    text-align: left;
    background: var(--accent-soft);
    color: var(--navy);
    font-weight: 700;
    font-size: 12px;
    letter-spacing: .2px;
  }
  thead th:first-child { border-radius: 8px 0 0 8px; }
  thead th:last-child { border-radius: 0 8px 8px 0; }
  tbody td { padding: 10px 12px; border-bottom: 1px solid var(--border); color: var(--text); }
  tbody tr:nth-child(even) { background: #fafbfc; }
  tbody tr:hover { background: var(--accent-soft); }
  tbody tr:last-child td { border-bottom: none; }
  tr.clickable-row { cursor: pointer; }
  tr.clickable-row:hover td:first-child { color: var(--accent); font-weight: 600; }

  .stat-row { display: flex; gap: 14px; flex-wrap: wrap; }
  .stat-box {
    flex: 1; min-width: 130px;
    background: linear-gradient(135deg, var(--accent-soft), #ffffff);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 14px;
    text-align: center;
  }
  .stat-box .num { font-size: 26px; font-weight: 800; color: var(--navy); letter-spacing: -0.5px; }
  .stat-box .label { font-size: 12px; color: var(--text-mute); margin-top: 3px; font-weight: 600; }
  .stat-box.clickable { cursor: pointer; transition: transform .12s ease, box-shadow .12s ease; }
  .stat-box.clickable:hover { transform: translateY(-2px); box-shadow: 0 8px 18px -8px rgba(20,30,45,0.18); }
  .stat-box.clickable .label::after { content: ' →'; opacity: .5; }
  .stat-box.retire-box { background: linear-gradient(135deg, #fdecec, #ffffff); }
  .stat-box.retire-box .num { color: var(--danger); }

  .hint { font-size: 11.5px; color: var(--text-mute); margin: -4px 0 12px; }

  #map { width: 100%; height: 480px; border-radius: 10px; overflow: hidden; }
  .badge-retired { color: var(--danger); font-weight: 600; }
  .badge-active { color: var(--success); font-weight: 600; }

  .loading, .error { text-align: center; padding: 80px 20px; color: var(--text-mute); font-size: 14px; }
  .error { color: var(--danger); }

  #refreshBtn {
    background: rgba(255,255,255,0.14);
    color: white;
    border: 1px solid rgba(255,255,255,0.22);
    padding: 7px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    transition: background .15s;
    white-space: nowrap;
  }
  #refreshBtn:hover { background: rgba(255,255,255,0.24); }

  /* 검색 */
  .search-bar {
    background: white;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: center;
    position: relative;
  }
  .search-bar input {
    width: 100%; max-width: 420px;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
    transition: border-color .15s;
  }
  .search-bar input:focus { outline: none; border-color: var(--accent); }
  #searchResults {
    position: absolute;
    top: 56px;
    left: 50%;
    transform: translateX(-50%);
    background: white; border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 12px 28px -8px rgba(20,30,45,0.18);
    max-width: 420px; width: 90%;
    max-height: 400px; overflow-y: auto; z-index: 20; display: none;
  }
  #searchResults.show { display: block; }
  .search-item { padding: 11px 16px; border-bottom: 1px solid #f2f3f5; cursor: pointer; font-size: 13.5px; }
  .search-item:hover { background: var(--accent-soft); }
  .emp-detail { padding: 20px; }
  .emp-detail h3 { border-bottom: none !important; }
  .emp-detail .row { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid #f4f5f6; font-size: 13.5px; gap: 12px; }
  .emp-detail .row span:first-child { color: var(--text-mute); font-weight: 600; white-space: nowrap; }
  .emp-detail .row span:last-child { text-align: right; }

  .chart-box { position: relative; }
  .chart-hint { font-size: 11.5px; color: var(--text-mute); margin: -8px 0 12px; }

  /* 모바일 대응 */
  @media (max-width: 480px) {
    header { padding: 12px 16px; }
    header h1 { font-size: 15.5px; }
    header .side { position: static; transform: none; }
    #refreshBtn { padding: 6px 10px; font-size: 11px; }
    header .updated { font-size: 10px; }
    nav { padding: 8px 10px; justify-content: flex-start; }
    nav button { padding: 8px 14px; font-size: 12.5px; }
    .container { padding: 16px 12px 50px; }
    .card { padding: 16px 16px; }
    .search-bar { padding: 10px 12px; }
  }
</style>
</head>
<body>
<header>
  <h1>📊 인사 대시보드</h1>
  <div class="side">
    <span class="updated" id="updatedAt"></span>
    <button id="refreshBtn" onclick="loadData(true)">새로고침</button>
  </div>
</header>
<nav id="tabNav"></nav>
<div class="search-bar">
  <input type="text" id="searchInput" placeholder="🔍 이름으로 검색 (예: 홍길동)" />
  <div id="searchResults"></div>
</div>
<div class="container" id="container">
  <div class="loading">데이터 불러오는 중...</div>
</div>

<script>
  // ════════════════════════════════════════════
  //  설정: Apps Script 웹앱 배포 후 나온 /exec URL로 교체하세요
  // ════════════════════════════════════════════
  const EXEC_URL = 'https://script.google.com/macros/s/AKfycbzRogAmZmfPd-84iJRo0Xi8ChA0FGa8fmY9_8B41-LpMPJM9AxVBtczP8UJBui9cCni/exec';

  // 재직자 중심 탭 + 퇴사자 분석은 별도 탭으로 분리
  const TABS = [
    { id: 'overview', label: '개요' },
    { id: 'dept', label: '재직 현황' },
    { id: 'age', label: '연령/생일' },
    { id: 'hire', label: '입사경로' },
    { id: 'license', label: '자격증' },
    { id: 'map', label: '거주지 지도' },
    { id: 'retire', label: '퇴사자 분석', retireTab: true }
  ];

  let DATA = null;
  let charts = [];
  let mapLoaded = false;
  let mapInstance = null;
  let mapMarkers = []; // { name, marker, info }
  let mapClusterer = null;
  let shuttleRouteData = [];
  let shuttlePolylines = [];
  let shuttleOverlays = [];
  let shuttleVisible = false;
  let shuttleLoaded = false;
  let shuttleWarning = '';

  // ── 탭 네비게이션 ──────────────────────────
  function renderNav() {
    const nav = document.getElementById('tabNav');
    nav.innerHTML = TABS.map((t, i) =>
      `<button data-tab="${t.id}" class="${i === 0 ? 'active' : ''}${t.retireTab ? ' retire-tab' : ''}">${t.label}</button>`
    ).join('');
    nav.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => showTab(btn.dataset.tab));
    });
  }

  function showTab(id) {
    document.querySelectorAll('nav button').forEach(b => b.classList.toggle('active', b.dataset.tab === id));
    document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.id === 'sec-' + id));
    const activeBtn = document.querySelector(`nav button[data-tab="${id}"]`);
    if (activeBtn) activeBtn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    if (id === 'map') loadMap();
  }

  // ── 표 렌더링 헬퍼 ─────────────────────────
  function table(headers, rows) {
    return `<table><thead><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>
      <tbody>${rows.map(r => `<tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
  }

  function clickableTable(headers, rows, attrName) {
    return `<table><thead><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>
      <tbody>${rows.map(r =>
        `<tr class="clickable-row" data-${attrName}="${r.key}">${r.cells.map(c => `<td>${c}</td>`).join('')}</tr>`
      ).join('')}</tbody></table>`;
  }

  // 부서 클릭 표: mode='active'면 재직자만, mode='retired'면 퇴사자만 모달에 표시
  function clickableDeptTable(headers, rows, mode) {
    return `<table><thead><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>
      <tbody>${rows.map(r =>
        `<tr class="clickable-row" data-deptkey="${r.key}" data-deptmode="${mode}">${r.cells.map(c => `<td>${c}</td>`).join('')}</tr>`
      ).join('')}</tbody></table>`;
  }

  // "라벨 (값)" 형태의 알약 배지. danger=true면 퇴사 계열 색상.
  function statPill(text, danger) {
    return `<span style="display:inline-block;background:${danger ? '#fdecec' : 'var(--accent-soft)'};color:${danger ? 'var(--danger)' : 'var(--navy)'};padding:5px 12px;border-radius:999px;font-size:12px;font-weight:700;white-space:nowrap;">${text}</span>`;
  }
  function statPillRow(pillsHtml) {
    return `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;">${pillsHtml}</div>`;
  }

  // 필터 기반 클릭 가능 표: rows = [{ filter: {...}, title: '모달 제목', cells: [...] }]
  function clickableTableFilter(headers, rows) {
    return `<table><thead><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>
      <tbody>${rows.map(r =>
        `<tr class="clickable-row" data-filter="${encodeURIComponent(JSON.stringify(r.filter))}" data-filtertitle="${(r.title || '상세 목록').replace(/"/g, '&quot;')}">${r.cells.map(c => `<td>${c}</td>`).join('')}</tr>`
      ).join('')}</tbody></table>`;
  }

  // ── 필터 적용 (employees 배열에서 조건에 맞는 사람 추출) ──
  // 재직자 기준 통계(입사경로, 추천/일반, 경력구간)는 재직자만 매칭하고,
  // 퇴사율 기준 통계(*Retire, cross, tenureBucket)는 재직+퇴사 모두 매칭해서
  // 표에 나온 숫자와 모달에 나오는 명단 인원이 항상 일치하도록 함.
  function applyFilter(filter) {
    if (!DATA) return [];
    return DATA.employees.filter(e => {
      switch (filter.type) {
        case 'joinReason': // 입사경로 탭 (재직자 기준)
          return e.joinReason === filter.joinReason && e.jobType === filter.jobType && !e.retired;
        case 'referralGroup': // 입사경로 탭 - 추천/일반 (재직자 기준)
          return (filter.group === 'referral' ? !!e.referrer : !e.referrer) && !e.retired;
        case 'career': // 입사경로 탭 - 경력구간 (재직자 기준)
          return e.careerBucket === filter.bucket && !e.retired;
        case 'joinReasonRetire': // 퇴사자 분석 - 입사경로별 퇴사율 (전체)
          return e.joinReason === filter.joinReason && e.jobType === filter.jobType;
        case 'referralGroupRetire': // 퇴사자 분석 - 추천/일반 퇴사율 (전체)
          return filter.group === 'referral' ? !!e.referrer : !e.referrer;
        case 'cross': // 퇴사자 분석 - 교차 퇴사율 (전체)
          return e.joinReason === filter.joinReason && (filter.referral === '추천' ? !!e.referrer : !e.referrer);
        case 'tenureBucket': // 퇴사자 분석 - 퇴사자 근속연수 분포 (퇴사자만)
          return e.tenureBucket === filter.bucket && e.retired;
        default:
          return false;
      }
    });
  }

  function showEmployeeListModal(title, people) {
    const sorted = people.slice().sort((a, b) => {
      if (a.retired !== b.retired) return a.retired ? 1 : -1;
      return (b.tenure ?? 0) - (a.tenure ?? 0);
    });
    const rows = sorted.length
      ? sorted.map(p => `
          <div class="row" style="cursor:pointer;" onclick="closeModal(); showEmployeeDetail('${p.name.replace(/'/g, "\\'")}')">
            <span>${p.name} <span class="${p.retired ? 'badge-retired' : 'badge-active'}" style="font-size:11px;">${p.retired ? '(퇴사)' : '(재직)'}</span></span>
            <span>${p.dept} · ${p.position}</span>
          </div>`).join('')
      : `<div class="row"><span>해당 조건의 인원이 없습니다.</span></div>`;
    openModal(`<div class="emp-detail"><h3 style="margin-top:0;">${title} (${sorted.length}명)</h3>${rows}</div>`);
  }

  function showStatusList(retiredFlag) {
    const people = DATA.employees.filter(e => e.retired === retiredFlag)
      .sort((a, b) => a.dept.localeCompare(b.dept));
    showEmployeeListModal(retiredFlag ? '퇴사자 전체 명단' : '재직자 전체 명단', people);
  }

  // ── 각 탭 빌더 ─────────────────────────────
  function buildOverview() {
    const b = DATA.basic;
    const jt = DATA.byJobType;
    return `
      <div class="card">
        <h3>기본 현황</h3>
        <div class="stat-row">
          <div class="stat-box clickable" onclick="showStatusList(false)"><div class="num">${b.active}</div><div class="label">재직자</div></div>
          <div class="stat-box retire-box clickable" onclick="showStatusList(true)"><div class="num">${b.retired}</div><div class="label">퇴사자</div></div>
          <div class="stat-box"><div class="num">${b.total}</div><div class="label">전체 누적</div></div>
        </div>
        <p class="hint" style="margin-top:12px;">퇴사율 등 퇴사 관련 상세 분석은 <b>'퇴사자 분석'</b> 탭에서 볼 수 있어요. 재직자/퇴사자 박스를 클릭하면 전체 명단이 나와요.</p>
        ${b.groupTransferActive ? `<p class="hint">재직자 중 <b>${b.groupTransferActive}명</b>은 그룹입사일이 입사일보다 빨라요 — 계열사에서 소속만 이동해온 인원으로, 근속연수는 그룹입사일 기준으로 계산돼요.</p>` : ''}
      </div>
      <div class="card">
        <h3>직군별 현황 (재직자 기준)</h3>
        ${table(['직군', '재직 인원', '평균연령', '평균근속'],
          jt.map(j => [j.jobType, j.active, j.avgAge ?? '-', (j.avgTenure ?? '-') + (j.avgTenure != null ? '년' : '')]))}
      </div>
      <div class="grid2">
        <div class="card"><h3>연령대 분포 (재직자)</h3><canvas id="chartAge"></canvas></div>
        <div class="card"><h3>연도별 입사자 수</h3><canvas id="chartJoinYear"></canvas></div>
      </div>`;
  }

  function buildDept() {
    const jobTypes = ['관리직', '생산직'];

    const riskRows = DATA.earlyLeaveRisk.map(r => [
      r.name, r.dept, r.jobType, r.tenureMonths != null ? r.tenureMonths + '개월' : '-', r.deptEarlyLeaveRate + '%'
    ]);
    const riskCard = `
      <div class="card" style="border-color:#f0d58a;background:#fffbf0;">
        <h3 style="color:#a9720d;">⚠️ 조기퇴사 위험군</h3>
        <div class="hint">근속 6개월 미만 + 소속 부서가 과거 초기퇴사(1년 미만 퇴사) 비율이 평균보다 높은 경우예요. 확정된 결과가 아니라 참고용 신호예요.</div>
        ${riskRows.length ? table(['이름', '부서', '직군', '근속', '부서 초기퇴사율(과거)'], riskRows) : '<p style="color:var(--text-mute);font-size:13px;">해당자 없음</p>'}
      </div>`;

    const sections = jobTypes.map(jt => {
      const jtStat = DATA.byJobType.find(j => j.jobType === jt);
      const summaryPills = jtStat ? statPillRow(
        statPill(`재직 인원 (총 ${jtStat.active}명)`) +
        statPill(`평균 연령 (${jtStat.avgAge ?? '-'}세)`) +
        statPill(`평균근속(년) (${jtStat.avgTenure ?? '-'}년)`)
      ) : '';
      const deptRows = DATA.byDept.filter(d => d.jobType === jt).map(d => ({
        key: d.dept + '|' + d.jobType,
        cells: [d.dept, d.active, d.avgAge ?? '-', d.avgTenure ?? '-']
      }));
      const special = DATA.specialEmployment.filter(p => p.jobType === jt);
      const upcoming = DATA.retireUpcoming.filter(p => p.jobType === jt);
      const overdue = DATA.retireOverdue.filter(p => p.jobType === jt);

      return `
        <div class="card">
          <h4 class="sub">${jt}</h4>
          ${summaryPills}
          <h3>부서별 재직 인원·평균연령·근속</h3>

  function valueLabelPlugin() {
    return {
      id: 'valueLabels',
      afterDatasetsDraw(chart) {
        const { ctx } = chart;
        chart.data.datasets.forEach((dataset, i) => {
          const meta = chart.getDatasetMeta(i);
          if (meta.type !== 'bar') return;
          meta.data.forEach((bar, index) => {
            const value = dataset.data[index];
            if (!value) return;
            ctx.save();
            ctx.fillStyle = '#1a2b42';
            ctx.font = "600 12px 'Pretendard', sans-serif";
            ctx.textAlign = 'center';
            ctx.fillText(value, bar.x, bar.y - 6);
            ctx.restore();
          });
        });
      }
    };
  }

  // ── 지도 ───────────────────────────────────
  async function loadMap() {
    if (mapLoaded) return;
    mapLoaded = true;
    try {
      const keyRes = await fetch(EXEC_URL + '?action=kakaoKey');
      const { key } = await keyRes.json();
      if (!key) {
        document.getElementById('map').innerHTML = '<p style="padding:20px;color:#999;">카카오맵 JS 키가 설정되지 않았습니다.</p>';
        return;
      }
      await loadScript(`https://dapi.kakao.com/v2/maps/sdk.js?appkey=${key}&autoload=false&libraries=clusterer`);
      kakao.maps.load(async () => {
        const ptRes = await fetch(EXEC_URL + '?action=map');
        const points = await ptRes.json();
        drawMap(points);
        setupMapSearch();
      });
    } catch (err) {
      document.getElementById('map').innerHTML = `<p style="padding:20px;color:#c0392b;">지도 로드 실패: ${err.message}</p>`;
    }
  }

  function loadScript(src) {
    return new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = src;
      s.onload = resolve;
      s.onerror = () => reject(new Error('스크립트 로드 실패 (도메인 미등록 또는 키 오류 가능): ' + src));
      document.head.appendChild(s);
    });
  }

  function drawMap(points) {
    if (!points.length || points.error) {
      document.getElementById('map').innerHTML = '<p style="padding:20px;color:#999;">지도에 표시할 주소 데이터가 없습니다. (KAKAO_REST_KEY 설정 여부 확인)</p>';
      return;
    }
    const center = new kakao.maps.LatLng(points[0].lat, points[0].lng);
    mapInstance = new kakao.maps.Map(document.getElementById('map'), { center, level: 9 });
    mapMarkers = [];
    const markerObjs = [];
    points.forEach(p => {
      const marker = new kakao.maps.Marker({ position: new kakao.maps.LatLng(p.lat, p.lng) });
      const info = new kakao.maps.InfoWindow({ content: `<div style="padding:6px;font-size:12px;">${p.name} (${p.dept})</div>` });
      marker.addListener('click', () => info.open(mapInstance, marker));
      mapMarkers.push({ name: p.name, marker, info });
      markerObjs.push(marker);
    });

    // 마커가 겹쳐서 이름표가 뒤엉키는 문제 해결: 근처 마커는 숫자 뱃지로 묶어서 표시
    // (통근버스 정류장 번호원과 헷갈리지 않게 남색 계열로 스타일 지정)
    if (kakao.maps.MarkerClusterer) {
      mapClusterer = new kakao.maps.MarkerClusterer({
        map: mapInstance,
        averageCenter: true,
        minLevel: 6,
        markers: markerObjs,
        styles: [{
          width: '34px', height: '34px', background: 'rgba(26,43,66,0.82)',
          color: '#fff', textAlign: 'center', lineHeight: '34px',
          borderRadius: '50%', fontSize: '12px', fontWeight: '700'
        }]
      });
    } else {
      markerObjs.forEach(m => m.setMap(mapInstance));
    }
  }

  function setupMapSearch() {
    const input = document.getElementById('mapSearchInput');
    if (!input) return;
    input.addEventListener('input', () => {
      const q = input.value.trim();
      const matched = q ? mapMarkers.filter(m => m.name.includes(q)) : mapMarkers;

      if (mapClusterer) {
        mapClusterer.clear();
        mapClusterer.addMarkers(matched.map(m => m.marker));
      } else {
        mapMarkers.forEach(m => m.marker.setMap(matched.includes(m) ? mapInstance : null));
      }

      if (q && matched.length >= 1) {
        mapInstance.setCenter(matched[0].marker.getPosition());
        if (matched.length === 1) {
          mapInstance.setLevel(5);
          matched[0].info.open(mapInstance, matched[0].marker);
        }
      }
    });
  }

  function focusOnMap(name) {
    closeModal();
    showTab('map');
    let tries = 0;
    const tryFocus = () => {
      tries++;
      const found = mapMarkers.find(m => m.name === name);
      if (found && mapInstance) {
        mapInstance.setCenter(found.marker.getPosition());
        mapInstance.setLevel(5);
        found.info.open(mapInstance, found.marker);
      } else if (!mapInstance && tries < 15) {
        setTimeout(tryFocus, 400);
      } else if (tries >= 15) {
        // 지도 로딩이 너무 오래 걸리면 조용히 종료
      } else {
        alert('해당 인원의 좌표를 찾을 수 없습니다. (주소 지오코딩 실패 또는 캐시 미반영)');
      }
    };
    setTimeout(tryFocus, 300);
  }

  // ── 통근버스 노선 표시/숨기기 ─────────────
  // '통근버스' 시트(routeName/seq/stopName/addr)에 데이터를 채우면 여기 표시됨.
  // 안산 밖 정류장은 백엔드에서 자동으로 제외됨.
  async function toggleShuttleRoutes() {
    const btn = document.getElementById('shuttleToggleBtn');
    const legend = document.getElementById('shuttleLegend');

    if (shuttleVisible) {
      shuttlePolylines.forEach(p => p.setMap(null));
      shuttleOverlays.forEach(o => o.setMap(null));
      shuttleVisible = false;
      if (btn) { btn.style.background = 'white'; btn.style.color = 'var(--accent)'; }
      if (legend) legend.innerHTML = '';
      return;
    }

    if (!mapInstance) return; // 지도가 아직 안 뜬 상태

    if (!shuttleLoaded) {
      if (legend) legend.innerHTML = '<p class="hint">노선 정보를 불러오는 중...</p>';
      try {
        const res = await fetch(EXEC_URL + '?action=shuttle');
        const data = await res.json();
        shuttleRouteData = data.routes || [];
        shuttleLoaded = true;
        shuttleWarning = data.warning || '';
        if (data.error) {
          if (legend) legend.innerHTML = `<p class="hint" style="color:var(--danger);">${data.error}</p>`;
          return;
        }
      } catch (err) {
        if (legend) legend.innerHTML = `<p class="hint" style="color:var(--danger);">노선 정보를 불러오지 못했어요: ${err.message}</p>`;
        return;
      }
    }

    if (!shuttleRouteData.length) {
      if (legend) legend.innerHTML = `<p class="hint">등록된 통근버스 노선이 없어요. '통근버스' 시트에 routeName / seq / stopName / addr 컬럼으로 정류장을 입력하면 여기 표시돼요.</p>`;
      return;
    }

    const colors = ['#e74c3c', '#3498db', '#2ecc71', '#9b59b6', '#f39c12', '#1abc9c'];
    shuttlePolylines = [];
    shuttleOverlays = [];
    let openShuttleInfo = null;
    let legendSections = '';

    shuttleRouteData.forEach((route, i) => {
      const color = colors[i % colors.length];
      const path = route.stops.map(s => new kakao.maps.LatLng(s.lat, s.lng));
      const polyline = new kakao.maps.Polyline({ path, strokeWeight: 4, strokeColor: color, strokeOpacity: 0.85, strokeStyle: 'solid' });
      polyline.setMap(mapInstance);
      shuttlePolylines.push(polyline);

      route.stops.forEach((s, si) => {
        // 지도 위엔 작은 번호 원만 표시 (이름/시간을 다 띄우면 서로 겹쳐서 지저분해짐)
        const el = document.createElement('div');
        el.style.cssText = `width:22px;height:22px;border-radius:50%;background:${color};color:white;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 2px white,0 2px 6px rgba(0,0,0,.3);cursor:pointer;`;
        el.textContent = si + 1;
        const overlay = new kakao.maps.CustomOverlay({
          position: new kakao.maps.LatLng(s.lat, s.lng), content: el, yAnchor: 0.5, zIndex: 10
        });
        overlay.setMap(mapInstance);
        shuttleOverlays.push(overlay);

        const info = new kakao.maps.InfoWindow({
          position: new kakao.maps.LatLng(s.lat, s.lng),
          content: `<div style="padding:8px 10px;font-size:12.5px;min-width:130px;"><b>${si + 1}. ${s.stopName}</b>${s.time ? `<br><span style="color:#888;">${s.time}</span>` : ''}</div>`
        });
        el.addEventListener('click', () => {
          if (openShuttleInfo) openShuttleInfo.close();
          info.open(mapInstance);
          openShuttleInfo = info;
        });
      });

      // 지도는 번호만, 전체 이름+시간은 아래 목록으로 따로 정리
      const stopListHtml = route.stops.map((s, si) => `
        <div class="row"><span>${si + 1}. ${s.stopName}</span><span style="color:var(--text-mute);">${s.time || '-'}</span></div>
      `).join('');
      legendSections += `
        <div style="margin-bottom:12px;">
          ${statPill(`<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${color};margin-right:5px;"></span>${route.routeName} (${route.stops.length}개 정류장)`)}
          <div style="margin-top:8px;border:1px solid var(--border);border-radius:10px;overflow:hidden;padding:4px 12px;">${stopListHtml}</div>
        </div>`;
    });

    if (legend) legend.innerHTML = (shuttleWarning ? `<p class="hint" style="color:var(--danger);margin-bottom:10px;">⚠️ ${shuttleWarning}</p>` : '') + legendSections;
    shuttleVisible = true;
    if (btn) { btn.style.background = 'var(--accent)'; btn.style.color = 'white'; }
  }

  // ── 전체 렌더링 ────────────────────────────
  function renderAll() {
    destroyCharts();
    document.getElementById('container').innerHTML = TABS.map(t =>
      `<div class="section ${t.id === 'overview' ? 'active' : ''}" id="sec-${t.id}"></div>`
    ).join('');
    document.getElementById('sec-overview').innerHTML = buildOverview();
    document.getElementById('sec-dept').innerHTML = buildDept();
    document.getElementById('sec-age').innerHTML = buildAge();
    document.getElementById('sec-hire').innerHTML = buildHire();
    document.getElementById('sec-license').innerHTML = buildLicense();
    document.getElementById('sec-map').innerHTML = buildMap();
    document.getElementById('sec-retire').innerHTML = buildRetireAnalysis();
    renderCharts();
    renderAgeSectionCharts();
    mapLoaded = false; // 탭 다시 그려졌으니 지도 재로드 허용
    shuttleVisible = false; // DOM이 새로 그려졌으니 버튼 상태도 초기화
  }

  async function loadData(forceReload) {
    document.getElementById('container').innerHTML = '<div class="loading">데이터 불러오는 중...</div>';
    try {
      const res = await fetch(EXEC_URL + '?action=data' + (forceReload ? '&t=' + Date.now() : ''));
      const json = await res.json();
      if (json.error) throw new Error(json.error);
      DATA = json;
      document.getElementById('updatedAt').textContent = '업데이트: ' + new Date(json.generatedAt).toLocaleString('ko-KR');
      renderAll();
    } catch (err) {
      document.getElementById('container').innerHTML = `<div class="error">데이터를 불러오지 못했습니다: ${err.message}<br><small>EXEC_URL 설정 및 Apps Script 배포 상태를 확인하세요.</small></div>`;
    }
  }

  // ── 이름 검색 ──────────────────────────────
  function setupSearch() {
    const input = document.getElementById('searchInput');
    const resultBox = document.getElementById('searchResults');

    input.addEventListener('input', () => {
      const q = input.value.trim();
      if (!q || !DATA) { resultBox.classList.remove('show'); return; }
      const matches = DATA.employees.filter(e => e.name.includes(q));
      if (!matches.length) {
        resultBox.innerHTML = `<div class="search-item" style="color:#999;">일치하는 사람이 없습니다.</div>`;
      } else {
        resultBox.innerHTML = matches.map(e =>
          `<div class="search-item" data-name="${e.name}">
            ${e.name} <span style="color:${e.retired ? '#c0392b' : '#27ae60'};font-size:12px;">(${e.retired ? '퇴사' : '재직'})</span>
            <span style="color:#999;font-size:12px;"> · ${e.dept}</span>
          </div>`
        ).join('');
      }
      resultBox.classList.add('show');
    });

    resultBox.addEventListener('click', (ev) => {
      const item = ev.target.closest('.search-item');
      if (!item || !item.dataset.name) return;
      showEmployeeDetail(item.dataset.name);
      resultBox.classList.remove('show');
      input.value = '';
    });

    document.addEventListener('click', (ev) => {
      if (!ev.target.closest('.search-bar')) resultBox.classList.remove('show');
    });
  }

  // ── 모달 공통 ──────────────────────────────
  function openModal(html) {
    let modal = document.getElementById('empModal');
    if (!modal) {
      modal = document.createElement('div');
      modal.id = 'empModal';
      modal.style = 'position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;';
      modal.innerHTML = `<div style="background:white;border-radius:12px;max-width:440px;width:100%;max-height:80vh;overflow-y:auto;position:relative;">
        <button onclick="closeModal()" style="position:absolute;top:8px;right:12px;border:none;background:none;font-size:20px;cursor:pointer;color:#888;">✕</button>
        <div id="empModalBody"></div>
      </div>`;
      document.body.appendChild(modal);
      modal.addEventListener('click', (ev) => { if (ev.target === modal) closeModal(); });
    }
    document.getElementById('empModalBody').innerHTML = html;
  }

  function closeModal() {
    const m = document.getElementById('empModal');
    if (m) m.remove();
  }

  // ── 개인 상세 모달 ─────────────────────────
  function showEmployeeDetail(name) {
    const e = DATA.employees.find(x => x.name === name);
    if (!e) return;

    const html = `
      <div class="emp-detail">
        <h3 style="margin-top:0;">${e.name} <span style="color:${e.retired ? '#c0392b' : '#27ae60'};font-size:13px;">${e.retired ? '(퇴사)' : '(재직)'}</span></h3>
        ${e.employmentNote ? `<div class="row"><span>고용형태</span><span style="color:#b8860b;font-weight:700;">${e.employmentNote}</span></div>` : ''}
        <div class="row"><span>부서</span><span>${e.dept}</span></div>
        <div class="row"><span>직급</span><span>${e.position}</span></div>
        <div class="row"><span>나이</span><span>${e.age ?? '-'}</span></div>
        <div class="row"><span>근속(년)</span><span>${e.tenure ?? '-'} ${e.groupJoinDate ? '<span style="color:var(--text-mute);font-size:11.5px;">(그룹입사 기준)</span>' : ''}</span></div>
        <div class="row"><span>그룹입사일</span><span>${e.groupJoinDate || '-'}</span></div>
        <div class="row"><span>입사일</span><span>${e.joinDate || '-'}</span></div>
        ${e.retired ? `<div class="row"><span>퇴사일</span><span>${e.retireDate || '-'}</span></div>` : ''}
        <div class="row"><span>입사경로</span><span>${e.joinReason}</span></div>
        <div class="row"><span>추천인</span><span>${e.referrer || '없음'}</span></div>
        <div class="row"><span>거주지역</span><span>${e.region}</span></div>
        <div class="row"><span>결혼여부</span><span>${e.marry}</span></div>
        <div class="row"><span>최종학력</span><span>${e.schoolL || '-'} ${e.majorL ? '(' + e.majorL + ')' : ''}</span></div>
        <div class="row"><span>자격증</span><span>${e.license || '없음'}</span></div>
        ${!e.retired ? `<button onclick="focusOnMap('${e.name.replace(/'/g, "\\'")}')" style="width:100%;margin-top:14px;padding:10px;background:var(--navy);color:white;border:none;border-radius:8px;cursor:pointer;font-size:13.5px;font-weight:600;">📍 지도에서 위치보기</button>` : ''}
      </div>`;
    openModal(html);
  }

  // ── 지역 클릭 → 거주자 명단 모달 ───────────
  function showRegionDetail(region) {
    const people = DATA.employees.filter(e => e.region === region && !e.retired)
      .sort((a, b) => a.dept.localeCompare(b.dept));

    const rows = people.length
      ? people.map(p => `
          <div class="row" style="cursor:pointer;" onclick="closeModal(); showEmployeeDetail('${p.name.replace(/'/g, "\\'")}')">
            <span>${p.name}</span>
            <span>${p.dept} · ${p.position}</span>
          </div>`).join('')
      : `<div class="row"><span>해당 지역 거주자가 없습니다.</span></div>`;

    const html = `
      <div class="emp-detail">
        <h3 style="margin-top:0;">📍 ${region} 거주자 (${people.length}명)</h3>
        ${rows}
      </div>`;
    openModal(html);
  }



  // 지역/부서/필터 표 클릭 위임 (표는 renderAll 시마다 다시 그려지므로 document에 위임)
document.addEventListener('click', (ev) => {
  const regionRow = ev.target.closest('tr.clickable-row[data-region]');
  if (regionRow) { showRegionDetail(regionRow.dataset.region); return; }
  const deptRow = ev.target.closest('tr.clickable-row[data-deptkey]');
  if (deptRow) { showDeptDetail(deptRow.dataset.deptkey, deptRow.dataset.deptmode); return; }
  const filterRow = ev.target.closest('tr.clickable-row[data-filter]');
  if (filterRow) {
    const filter = JSON.parse(decodeURIComponent(filterRow.dataset.filter));
    const people = applyFilter(filter);
    showEmployeeListModal(filterRow.dataset.filtertitle || '상세 목록', people);
    return;
  }
});
// ── 부서 클릭 → 인원 명단 모달 ─────────────
// mode: 'active'면 재직자만 (재직 현황 탭), 'retired'면 퇴사자만 (퇴사자 분석 탭)
function showDeptDetail(deptKey, mode) {
  const [dept, jobType] = deptKey.split('|');
  let people = DATA.employees.filter(e => e.dept === dept && e.jobType === jobType);
  let pills;

  if (mode === 'active') {
    people = people.filter(e => !e.retired);
    const stat = DATA.byDept.find(d => d.dept === dept && d.jobType === jobType);
    const avgAgeText = stat && stat.avgAge != null ? stat.avgAge + '세' : '-';
    const avgTenureText = stat && stat.avgTenure != null ? stat.avgTenure + '년' : '-';
    pills = statPill(`재직 인원 (총 ${people.length}명)`) +
      statPill(`평균 연령 (${avgAgeText})`) +
      statPill(`평균근속(년) (${avgTenureText})`);
  } else if (mode === 'retired') {
    people = people.filter(e => e.retired);
    pills = statPill(`퇴사 인원 (총 ${people.length}명)`, true);
  } else {
    const activeCount = people.filter(p => !p.retired).length;
    const retiredCount = people.filter(p => p.retired).length;
    pills = statPill(`재직 인원 (총 ${activeCount}명)`) + statPill(`퇴사 인원 (총 ${retiredCount}명)`, true);
  }

  people.sort((a, b) => (b.tenure ?? 0) - (a.tenure ?? 0));

  const rows = people.length
    ? people.map(p => `
        <div class="row" style="cursor:pointer;" onclick="closeModal(); showEmployeeDetail('${p.name.replace(/'/g, "\\'")}')">
          <span>${p.name}${p.employmentNote ? ` <span style="color:#b8860b;font-size:11px;">[${p.employmentNote}]</span>` : ''}</span>
          <span>${p.position} · 근속 ${p.tenure ?? '-'}년</span>
        </div>`).join('')
    : `<div class="row"><span>해당 조건의 인원이 없습니다.</span></div>`;

  const html = `
    <div class="emp-detail">
      <h3 style="margin-top:0;margin-bottom:10px;">🏢 ${dept} · ${jobType}</h3>
      ${statPillRow(pills)}
      ${rows}
    </div>`;
  openModal(html);
}
  // ── 초기화 ─────────────────────────────────
  renderNav();
  setupSearch();
  loadData(false);
</script>
</body>
</html>
