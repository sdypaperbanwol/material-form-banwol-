<!DOCTYPE html>
<html lang="ko">
<head>
<base target="_top">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>인사 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  * { box-sizing: border-box; }
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');

  :root {
    --navy: #1a2b42;
    --navy-light: #2c4260;
    --accent: #3b82c4;
    --accent-soft: #eaf2fa;
    --bg: #f0f2f5;
    --card: #ffffff;
    --text: #1f2937;
    --text-mute: #8b95a1;
    --border: #e8eaee;
    --danger: #d64545;
    --success: #2a9d6f;
    --radius: 14px;
  }

  body {
    font-family: 'Pretendard', -apple-system, sans-serif;
    margin: 0;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  header {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
    color: white;
    padding: 16px 28px;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    flex-wrap: wrap;
    gap: 6px;
  }
  header h1 { margin: 0; font-size: 19px; font-weight: 700; letter-spacing: -0.2px; display: flex; align-items: center; gap: 8px; white-space: nowrap; }
  header .side { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); display: flex; align-items: center; gap: 10px; }
  header .updated { font-size: 11.5px; color: rgba(255,255,255,0.55); }

  nav {
    display: flex;
    justify-content: center;
    background: white;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    position: sticky;
    top: 0;
    z-index: 10;
    padding: 10px 16px;
    gap: 6px;
    scroll-padding-inline: 16px;
  }
  nav button {
    flex: none;
    padding: 9px 18px;
    border: none;
    background: transparent;
    cursor: pointer;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--text-mute);
    border-radius: 999px;
    white-space: nowrap;
    transition: all .15s ease;
  }
  nav button:hover { background: var(--bg); color: var(--text); }
  nav button.active { color: white; background: var(--navy); box-shadow: 0 2px 8px rgba(26,43,66,0.3); }

  .container { padding: 24px 20px 60px; max-width: 1080px; margin: 0 auto; }
  .section { display: none; }
  .section.active { display: block; animation: fadeIn .25s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 22px 24px;
    margin-bottom: 18px;
    box-shadow: 0 1px 2px rgba(20,30,45,0.04), 0 8px 20px -12px rgba(20,30,45,0.10);
    border: 1px solid var(--border);
  }
  .card h3 {
    margin: 0 0 16px;
    font-size: 14.5px;
    color: var(--navy);
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card h3::before {
    content: '';
    width: 4px; height: 14px;
    background: var(--accent);
    border-radius: 2px;
    display: inline-block;
  }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  @media (max-width: 700px) { .grid2 { grid-template-columns: 1fr; } }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    padding: 10px 12px;
    text-align: left;
    background: var(--accent-soft);
    color: var(--navy);
    font-weight: 700;
    font-size: 12px;
    letter-spacing: .2px;
  }
  thead th:first-child { border-radius: 8px 0 0 8px; }
  thead th:last-child { border-radius: 0 8px 8px 0; }
  tbody td { padding: 10px 12px; border-bottom: 1px solid var(--border); color: var(--text); }
  tbody tr:nth-child(even) { background: #fafbfc; }
  tbody tr:hover { background: var(--accent-soft); }
  tbody tr:last-child td { border-bottom: none; }
  tr.clickable-row { cursor: pointer; }
  tr.clickable-row:hover td:first-child { color: var(--accent); font-weight: 600; }

  .stat-row { display: flex; gap: 14px; flex-wrap: wrap; }
  .stat-box {
    flex: 1; min-width: 130px;
    background: linear-gradient(135deg, var(--accent-soft), #ffffff);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 14px;
    text-align: center;
  }
  .stat-box .num { font-size: 26px; font-weight: 800; color: var(--navy); letter-spacing: -0.5px; }
  .stat-box .label { font-size: 12px; color: var(--text-mute); margin-top: 3px; font-weight: 600; }

  .insight-item {
    background: #fff9ec;
    border-left: 4px solid #e8a13d;
    padding: 12px 16px;
    margin-bottom: 10px;
    border-radius: 8px;
    font-size: 13.5px;
    line-height: 1.55;
  }

  #map { width: 100%; height: 480px; border-radius: 10px; overflow: hidden; }
  .badge-retired { color: var(--danger); font-weight: 600; }
  .badge-active { color: var(--success); font-weight: 600; }

  .loading, .error { text-align: center; padding: 80px 20px; color: var(--text-mute); font-size: 14px; }
  .error { color: var(--danger); }

  #refreshBtn {
    background: rgba(255,255,255,0.14);
    color: white;
    border: 1px solid rgba(255,255,255,0.22);
    padding: 7px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    transition: background .15s;
    white-space: nowrap;
  }
  #refreshBtn:hover { background: rgba(255,255,255,0.24); }

  /* 검색 */
  .search-bar {
    background: white;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: center;
    position: relative;
  }
  .search-bar input {
    width: 100%; max-width: 420px;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
    transition: border-color .15s;
  }
  .search-bar input:focus { outline: none; border-color: var(--accent); }
  #searchResults {
    position: absolute;
    top: 56px;
    left: 50%;
    transform: translateX(-50%);
    background: white; border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 12px 28px -8px rgba(20,30,45,0.18);
    max-width: 420px; width: 90%;
    max-height: 400px; overflow-y: auto; z-index: 20; display: none;
  }
  #searchResults.show { display: block; }
  .search-item { padding: 11px 16px; border-bottom: 1px solid #f2f3f5; cursor: pointer; font-size: 13.5px; }
  .search-item:hover { background: var(--accent-soft); }
  .emp-detail { padding: 20px; }
  .emp-detail h3 { border-bottom: none !important; }
  .emp-detail .row { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid #f4f5f6; font-size: 13.5px; gap: 12px; }
  .emp-detail .row span:first-child { color: var(--text-mute); font-weight: 600; white-space: nowrap; }
  .emp-detail .row span:last-child { text-align: right; }

  /* 모바일 대응 */
  @media (max-width: 480px) {
    header { padding: 12px 16px; }
    header h1 { font-size: 15.5px; }
    header .side { position: static; transform: none; }
    #refreshBtn { padding: 6px 10px; font-size: 11px; }
    header .updated { font-size: 10px; }
    nav { padding: 8px 10px; justify-content: flex-start; }
    nav button { padding: 8px 14px; font-size: 12.5px; }
    .container { padding: 16px 12px 50px; }
    .card { padding: 16px 16px; }
    .search-bar { padding: 10px 12px; }
  }
</style>
</head>
<body>
<header>
  <h1>📊 인사 대시보드</h1>
  <div class="side">
    <span class="updated" id="updatedAt"></span>
    <button id="refreshBtn" onclick="loadData(true)">새로고침</button>
  </div>
</header>
<nav id="tabNav"></nav>
<div class="search-bar">
  <input type="text" id="searchInput" placeholder="🔍 이름으로 검색 (예: 홍길동)" />
  <div id="searchResults"></div>
</div>
<div class="container" id="container">
  <div class="loading">데이터 불러오는 중...</div>
</div>

<script>
  // ════════════════════════════════════════════
  //  설정: Apps Script 웹앱 배포 후 나온 /exec URL로 교체하세요
  // ════════════════════════════════════════════
  const EXEC_URL = 'https://script.google.com/macros/s/AKfycbyjAVFEueRt885rOUxJxrQl5VkSanRCtIOPJW706N1koJmPB6ihzMs9Bc6mK_buIGWX/exec';

  const TABS = [
    { id: 'overview', label: '개요' },
    { id: 'dept', label: '부서/퇴사율' },
    { id: 'age', label: '연령/생일' },
    { id: 'hire', label: '입사경로/채용' },
    { id: 'referral', label: '추천인' },
    { id: 'license', label: '자격증' },
    { id: 'insight', label: '퇴사 인사이트' },
    { id: 'map', label: '거주지 지도' }
  ];

  let DATA = null;
  let charts = [];
  let mapLoaded = false;
  let mapInstance = null;
  let mapMarkers = []; // { name, marker, info }

  // ── 탭 네비게이션 ──────────────────────────
  function renderNav() {
    const nav = document.getElementById('tabNav');
    nav.innerHTML = TABS.map((t, i) =>
      `<button data-tab="${t.id}" class="${i === 0 ? 'active' : ''}">${t.label}</button>`
    ).join('');
    nav.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => showTab(btn.dataset.tab));
    });
  }

  function showTab(id) {
    document.querySelectorAll('nav button').forEach(b => b.classList.toggle('active', b.dataset.tab === id));
    document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.id === 'sec-' + id));
    const activeBtn = document.querySelector(`nav button[data-tab="${id}"]`);
    if (activeBtn) activeBtn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    if (id === 'map') loadMap();
  }

  // ── 표 렌더링 헬퍼 ─────────────────────────
  function table(headers, rows) {
    return `<table><thead><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>
      <tbody>${rows.map(r => `<tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
  }

  function clickableTable(headers, rows, attrName) {
    return `<table><thead><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>
      <tbody>${rows.map(r =>
        `<tr class="clickable-row" data-${attrName}="${r.key}">${r.cells.map(c => `<td>${c}</td>`).join('')}</tr>`
      ).join('')}</tbody></table>`;
  }

  // ── 각 탭 빌더 ─────────────────────────────
  function buildOverview() {
    const b = DATA.basic;
    return `
      <div class="card">
        <h3>기본 현황</h3>
        <div class="stat-row">
          <div class="stat-box"><div class="num">${b.active}</div><div class="label">재직자</div></div>
          <div class="stat-box"><div class="num">${b.retired}</div><div class="label">퇴사자</div></div>
          <div class="stat-box"><div class="num">${b.total}</div><div class="label">전체 누적</div></div>
          <div class="stat-box"><div class="num">${b.retireRate}%</div><div class="label">전체 퇴사율</div></div>
        </div>
      </div>
      <div class="grid2">
        <div class="card"><h3>연령대 분포 (재직자)</h3><canvas id="chartAge"></canvas></div>
        <div class="card"><h3>연도별 입사자 수</h3><canvas id="chartJoinYear"></canvas></div>
      </div>`;
  }

  function buildDept() {
    const rows = DATA.byDept.map(d => [d.dept, d.total, d.avgAge ?? '-', d.avgTenure ?? '-', d.retireRate + '%']);
    return `<div class="card"><h3>부서별 평균연령·근속·퇴사율</h3>
      ${table(['부서', '인원', '평균연령', '평균근속(년)', '퇴사율'], rows)}</div>
      <div class="card"><h3>정년임박자 (55세 이상)</h3>
      ${table(['이름', '부서', '나이', '직급'], DATA.nearRetire.map(p => [p.name, p.dept, p.age, p.position]))}</div>`;
  }

  function buildAge() {
    return `
      <div class="grid2">
        <div class="card"><h3>월별 생일 분포</h3><canvas id="chartBirthMonth"></canvas></div>
        <div class="card"><h3>결혼여부</h3><canvas id="chartMarry"></canvas></div>
      </div>`;
  }

  function buildHire() {
    const rows = DATA.byJoinReason.map(j => [j.joinReason, j.total, j.avgTenure ?? '-', j.retireRate + '%']);
    const cross = DATA.crossJoinReasonReferral.map(c => [c.joinReason, c.referral, c.total, c.retireRate + '%']);
    return `<div class="card"><h3>입사경로별 평균근속·퇴사율</h3>${table(['입사경로', '인원', '평균근속(년)', '퇴사율'], rows)}</div>
      <div class="card"><h3>추천여부 × 입사경로 교차 퇴사율</h3>${table(['입사경로', '추천여부', '인원', '퇴사율'], cross)}</div>
      <div class="card"><h3>입사 시 경력 구간</h3>${table(['구간', '인원'], DATA.careerBucket.map(c => [c.bucket, c.count]))}</div>
      <div class="card"><h3>퇴사자 근속연수 분포</h3>${table(['근속구간', '인원'], DATA.retiredTenure.map(r => [r.bucket, r.count]))}</div>`;
  }

  function buildReferral() {
    const rv = DATA.referralVsNormal;
    const summary = table(['구분', '인원', '평균근속(년)', '퇴사율'], [
      ['추천입사', rv.referral.total, rv.referral.avgTenure ?? '-', (rv.referral.retireRate ?? '-') + '%'],
      ['일반입사', rv.normal.total, rv.normal.avgTenure ?? '-', (rv.normal.retireRate ?? '-') + '%']
    ]);
    const detailRows = DATA.referrals.map(r => [
      r.referrer, r.count,
      r.referees.map(x => `${x.name}<span class="${x.retired ? 'badge-retired' : 'badge-active'}">(${x.retired ? '퇴사' : '재직'})</span>`).join(', ')
    ]);
    return `<div class="card"><h3>추천입사 vs 일반입사</h3>${summary}</div>
      <div class="card"><h3>추천인별 피추천인 명단</h3>${table(['추천인', '추천건수', '피추천인'], detailRows)}</div>`;
  }

  function buildLicense() {
    const rows = DATA.licenses.map(l => [l.license, l.count, l.holders.join(', ')]);
    return `<div class="card"><h3>자격증 보유 현황 (보유자 명단 포함)</h3>${table(['자격증명', '인원', '보유자'], rows)}</div>`;
  }

  function buildInsight() {
    return `<div class="card"><h3>퇴사자 인사이트 종합</h3>
      ${DATA.insights.map(t => `<div class="insight-item">💡 ${t}</div>`).join('')}
      ${DATA.cautionNotes && DATA.cautionNotes.length ? `
        <h3 style="margin-top:20px;">참고 (표본 부족, 해석 주의)</h3>
        ${DATA.cautionNotes.map(t => `<div class="insight-item" style="background:#f0f0f0;border-left-color:#aaa;">⚠️ ${t}</div>`).join('')}
      ` : ''}
    </div>`;
  }

  function buildMap() {
    const regionRows = DATA.byRegion.map(r => ({ key: r.region, cells: [r.region, r.count] }));
    return `
      <div class="card">
        <h3>거주지역 분포 (시/구)</h3>
        ${clickableTable(['지역', '인원'], regionRows, 'region')}
      </div>
      <div class="card">
        <h3>재직자 거주지 지도</h3>
        <input type="text" id="mapSearchInput" placeholder="🔍 이 지도에서 이름 검색" style="width:100%;max-width:320px;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13.5px;margin-bottom:12px;">
        <div id="map"><div style="padding:20px;color:#999;">지도 불러오는 중...</div></div>
      </div>`;
  }

  // ── 차트 ───────────────────────────────────
  function destroyCharts() { charts.forEach(c => c.destroy()); charts = []; }

  function renderCharts() {
    charts.push(new Chart(document.getElementById('chartAge'), {
      type: 'bar',
      data: { labels: DATA.byAgeGroup.map(a => a.group + '대'), datasets: [{ label: '인원', data: DATA.byAgeGroup.map(a => a.count), backgroundColor: '#3498db' }] },
      options: { plugins: { legend: { display: false } } }
    }));
    charts.push(new Chart(document.getElementById('chartJoinYear'), {
      type: 'line',
      data: { labels: DATA.byJoinYear.map(y => y.year), datasets: [{ label: '입사자수', data: DATA.byJoinYear.map(y => y.count), borderColor: '#2c3e50', tension: 0.3 }] },
      options: { plugins: { legend: { display: false } } }
    }));
  }

  function renderAgeSectionCharts() {
    charts.push(new Chart(document.getElementById('chartBirthMonth'), {
      type: 'bar',
      data: { labels: DATA.byMonth.map(m => m.month + '월'), datasets: [{ label: '인원', data: DATA.byMonth.map(m => m.count), backgroundColor: '#e67e22' }] },
      options: { plugins: { legend: { display: false } } }
    }));
    charts.push(new Chart(document.getElementById('chartMarry'), {
      type: 'doughnut',
      data: { labels: DATA.byMarry.map(m => m.status), datasets: [{ data: DATA.byMarry.map(m => m.count), backgroundColor: ['#3498db', '#e74c3c', '#95a5a6', '#f1c40f'] }] }
    }));
  }

  // ── 지도 ───────────────────────────────────
  async function loadMap() {
    if (mapLoaded) return;
    mapLoaded = true;
    try {
      const keyRes = await fetch(EXEC_URL + '?action=kakaoKey');
      const { key } = await keyRes.json();
      if (!key) {
        document.getElementById('map').innerHTML = '<p style="padding:20px;color:#999;">카카오맵 JS 키가 설정되지 않았습니다.</p>';
        return;
      }
      await loadScript(`https://dapi.kakao.com/v2/maps/sdk.js?appkey=${key}&autoload=false`);
      kakao.maps.load(async () => {
        const ptRes = await fetch(EXEC_URL + '?action=map');
        const points = await ptRes.json();
        drawMap(points);
        setupMapSearch();
      });
    } catch (err) {
      document.getElementById('map').innerHTML = `<p style="padding:20px;color:#c0392b;">지도 로드 실패: ${err.message}</p>`;
    }
  }

  function loadScript(src) {
    return new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = src;
      s.onload = resolve;
      s.onerror = () => reject(new Error('스크립트 로드 실패 (도메인 미등록 또는 키 오류 가능): ' + src));
      document.head.appendChild(s);
    });
  }

  function drawMap(points) {
    if (!points.length || points.error) {
      document.getElementById('map').innerHTML = '<p style="padding:20px;color:#999;">지도에 표시할 주소 데이터가 없습니다. (KAKAO_REST_KEY 설정 여부 확인)</p>';
      return;
    }
    const center = new kakao.maps.LatLng(points[0].lat, points[0].lng);
    mapInstance = new kakao.maps.Map(document.getElementById('map'), { center, level: 9 });
    mapMarkers = [];
    points.forEach(p => {
      const marker = new kakao.maps.Marker({ position: new kakao.maps.LatLng(p.lat, p.lng), map: mapInstance });
      const info = new kakao.maps.InfoWindow({ content: `<div style="padding:6px;font-size:12px;">${p.name} (${p.dept})</div>` });
      marker.addListener('click', () => info.open(mapInstance, marker));
      mapMarkers.push({ name: p.name, marker, info });
    });
  }

  function setupMapSearch() {
    const input = document.getElementById('mapSearchInput');
    if (!input) return;
    input.addEventListener('input', () => {
      const q = input.value.trim();
      if (!q) {
        mapMarkers.forEach(m => m.marker.setMap(mapInstance));
        return;
      }
      const matched = mapMarkers.filter(m => m.name.includes(q));
      mapMarkers.forEach(m => m.marker.setMap(matched.includes(m) ? mapInstance : null));
      if (matched.length >= 1) {
        mapInstance.setCenter(matched[0].marker.getPosition());
        if (matched.length === 1) {
          mapInstance.setLevel(5);
          matched[0].info.open(mapInstance, matched[0].marker);
        }
      }
    });
  }

  function focusOnMap(name) {
    closeModal();
    showTab('map');
    let tries = 0;
    const tryFocus = () => {
      tries++;
      const found = mapMarkers.find(m => m.name === name);
      if (found && mapInstance) {
        mapInstance.setCenter(found.marker.getPosition());
        mapInstance.setLevel(5);
        found.info.open(mapInstance, found.marker);
      } else if (!mapInstance && tries < 15) {
        setTimeout(tryFocus, 400);
      } else if (tries >= 15) {
        // 지도 로딩이 너무 오래 걸리면 조용히 종료
      } else {
        alert('해당 인원의 좌표를 찾을 수 없습니다. (주소 지오코딩 실패 또는 캐시 미반영)');
      }
    };
    setTimeout(tryFocus, 300);
  }

  // ── 전체 렌더링 ────────────────────────────
  function renderAll() {
    destroyCharts();
    document.getElementById('container').innerHTML = TABS.map(t =>
      `<div class="section ${t.id === 'overview' ? 'active' : ''}" id="sec-${t.id}"></div>`
    ).join('');
    document.getElementById('sec-overview').innerHTML = buildOverview();
    document.getElementById('sec-dept').innerHTML = buildDept();
    document.getElementById('sec-age').innerHTML = buildAge();
    document.getElementById('sec-hire').innerHTML = buildHire();
    document.getElementById('sec-referral').innerHTML = buildReferral();
    document.getElementById('sec-license').innerHTML = buildLicense();
    document.getElementById('sec-insight').innerHTML = buildInsight();
    document.getElementById('sec-map').innerHTML = buildMap();
    renderCharts();
    renderAgeSectionCharts();
    mapLoaded = false; // 탭 다시 그려졌으니 지도 재로드 허용
  }

  async function loadData(forceReload) {
    document.getElementById('container').innerHTML = '<div class="loading">데이터 불러오는 중...</div>';
    try {
      const res = await fetch(EXEC_URL + '?action=data' + (forceReload ? '&t=' + Date.now() : ''));
      const json = await res.json();
      if (json.error) throw new Error(json.error);
      DATA = json;
      document.getElementById('updatedAt').textContent = '업데이트: ' + new Date(json.generatedAt).toLocaleString('ko-KR');
      renderAll();
    } catch (err) {
      document.getElementById('container').innerHTML = `<div class="error">데이터를 불러오지 못했습니다: ${err.message}<br><small>EXEC_URL 설정 및 Apps Script 배포 상태를 확인하세요.</small></div>`;
    }
  }

  // ── 이름 검색 ──────────────────────────────
  function setupSearch() {
    const input = document.getElementById('searchInput');
    const resultBox = document.getElementById('searchResults');

    input.addEventListener('input', () => {
      const q = input.value.trim();
      if (!q || !DATA) { resultBox.classList.remove('show'); return; }
      const matches = DATA.employees.filter(e => e.name.includes(q));
      if (!matches.length) {
        resultBox.innerHTML = `<div class="search-item" style="color:#999;">일치하는 사람이 없습니다.</div>`;
      } else {
        resultBox.innerHTML = matches.map(e =>
          `<div class="search-item" data-name="${e.name}">
            ${e.name} <span style="color:${e.retired ? '#c0392b' : '#27ae60'};font-size:12px;">(${e.retired ? '퇴사' : '재직'})</span>
            <span style="color:#999;font-size:12px;"> · ${e.dept}</span>
          </div>`
        ).join('');
      }
      resultBox.classList.add('show');
    });

    resultBox.addEventListener('click', (ev) => {
      const item = ev.target.closest('.search-item');
      if (!item || !item.dataset.name) return;
      showEmployeeDetail(item.dataset.name);
      resultBox.classList.remove('show');
      input.value = '';
    });

    document.addEventListener('click', (ev) => {
      if (!ev.target.closest('.search-bar')) resultBox.classList.remove('show');
    });
  }

  // ── 모달 공통 ──────────────────────────────
  function openModal(html) {
    let modal = document.getElementById('empModal');
    if (!modal) {
      modal = document.createElement('div');
      modal.id = 'empModal';
      modal.style = 'position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;';
      modal.innerHTML = `<div style="background:white;border-radius:12px;max-width:440px;width:100%;max-height:80vh;overflow-y:auto;position:relative;">
        <button onclick="closeModal()" style="position:absolute;top:8px;right:12px;border:none;background:none;font-size:20px;cursor:pointer;color:#888;">✕</button>
        <div id="empModalBody"></div>
      </div>`;
      document.body.appendChild(modal);
      modal.addEventListener('click', (ev) => { if (ev.target === modal) closeModal(); });
    }
    document.getElementById('empModalBody').innerHTML = html;
  }

  function closeModal() {
    const m = document.getElementById('empModal');
    if (m) m.remove();
  }

  // ── 개인 상세 모달 ─────────────────────────
  function showEmployeeDetail(name) {
    const e = DATA.employees.find(x => x.name === name);
    if (!e) return;

    const html = `
      <div class="emp-detail">
        <h3 style="margin-top:0;">${e.name} <span style="color:${e.retired ? '#c0392b' : '#27ae60'};font-size:13px;">${e.retired ? '(퇴사)' : '(재직)'}</span></h3>
        <div class="row"><span>부서</span><span>${e.dept}</span></div>
        <div class="row"><span>직급</span><span>${e.position}</span></div>
        <div class="row"><span>나이</span><span>${e.age ?? '-'}</span></div>
        <div class="row"><span>근속(년)</span><span>${e.tenure ?? '-'}</span></div>
        <div class="row"><span>입사일</span><span>${e.joinDate || '-'}</span></div>
        ${e.retired ? `<div class="row"><span>퇴사일</span><span>${e.retireDate || '-'}</span></div>` : ''}
        <div class="row"><span>입사경로</span><span>${e.joinReason}</span></div>
        <div class="row"><span>추천인</span><span>${e.referrer || '없음'}</span></div>
        <div class="row"><span>거주지역</span><span>${e.region}</span></div>
        <div class="row"><span>결혼여부</span><span>${e.marry}</span></div>
        <div class="row"><span>최종학력</span><span>${e.schoolL || '-'} ${e.majorL ? '(' + e.majorL + ')' : ''}</span></div>
        <div class="row"><span>자격증</span><span>${e.license || '없음'}</span></div>
        ${!e.retired ? `<button onclick="focusOnMap('${e.name.replace(/'/g, "\\'")}')" style="width:100%;margin-top:14px;padding:10px;background:var(--navy);color:white;border:none;border-radius:8px;cursor:pointer;font-size:13.5px;font-weight:600;">📍 지도에서 위치보기</button>` : ''}
      </div>`;
    openModal(html);
  }

  // ── 지역 클릭 → 거주자 명단 모달 ───────────
  function showRegionDetail(region) {
    const people = DATA.employees.filter(e => e.region === region && !e.retired)
      .sort((a, b) => a.dept.localeCompare(b.dept));

    const rows = people.length
      ? people.map(p => `
          <div class="row" style="cursor:pointer;" onclick="closeModal(); showEmployeeDetail('${p.name.replace(/'/g, "\\'")}')">
            <span>${p.name}</span>
            <span>${p.dept} · ${p.position}</span>
          </div>`).join('')
      : `<div class="row"><span>해당 지역 거주자가 없습니다.</span></div>`;

    const html = `
      <div class="emp-detail">
        <h3 style="margin-top:0;">📍 ${region} 거주자 (${people.length}명)</h3>
        ${rows}
      </div>`;
    openModal(html);
  }

  // 지역 표 클릭 위임 (표는 renderAll 시마다 다시 그려지므로 document에 위임)
  document.addEventListener('click', (ev) => {
    const row = ev.target.closest('tr.clickable-row[data-region]');
    if (row) showRegionDetail(row.dataset.region);
  });

  // ── 초기화 ─────────────────────────────────
  renderNav();
  setupSearch();
  loadData(false);
</script>
</body>
</html>
