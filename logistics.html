<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>공장 내 차량 현황</title>
  <link rel="icon" href="data:,">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
  :root{
    --ink:#222; --muted:#666; --line:#e6e6e6; --bg:#f7f8fa; --card:#fff;
    --cyan:#00FFFF; --green:#00FF00; --badge:#eef3ff;
    --brand:#0f62fe; --radius:16px; --shadow:0 6px 18px rgba(0,0,0,.05);
  }
  *{ box-sizing:border-box }
  html,body{ height:100% }
  body{ margin:0; background:var(--bg); color:var(--ink);
    font:14px/1.6 system-ui,-apple-system,Segoe UI,Roboto,Apple SD Gothic Neo,Noto Sans KR,Malgun Gothic,sans-serif; }
  .wrap{ max-width:980px; margin:24px auto; padding:0 16px 60px; }
  .header{ background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    box-shadow:var(--shadow); padding:16px 18px; margin-bottom:16px; }
  .title{ margin:0; font-size:20px; letter-spacing:-.2px }
  .subtitle{ margin:4px 0 0 0; color:var(--muted); font-size:12.5px; display:flex; align-items:center; gap:6px }
  .mini-spinner{ display:inline-block; width:12px; height:12px; border:2px solid #cfd8ff;
    border-top-color:var(--brand); border-radius:50%; animation:spin .8s linear infinite; vertical-align:-2px }
  @keyframes spin{ to{ transform:rotate(360deg) } }
  .badges{ display:flex; gap:6px; flex-wrap:wrap; align-items:center; margin-top:8px }
  .badge{ background:var(--badge); border:1px solid #d9e2ff; border-radius:999px; padding:3px 8px; font-size:12px }
  .toolbar{ display:flex; align-items:center; gap:8px; margin-top:10px; flex-wrap:wrap }
  .btn{ appearance:none; border:1px solid var(--line); background:#fff; border-radius:10px;
    padding:8px 12px; font-size:13px; cursor:pointer; }
  .btn:hover{ box-shadow:0 2px 8px rgba(0,0,0,.06) }
  .input,.select{ border:1px solid var(--line); background:#fff; border-radius:10px; padding:8px 10px; font-size:13px; width:100%; box-sizing:border-box }
  .select{ width:auto }
  .view-toggle{ display:flex; gap:0; border:1px solid var(--line); border-radius:10px; overflow:hidden }
  .view-toggle .tbtn{ border:0; background:#fff; padding:8px 12px; font-size:13px; cursor:pointer }
  .view-toggle .tbtn+.tbtn{ border-left:1px solid var(--line) }
  .view-toggle .tbtn.active{ background:var(--brand); color:#fff }
  .grid{ display:grid; grid-template-columns:1fr; gap:14px }
  .col{ display:grid; gap:14px }
  @media(min-width:900px){ .grid{ grid-template-columns:1fr 1fr } }
  .card{ background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    box-shadow:var(--shadow); overflow:hidden; }
  .stripe{ height:4px }
  .stripe.cyan{ background:var(--cyan) }
  .stripe.green{ background:var(--green) }
  .stripe.purple{ background:#a855f7 }
  .stripe.orange{ background:#f97316 }
  .card .head{ padding:16px 18px; border-bottom:1px solid var(--line);
    display:flex; align-items:center; justify-content:space-between; gap:8px }
  .card .head h3{ margin:0; font-size:15px }
  .head-right{ display:flex; align-items:center; gap:8px }
  .summary{ padding:8px 14px; color:var(--muted); border-bottom:1px solid var(--line); font-size:12.5px }
  table{ width:100%; border-collapse:separate; border-spacing:0 }
  thead th{ position:sticky; top:0; background:#fafbfd; border-bottom:1px solid var(--line);
    color:#333; font-weight:600; z-index:10; }
  th,td{ padding:8px 10px; text-align:center; overflow:hidden; text-overflow:ellipsis; white-space:nowrap }
  tbody tr:nth-child(odd){ background:#fcfcfe }
  tbody td{ border-bottom:1px solid #f1f1f4 }
  .empty{ padding:18px 14px; color:var(--muted) }
  tbody tr.plant-sep td{ border-top:2px solid #ff6b6b }
  td.cell-hit{ background:#fff2cc !important }
  .badge.search-pill{ background:#eef3ff; border:1px solid #d9e2ff; border-radius:999px; padding:4px 8px; font-size:12px }
  tbody tr.watch-hit td{ background:#d4edda !important; font-weight:600; }
  tbody tr.watch-hit:nth-child(odd) td{ background:#c3e6cb !important; }
  .watch-panel{ background:var(--card); border:1px solid #d9e2ff; border-radius:var(--radius);
    box-shadow:var(--shadow); padding:14px 16px; margin-bottom:14px; border-left:4px solid var(--brand); }
  .watch-panel-title{ font-size:13px; font-weight:600; color:#333; margin:0 0 10px 0;
    display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .watch-panel-title .hint{ font-size:11.5px; color:var(--muted); font-weight:normal;
    background:#f0f3f7; border-radius:6px; padding:2px 7px; }
  .watch-input-row{ display:flex; gap:6px; margin-bottom:10px; flex-wrap:wrap; align-items:center; }
  .watch-input{ border:1px solid var(--line); background:#fff; border-radius:10px;
    padding:7px 10px; font-size:14px; width:110px; letter-spacing:2px; text-align:center; font-weight:600; }
  .watch-input:focus{ outline:none; border-color:var(--brand); box-shadow:0 0 0 2px rgba(15,98,254,.12) }
  .watch-add-btn{ appearance:none; border:1px solid var(--brand); background:var(--brand); color:#fff;
    border-radius:10px; padding:7px 14px; font-size:13px; cursor:pointer; font-weight:600; }
  .watch-add-btn:hover{ background:#0353e9 }
  .watch-clear-btn{ appearance:none; border:1px solid #ddd; background:#fff; color:#888;
    border-radius:10px; padding:7px 10px; font-size:12px; cursor:pointer; }
  .watch-tags-row{ display:flex; flex-wrap:wrap; gap:6px; align-items:center; min-height:28px; }
  .watch-empty-hint{ color:var(--muted); font-size:12.5px }
  .watch-tag{ display:inline-flex; align-items:center; gap:5px; padding:4px 10px 4px 8px;
    border-radius:999px; font-size:13px; border:1.5px solid; font-weight:600; transition:transform .1s; }
  .watch-tag.found{ background:#d4edda; border-color:#82c89a; color:#155724; }
  .watch-tag.not-found{ background:#f8d7da; border-color:#f1a8ae; color:#721c24; }
  .watch-tag.pending{ background:#fff3cd; border-color:#ffc107; color:#856404; }
  .watch-tag .tag-status{ font-size:11px; font-weight:normal; opacity:.8 }
  .watch-tag .remove-btn{ background:none; border:none; padding:0; cursor:pointer;
    font-size:14px; line-height:1; opacity:.5; margin-left:2px; }
  .watch-tag .remove-btn:hover{ opacity:1 }
  @keyframes watchPulse{
    0%{ transform:scale(1); box-shadow:0 0 0 0 rgba(40,167,69,.6) }
    50%{ transform:scale(1.08); box-shadow:0 0 0 6px rgba(40,167,69,0) }
    100%{ transform:scale(1); }
  }
  .watch-tag.pulse{ animation:watchPulse .5s ease-out }
  .toast{ position:fixed; left:50%; bottom:18px; transform:translateX(-50%); background:#111; color:#fff;
    padding:8px 16px; border-radius:10px; opacity:0; pointer-events:none; transition:opacity .25s; z-index:10000; font-size:13px; }
  .toast.show{ opacity:1 }
  @media print{
    body{ background:#fff }
    .btn,.toast,.toolbar,.watch-panel{ display:none }
    .wrap{ max-width:1000px; margin:0; padding:0 }
    .grid{ grid-template-columns:1fr 1fr }
    .card{ box-shadow:none; border:1px solid #eee }
  }
  #analyticPanel{ display:none }
  .kpi-row{ display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px; margin-bottom:14px }
  .kpi{ background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px 16px;
    position:relative; overflow:hidden; }
  .kpi::before{ content:''; position:absolute; top:0; left:0; right:0; height:3px; background:var(--kc,#0f62fe) }
  .kpi-label{ font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:4px }
  .kpi-val{ font-size:22px; font-weight:700; line-height:1.1 }
  .kpi-sub{ font-size:11px; color:var(--muted); margin-top:2px }
  .an-card{ background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    box-shadow:var(--shadow); overflow:hidden; padding:16px 18px; margin-bottom:14px; }
  .an-card h4{ margin:0 0 12px; font-size:14px; color:#444; display:flex; align-items:center; gap:6px }
  .an-card h4 .dot{ display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--dc,#0f62fe) }
  .an-card h4 .an-collapse-btn{ margin-left:auto; flex-shrink:0; appearance:none; border:1px solid var(--line);
    background:#fff; border-radius:8px; padding:2px 8px; font-size:11px; cursor:pointer; color:var(--muted); }
  .an-card h4 .an-collapse-btn:hover{ background:#f3f4f6 }
  .an-card-body.collapsed{ display:none }
  .chart-wrap{ position:relative; height:200px }
  .chart-wrap.tall{ height:240px }
  .an-loading{ text-align:center; padding:40px; color:var(--muted); font-size:13px }
  .period-bar{
    display:flex; flex-direction:column; gap:8px;
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    box-shadow:var(--shadow); padding:12px 16px; margin-bottom:14px;
  }
  .period-bar-row{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .period-bar label{ font-size:12px; color:var(--muted); flex-shrink:0; min-width:28px }
  .period-presets{ display:flex; gap:0; border:1px solid var(--line); border-radius:10px; overflow:hidden; flex-shrink:0 }
  .period-presets .pbtn{ border:0; background:#fff; padding:7px 13px; font-size:13px; cursor:pointer }
  .period-presets .pbtn+.pbtn{ border-left:1px solid var(--line) }
  .period-presets .pbtn.active{ background:var(--brand); color:#fff }
  .period-custom{ display:flex; align-items:center; gap:6px; flex-wrap:wrap }
  .period-custom input[type=date]{
    border:1px solid var(--line); background:#fff; border-radius:10px;
    padding:6px 10px; font-size:13px; color:var(--ink);
  }
  .period-custom input[type=date]:focus{ outline:none; border-color:var(--brand) }
  .period-sep{ color:var(--muted); font-size:12px }
  .period-apply{ appearance:none; border:1px solid var(--brand); background:var(--brand); color:#fff;
    border-radius:10px; padding:7px 14px; font-size:13px; cursor:pointer; }
  .period-apply:hover{ background:#0353e9 }
  .period-badge{ font-size:12px; color:var(--muted); background:#f5f5f5; border-radius:6px; padding:3px 8px; margin-left:auto }
  .diff-badge{ display:inline-block; font-size:11px; font-weight:600; border-radius:999px; padding:1px 7px; margin-left:5px; }
  .diff-badge.up{ background:#dcfce7; color:#15803d }
  .diff-badge.down{ background:#fee2e2; color:#b91c1c }
  .diff-badge.flat{ background:#f3f4f6; color:#6b7280 }
  .dow-table td, .dow-table th{ padding:6px 10px; font-size:13px }
  .dow-table td.today-col{ background:#eff6ff; font-weight:700 }
  .dow-table tr:hover td{ background:#f8faff }

  /* ─── 혼잡도 그리드 패널 ─── */
  .cong-panel{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    box-shadow:var(--shadow); padding:12px 16px; margin-bottom:14px;
  }
  .cong-panel-header{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:10px;
  }
  .cong-panel-title{
    font-size:13px; font-weight:600; color:#333;
    display:flex; align-items:center; gap:6px;
  }
  .cong-live-badge{
    font-size:11px; padding:2px 8px; border-radius:999px;
    background:#fee2e2; color:#b91c1c;
  }
  .cong-updated{
    font-size:11px; color:var(--muted);
  }
  .cong-grid{
    display:grid; grid-template-columns:repeat(4,1fr); gap:8px;
  }
  @media(max-width:600px){
    .cong-grid{ grid-template-columns:repeat(2,1fr); }
  }
  .cong-cell{
    border:1px solid var(--line); border-radius:10px; padding:8px 10px;
    transition:box-shadow .15s;
  }
  .cong-cell:hover{ box-shadow:0 2px 8px rgba(0,0,0,.06) }
  .cong-type{
    font-size:11px; color:var(--muted); margin-bottom:6px; font-weight:600;
  }
  .cong-row{
    display:flex; align-items:center; gap:5px; margin-bottom:4px;
  }
  .cong-row:last-child{ margin-bottom:0 }
  .cong-plant{
    font-size:10px; color:var(--muted); width:28px; flex-shrink:0;
  }
  .cong-bar-wrap{
    flex:1; height:6px; border-radius:99px;
    background:#ebebeb; overflow:hidden;
  }
  .cong-bar{
    height:100%; border-radius:99px; transition:width .4s ease;
  }
  .cong-num{
    font-size:10px; font-weight:600; min-width:28px;
    text-align:right;
  }
  /* 색상 */
  .cong-ok   { background:#639922 }
  .cong-warn { background:#EF9F27 }
  .cong-danger{ background:#E24B4A }
  .cong-ok-txt   { color:#3B6D11 }
  .cong-warn-txt { color:#854F0B }
  .cong-danger-txt{ color:#A32D2D }
  </style>
</head>
<body>
<div class="wrap">
  <section class="header">
    <!-- 제목 + 탭 (같은 줄) -->
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px">
      <div>
        <h1 class="title">공장 내 차량 현황</h1>
        <p class="subtitle" id="updated" style="margin-top:3px">업데이트 준비 중… · 반월/시화 · 계근</p>
      </div>
      <div class="view-toggle" role="tablist" style="flex-shrink:0;margin-top:2px">
        <button class="tbtn active" id="btnViewLive" role="tab">입차</button>
        <button class="tbtn" id="btnViewAnalytic" role="tab">분석</button>
      </div>
    </div>
    <!-- 1행: 필터 + 검색 -->
    <div style="display:flex;gap:7px;margin-top:12px;align-items:center">
      <select id="plantFilter" class="select" style="flex:0 0 90px;width:90px;min-width:0">
        <option value="all">전체</option>
        <option value="banwol">반월</option>
        <option value="sihwa">시화</option>
      </select>
      <input id="searchInput" class="input" placeholder="0000" maxlength="4" inputmode="numeric" style="width:72px;flex:0 0 72px;min-width:0;letter-spacing:2px;text-align:center;font-weight:600" />
      <button class="watch-add-btn" id="searchBtn" style="flex-shrink:0">검색</button>
      <span id="searchSummary" class="badge search-pill" style="display:none;flex-shrink:0"></span>
    </div>
    <!-- 2행: 감시 차량 -->
    <div id="watchPanelEl" style="margin-top:8px">
      <div style="display:flex;gap:7px;align-items:center">
        <span class="select" style="display:inline-flex;align-items:center;justify-content:center;width:90px;flex:0 0 90px;color:#555;white-space:nowrap;cursor:default">감시 차량</span>
        <span class="badge" id="watchCountBadge" style="display:none;flex-shrink:0"></span>
        <input type="text" id="watchInput" placeholder="0000" maxlength="4" inputmode="numeric"
          style="width:72px;flex:0 0 72px;padding:7px 6px;font-size:13px;letter-spacing:2px;text-align:center;font-weight:600;border:1px solid var(--line);border-radius:10px;background:#fff" />
        <button class="watch-add-btn" id="watchAddBtn" style="flex-shrink:0">등록</button>
        <button class="watch-clear-btn" id="watchClearBtn" style="flex-shrink:0">삭제</button>
      </div>
      <div class="watch-tags-row" id="watchTagsRow" style="margin-top:6px">
        <span class="watch-empty-hint"></span>
      </div>
    </div>
  </section>

  <!-- ★ 차량 검색 결과 통합 패널 (4자리 검색 시 표시) -->
  <section id="carSearchPanel" style="display:none;background:#fff;border:1px solid #bfdbfe;border-radius:16px;box-shadow:0 6px 18px rgba(0,0,0,.05);margin-bottom:14px;overflow:hidden">
    <div style="padding:11px 16px;border-bottom:1px solid #e0eaff;background:#eff6ff;display:flex;align-items:center;gap:8px">
      <span style="font-size:14px">🔍</span>
      <span style="font-size:13px;font-weight:700;color:#1e40af" id="carSearchTitle"></span>
    </div>
    <div id="carSearchLocation" style="padding:10px 16px;font-size:13px;border-bottom:1px solid #f1f1f4;color:#374151"></div>
    <div id="carSearchHistory" style="padding:10px 16px;font-size:12px"></div>
  </section>

  <!-- ★ 혼잡도 그리드 패널 (입차 조회 탭 전용) -->
  <section class="cong-panel" id="congPanel">
    <div class="cong-panel-header">
      <div class="cong-panel-title">
        현재 혼잡도
        <span class="cong-live-badge">● 실시간</span>
      </div>
      <span class="cong-updated" id="congUpdated"></span>
    </div>
    <div class="cong-grid" id="congGrid">
      <!-- JS로 렌더 -->
    </div>
  </section>



  <section class="grid" id="weighingPanel" style="display:none"></section>
  <section class="grid" id="sections"></section>

  <div class="period-bar" id="periodBar" style="display:none">
    <div class="period-bar-row">
      <label>기간</label>
      <div class="period-presets">
        <button class="pbtn active" data-preset="today">오늘</button>
        <button class="pbtn" data-preset="week">이번주</button>
        <button class="pbtn" data-preset="lastweek">저번주</button>
        <button class="pbtn" data-preset="custom">직접입력</button>
      </div>
      <div class="period-custom" id="periodCustom" style="display:none">
        <input type="month" id="anYearMonth" />
        <button class="period-apply" id="anApplyBtn">조회</button>
      </div>
    </div>
    <div class="period-bar-row">
      <label>품목</label>
      <div class="view-toggle" id="anTypeTabs"></div>
    </div>
  </div>

  <section id="analyticPanel"></section>
</div>

<div class="toast" id="toast"></div>

<script>
const SNAPSHOT_URL = 'https://script.google.com/macros/s/AKfycbyrP3HkOljWmwBBwutuhgMt-jT4lUewDXjYe8UOw9AtnCfc8SZ65zaSDkBNSkrVx25UQg/exec';
const API_TOKEN    = 'DY_SCALE';

const SLOT_LABELS = Array.from({length:144}, (_,i) => {
  const h = Math.floor(i*10/60), m = (i*10)%60;
  return m === 0 ? `${String(h).padStart(2,'0')}시` : null;
});
const SLOT_LABELS_FULL = Array.from({length:144}, (_,i) => {
  const h = Math.floor(i*10/60), m = (i*10)%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
});

const LS = { collapse:'ui.collapse.map', plant:'ui.plant', q:'ui.q' };

const CAPA_MAP = {
  '반월': { '제품 상차중': 5, '원료 하차중': 5, '부자재 입차중': 5, '컨테이너 입차중': 3 },
  '시화': { '제품 상차중': 10, '원료 하차중': 10, '부자재 입차중': 5, '컨테이너 입차중': 3 },
};

// ★ 혼잡도 패널에 쓸 품목 정의
const CONG_TYPES = [
  { key:'제품 상차중',     label:'제품',    capaB:5,  capaS:7  },
  { key:'원료 하차중',     label:'원료',    capaB:5,  capaS:10 },
  { key:'부자재 입차중',   label:'부자재',  capaB:5,  capaS:5  },
  { key:'컨테이너 입차중', label:'컨테이너',capaB:3,  capaS:3  },
];

function congColor(pct){
  return pct >= 100 ? 'cong-danger' : pct >= 60 ? 'cong-warn' : 'cong-ok';
}
function congColorTxt(pct){
  return pct >= 100 ? 'cong-danger-txt' : pct >= 60 ? 'cong-warn-txt' : 'cong-ok-txt';
}

function renderCongPanel(data, plantFilter){
  const grid = document.getElementById('congGrid');
  if(!grid || !data || !data.sections) return;

  // 섹션 제목 → rows 매핑
  const sectionMap = {};
  data.sections.forEach(sec => {
    const counts = { '반월': 0, '시화': 0 };
    sec.groups.forEach(g => {
      counts[g.plant] = (counts[g.plant] || 0) + g.rows.filter(r => !isMonoDigit(r.car)).length;
    });
    sectionMap[sec.title] = counts;
  });

  grid.innerHTML = CONG_TYPES.map(t => {
    const counts = sectionMap[t.key] || { '반월': 0, '시화': 0 };
    const bw = counts['반월'], sh = counts['시화'];
    const pctB = Math.round(bw / t.capaB * 100);
    const pctS = Math.round(sh / t.capaS * 100);
    const barWidthB = Math.min(pctB, 100);
    const barWidthS = Math.min(pctS, 100);

    const showB = (plantFilter !== 'sihwa');
    const showS = (plantFilter !== 'banwol');

    const rowB = showB ? `
      <div class="cong-row">
        <span class="cong-plant">반월</span>
        <div class="cong-bar-wrap">
          <div class="cong-bar ${congColor(pctB)}" style="width:${barWidthB}%"></div>
        </div>
        <span class="cong-num ${congColorTxt(pctB)}">${bw}/${t.capaB}</span>
      </div>` : '';

    const rowS = showS ? `
      <div class="cong-row">
        <span class="cong-plant">시화</span>
        <div class="cong-bar-wrap">
          <div class="cong-bar ${congColor(pctS)}" style="width:${barWidthS}%"></div>
        </div>
        <span class="cong-num ${congColorTxt(pctS)}">${sh}/${t.capaS}</span>
      </div>` : '';

    // 셀 테두리 색: 가장 혼잡한 쪽 기준
    const worstPct = showB && showS ? Math.max(pctB, pctS) : showB ? pctB : pctS;
    const borderColor = worstPct >= 100 ? '#fca5a5' : worstPct >= 60 ? '#fcd34d' : '#d1fae5';

    return `<div class="cong-cell" style="border-color:${borderColor}">
      <div class="cong-type">${t.label}</div>
      ${rowB}${rowS}
    </div>`;
  }).join('');

  document.getElementById('congUpdated').textContent = data.updatedAt ? `${data.updatedAt} 기준` : '';
}

function last4(s){ const d=String(s||'').replace(/\D+/g,''); return d.length>=4?d.slice(-4):''; }
function isMonoDigit(s){ const d=String(s||'').replace(/\D+/g,''); return d.length>=4&&d.split('').every(c=>c===d[0]); }
function fmtTime(raw){
  if(raw==null) return '';
  const s0=String(raw).trim(); if(!s0) return '';
  const m=s0.match(/(\d{1,2}):(\d{2})(?::\d{2})?/);
  if(m) return `${m[1].padStart(2,'0')}:${m[2]}`;
  const d=s0.replace(/\D/g,'');
  if(d.length>=4) return `${d.slice(0,2)}:${d.slice(2,4)}`;
  return s0;
}
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1800); }
function stripeClass(c){ return String(c||'').toLowerCase().includes('00ff00')?'green':'cyan'; }
const collapseMap=(()=>{ try{ return JSON.parse(localStorage.getItem(LS.collapse)||'{}'); }catch(_){return{};} })();

function api(params){
  const qs=Object.entries(params).filter(([,v])=>v!=null&&v!=='').map(([k,v])=>encodeURIComponent(k)+'='+encodeURIComponent(v)).join('&');
  return fetch(`${SNAPSHOT_URL}?token=${API_TOKEN}&_ts=${Date.now()}&${qs}`).then(r=>r.json());
}
function timeToMin(t){
  if(!t) return null;
  const s=fmtTime(t); const m=s.match(/(\d{1,2}):(\d{2})/);
  if(!m) return null;
  return parseInt(m[1])*60+parseInt(m[2]);
}
function diffMin(inT,outT){
  const a=timeToMin(inT), b=timeToMin(outT);
  if(a==null||b==null) return null;
  let d=b-a; if(d<0) d+=1440; return d;
}
function nowKSTMin(){
  const kst=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Seoul'}));
  return kst.getHours()*60+kst.getMinutes();
}
function isOvernightEntry(inT, outT){
  const inM = timeToMin(inT), outM = timeToMin(outT);
  if(inM == null || outM == null) return false;
  return outM < inM;
}
const WORK_START_MIN = 6 * 60;
function effectiveDurMin(inT, outT, type){
  if(type !== 'product') return diffMin(inT, outT);
  const inM = timeToMin(inT), outM = timeToMin(outT);
  if(inM == null || outM == null) return null;
  if(outM < inM){
    if(outM <= WORK_START_MIN) return null;
    return outM - WORK_START_MIN;
  }
  if(outM <= WORK_START_MIN) return null;
  const effectiveIn = inM < WORK_START_MIN ? WORK_START_MIN : inM;
  const dur = outM - effectiveIn;
  return dur > 0 ? dur : null;
}
function todayKST(){
  const now = new Date();
  const kst = new Date(now.getTime() + 9 * 60 * 60 * 1000);
  return kst.toISOString().slice(0, 10);
}
function daysAgo(n){
  const now = new Date();
  const kst = new Date(now.getTime() + 9 * 60 * 60 * 1000 - n * 86400000);
  return kst.toISOString().slice(0, 10);
}
function thisWeekMonday(){
  const now = new Date();
  const kst = new Date(now.getTime() + 9 * 60 * 60 * 1000);
  const day = kst.getUTCDay();
  const diff = day === 0 ? 6 : day - 1;
  const mon = new Date(kst.getTime() - diff * 86400000);
  return mon.toISOString().slice(0, 10);
}
function lastWeekRange(){
  const monStr = thisWeekMonday();
  const mon = new Date(monStr + 'T00:00:00Z');
  const lastMon = new Date(mon.getTime() - 7 * 86400000);
  const lastSun = new Date(lastMon.getTime() + 6 * 86400000);
  return { from: lastMon.toISOString().slice(0, 10), to: lastSun.toISOString().slice(0, 10) };
}
function dateToDowLabel(dateStr){
  const dow = ['일','월','화','수','목','금','토'];
  const d = new Date(dateStr + 'T00:00:00Z');
  const mm = String(d.getUTCMonth() + 1).padStart(2, '0');
  const dd = String(d.getUTCDate()).padStart(2, '0');
  return `${dow[d.getUTCDay()]}(${mm}/${dd})`;
}

let watchList={};
async function fetchWatch(){
  try{
    const res=await api({action:'get_watch'}); const raw=res.watch||{};
    Object.keys(raw).forEach(k=>{ if(watchList[k]===undefined) watchList[k]='pending'; });
    Object.keys(watchList).forEach(k=>{ if(raw[k]===undefined) delete watchList[k]; });
    renderWatchTags();
  }catch(e){}
}
async function addWatch(num,silent=false){
  const c=String(num).replace(/\D/g,'').slice(-4);
  if(c.length!==4){ if(!silent) showToast('4자리 숫자를 입력하세요'); return false; }
  if(watchList[c]!==undefined){ if(!silent) showToast(`${c} 이미 등록됨`); return false; }
  try{
    const res=await api({action:'add_watch',num:c});
    if(!res.ok){ if(!silent) showToast(res.error||'등록 실패'); return false; }
    watchList[c]='pending'; renderWatchTags(); if(!silent) showToast(`${c} 등록 완료`); return true;
  }catch(e){ if(!silent) showToast('오류 발생'); return false; }
}
window.removeWatch=async function(num,silent=false){
  try{
    await api({action:'del_watch',num}); delete watchList[num];
    renderWatchTags(); rerenderCache(); if(!silent) showToast(`${num} 삭제됨`);
  }catch(e){}
};
function renderWatchTags(){
  const row=document.getElementById('watchTagsRow'); const keys=Object.keys(watchList);
  const badge=document.getElementById('watchCountBadge');
  if(!keys.length){ row.innerHTML='<span class="watch-empty-hint"></span>'; badge.style.display='none'; return; }
  badge.style.display='inline-block'; badge.textContent=`감시 ${keys.length}대`;
  row.innerHTML=keys.map(k=>{
    const st=watchList[k];
    const cls=st==='found'?'found':st==='not-found'?'not-found':'pending';
    const icon=st==='found'?'✅':st==='not-found'?'❌':'⏳';
    const label=st==='found'?'입차됨':st==='not-found'?'미확인':'대기';
    return `<span class="watch-tag ${cls}" id="wtag-${k}">${icon} <strong>${k}</strong><span class="tag-status">${label}</span><button class="remove-btn" onclick="removeWatch('${k}')">✕</button></span>`;
  }).join('');
}
function syncWatch(allCars){
  if(!Object.keys(watchList).length) return;
  const found=new Set(allCars.map(c=>last4(c)).filter(Boolean)); let changed=false;
  Object.keys(watchList).forEach(k=>{ const ns=found.has(k)?'found':'not-found'; if(watchList[k]!==ns){ watchList[k]=ns; changed=true; } });
  if(changed){
    renderWatchTags();
    Object.keys(watchList).filter(k=>watchList[k]==='found').forEach(k=>{
      const el=document.getElementById(`wtag-${k}`);
      if(el){el.classList.remove('pulse');void el.offsetWidth;el.classList.add('pulse');}
    });
  }
}

  elSections.innerHTML=`

function buildHistoryRows(carNum4){
  const TYPE_LABEL={product:'제품',raw:'원료',sub:'부자재',container:'컨테이너'};
  const TYPE_COLOR={product:'#06b6d4',raw:'#22c55e',sub:'#f97316',container:'#a855f7'};
  const allKey=`all_${__anFrom}_${__anTo}`;
  const allCached=__anCache[allKey];
  if(!allCached) return '';
  const rows=[];
  const seen=new Set();
  const types=['product','raw','sub','container'];
  const collectRows=(list,plant,tp,date)=>{
    (list||[]).filter(r=>last4(r.CARNUM||'')===carNum4&&!isMonoDigit(r.CARNUM)).forEach(r=>{
      const dedup=`${date}|${tp}|${plant}|${r.INTIME}|${r.CARNUM}`;
      if(seen.has(dedup)) return; seen.add(dedup);
      rows.push({type:tp,plant,intime:fmtTime(r.INTIME),outtime:fmtTime(r.OUTIME),
        itemnm:String(r.ITEMNM||'').trim(),
        silwei:Number(String(r.SILWEI||'').replace(/[^\d.]/g,''))||null,date});
    });
  };
  if(allCached.mode==='all-daily'){
    types.forEach(tp=>{ const d=allCached.data[tp]||{};
      collectRows(d.banwol,'반월',tp,__anFrom); collectRows(d.sihwa,'시화',tp,__anFrom); });
  } else if(allCached.mode==='all-weekly'){
    const {dates,perDate}=allCached;
    types.forEach((tp,ti)=>{ dates.forEach((dt,di)=>{ const d=perDate[ti][di]||{};
      collectRows(d.banwol,'반월',tp,dt); collectRows(d.sihwa,'시화',tp,dt); }); });
  }
  if(!rows.length) return '';
  rows.sort((a,b)=>{
    if(a.date!==b.date) return a.date<b.date?-1:1;
    // 출차 시간 오름차순. 미출차(outtime 없음)는 맨 뒤.
    const aOut = timeToMin(a.outtime), bOut = timeToMin(b.outtime);
    if(aOut==null&&bOut==null) return 0;
    if(aOut==null) return 1;
    if(bOut==null) return -1;
    return aOut - bOut;
  });
  const byDate={};
  rows.forEach(r=>{ if(!byDate[r.date]) byDate[r.date]=[]; byDate[r.date].push(r); });
  return Object.entries(byDate).map(([date,list])=>{
    const dateLabel=date===todayKST()?'오늘':date;
    const rowHtml=list.map(r=>{
      const label=TYPE_LABEL[r.type]||r.type;
      const color=TYPE_COLOR[r.type]||'#6366f1';
      const detail=(r.type==='sub'||r.type==='container')&&r.itemnm?` · ${r.itemnm}`:'';
      const sil=r.silwei?` · ${r.silwei.toLocaleString()}kg`:'';
      const dur=(()=>{
        let d=effectiveDurMin(r.intime,r.outtime,r.type);
        if((d==null||d<=0)&&r.intime&&r.outtime){
          const inM=timeToMin(r.intime),outM=timeToMin(r.outtime);
          if(inM!=null&&outM!=null){ let raw=outM-inM; if(raw<0)raw+=1440; if(raw>0&&raw<=900)d=raw; }
        }
        if(!d||d<=0) return '';
        const ov=r.intime&&r.outtime&&timeToMin(r.outtime)<timeToMin(r.intime);
        return ` · ${d}분${ov?' 🌙':''}`;
      })();
      return `<div style="display:flex;align-items:center;gap:7px;padding:4px 0;border-bottom:1px solid #f3f4f6">
        <span style="width:28px;font-size:11px;color:#9ca3af;flex-shrink:0">${r.plant}</span>
        <span style="padding:1px 7px;border-radius:999px;background:${color}22;color:${color};font-size:11px;font-weight:600;flex-shrink:0">${label}${detail}</span>
        <span style="color:#374151;font-size:12px">${r.intime||'-'} → ${r.outtime||'미출차'}</span>
        <span style="color:#9ca3af;font-size:11px">${dur}${sil}</span>
      </div>`;
    }).join('');
    return `<div style="margin-bottom:6px">
      <div style="font-size:10px;font-weight:600;color:#9ca3af;margin-bottom:3px;letter-spacing:.03em">${dateLabel}</div>
      ${rowHtml}
    </div>`;
  }).join('');
}

}

let __anCharts={}, __anType='product', __anCache={}, __anPeriod='today';
let __anFrom=todayKST(), __anTo=todayKST();

const AN_TYPES=[
  {key:'all',label:'전체',dc:'#6366f1'},
  {key:'product',label:'제품',dc:'#06b6d4'},
  {key:'raw',label:'원료',dc:'#22c55e'},
  {key:'sub',label:'부자재',dc:'#f97316'},
  {key:'container',label:'컨테이너',dc:'#a855f7'},
];

function destroyCharts(){ Object.values(__anCharts).forEach(c=>{ try{c.destroy();}catch(e){} }); __anCharts={}; }

function renderCarHistory(carNum4, cache){
  const TYPE_LABEL={product:'제품',sub:'부자재',container:'컨테이너',raw:'원료'};
  const rows=[];
  const seen=new Set();

  const collectRows=(list, plant, tp, date)=>{
    (list||[]).filter(r=>last4(r.CARNUM||'')===carNum4&&!isMonoDigit(r.CARNUM)).forEach(r=>{
      const dedup=`${date}|${tp}|${plant}|${r.INTIME}|${r.CARNUM}`;
      if(seen.has(dedup)) return;
      seen.add(dedup);
      rows.push({type:tp,plant,intime:fmtTime(r.INTIME),outtime:fmtTime(r.OUTIME),
        itemnm:String(r.ITEMNM||'').trim(),
        silwei:Number(String(r.SILWEI||'').replace(/[^\d.]/g,''))||null,
        date});
    });
  };

  const curKey=`${__anType}_${__anFrom}_${__anTo}`;
  const curCached=__anCache[curKey];
  if(!curCached) return '';

  if(curCached.mode==='daily'){
    collectRows(curCached.data.banwol,'반월',__anType,__anFrom);
    collectRows(curCached.data.sihwa,'시화',__anType,__anFrom);
  } else if(curCached.mode==='all-daily'){
    (curCached.types||['product','raw','sub','container']).forEach(tp=>{
      const d=curCached.data[tp]||{};
      collectRows(d.banwol,'반월',tp,__anFrom);
      collectRows(d.sihwa,'시화',tp,__anFrom);
    });
  } else if(curCached.mode==='weekly'&&curCached.dates){
    curCached.dates.forEach(dt=>{
      const k=`${__anType}_${dt}_${dt}`;
      const dc=__anCache[k];
      if(dc&&dc.mode==='daily'){
        collectRows(dc.data.banwol,'반월',__anType,dt);
        collectRows(dc.data.sihwa,'시화',__anType,dt);
      }
    });
  } else if(curCached.mode==='all-weekly'&&curCached.dates){
    (curCached.types||['product','raw','sub','container']).forEach(tp=>{
      curCached.dates.forEach(dt=>{
        const k=`${tp}_${dt}_${dt}`;
        const dc=__anCache[k];
        if(dc&&dc.mode==='daily'){
          collectRows(dc.data.banwol,'반월',tp,dt);
          collectRows(dc.data.sihwa,'시화',tp,dt);
        }
      });
    });
  }
  if(!rows.length) return '';

  rows.sort((a,b)=>{
    if(a.date!==b.date) return a.date<b.date?-1:1;
    return (timeToMin(a.intime)||0)-(timeToMin(b.intime)||0);
  });

  const byDate={};
  rows.forEach(r=>{ if(!byDate[r.date]) byDate[r.date]=[]; byDate[r.date].push(r); });

  const dateHtml=Object.entries(byDate).map(([date,list])=>{
    const rowHtml=list.map(r=>{
      const label=TYPE_LABEL[r.type]||r.type;
      const detail=(r.type==='sub'||r.type==='container')&&r.itemnm?` · ${r.itemnm}`:'';
      const sil=r.silwei?` · ${r.silwei.toLocaleString()}kg`:'';
      const dur=(()=>{ const d=effectiveDurMin(r.intime,r.outtime,r.type); return d&&d>0?` · ${d}분`:''; })();
      return `<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f1f1f4;font-size:12px">
        <span style="width:50px;color:var(--muted);flex-shrink:0">${r.plant}</span>
        <span style="padding:1px 7px;border-radius:999px;background:#eef3ff;color:#0f62fe;font-size:11px;flex-shrink:0">${label}${detail}</span>
        <span style="color:#333">${r.intime||'-'} → ${r.outtime||'미출차'}</span>
        <span style="color:var(--muted);font-size:11px">${dur}${sil}</span>
      </div>`;
    }).join('');
    const dateLabel=date===todayKST()?'오늘':date;
    return `<div style="margin-bottom:8px"><div style="font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px">${dateLabel}</div>${rowHtml}</div>`;
  }).join('');

  return anCard(
    `<span style="font-size:14px">🚛</span> 차량 <strong>${carNum4}</strong> 히스토리 <span style="font-size:11px;font-weight:400;color:var(--muted);margin-left:6px">${rows.length}건</span>`,
    dateHtml
  );
}

function applyPreset(preset){
  __anPeriod=preset; const today=todayKST();
  if(preset==='today'){ __anFrom=today; __anTo=today; }
  else if(preset==='week'){ __anFrom=thisWeekMonday(); __anTo=today; }
  else if(preset==='lastweek'){ const r=lastWeekRange(); __anFrom=r.from; __anTo=r.to; }
  // 기간 바뀌면 all_ 캐시 무효화 — 히스토리가 이전 기간 데이터 섞이는 현상 방지
  Object.keys(__anCache).filter(k=>k.startsWith('all_')).forEach(k=>delete __anCache[k]);
  syncPeriodUI();
}
function syncPeriodUI(){
  document.querySelectorAll('.pbtn').forEach(b=>b.classList.toggle('active',b.dataset.preset===__anPeriod));
  const ymi=document.getElementById('anYearMonth');
  if(ymi) ymi.value=__anFrom.slice(0,7);

  if(badge) badge.textContent=__anFrom===__anTo?__anFrom:`${__anFrom} ~ ${__anTo}`;
}

  document.querySelector('.period-presets').addEventListener('click',e=>{

    if(preset==='custom'){ __anPeriod='custom'; document.getElementById('periodCustom').style.display='flex'; syncPeriodUI(); }

    const lastDay=new Date(y,m,0).getDate();
    __anTo=`${y}-${String(m).padStart(2,'0')}-${lastDay}`;

      }))
    ));
    __anCache[allKey]={mode:'all-weekly',types,dates,perDate:allResults};
  } else {

    // (all_ 이미 있어도 개별 캐시가 비어있을 수 있으므로 항상 타입별로 체크)
    const dataByType={};

      const k=`${tp}_${__anFrom}_${__anTo}`;
      if(__anCache[k]&&__anCache[k].data&&
         (__anCache[k].data.banwol||__anCache[k].data.sihwa)){

        dataByType[tp]=d;
      }
    }));

  }
}

function calcCongestionStacked(rowsByDate, plantFilter) {
  const SLOTS = 144;
  const TYPES = ['product', 'raw', 'sub', 'container'];
  const COLORS = { product: '#06b6d4', raw: '#22c55e', sub: '#f97316', container: '#a855f7' };
  const LABELS = { product: '제품', raw: '원료', sub: '부자재', container: '컨테이너' };
  const stackedTimelines = {};
  TYPES.forEach(t => stackedTimelines[t] = Array(SLOTS).fill(0));
  const daysCount = rowsByDate.length || 1;
  rowsByDate.forEach(({ rows }) => {
    const filtered = rows.filter(r =>
      plantFilter === 'all' || (plantFilter === 'banwol' && r._plant === '반월') || (plantFilter === 'sihwa' && r._plant === '시화')
    );
    filtered.forEach(r => {
      const inM = timeToMin(r.INTIME), outM = timeToMin(r.OUTIME);
      if (inM == null) return;
      const typeKey = r._type || 'product';
      const WORK_SLOT = WORK_START_MIN / 10;
      const isOvernight = outM != null && outM < inM;
      if (isOvernight) {
        if (typeKey !== 'product') return;
        if (outM == null || outM <= WORK_START_MIN) return;
        const start = WORK_SLOT;
        const end = Math.ceil(outM / 10);
        if (stackedTimelines[typeKey]) {
          for (let s = start; s < Math.min(end, SLOTS); s++) stackedTimelines[typeKey][s]++;
        }
        return;
      }
      const rawStart = Math.floor(inM / 10);
      const start = (typeKey === 'product') ? Math.max(rawStart, WORK_SLOT) : rawStart;
      const end = outM != null && outM > inM ? Math.ceil(outM / 10) : start + 1;
      if (start >= end) return;
      if (stackedTimelines[typeKey]) {
        for (let s = start; s < Math.min(end, SLOTS); s++) stackedTimelines[typeKey][s]++;
      }
    });
  });
  if (daysCount > 1) {
    TYPES.forEach(t => {
      stackedTimelines[t] = stackedTimelines[t].map(v => Math.round(v / daysCount * 10) / 10);
    });
  }
  const datasets = TYPES.map(t => ({
    label: LABELS[t], data: stackedTimelines[t], backgroundColor: COLORS[t], stack: 'stack0', borderRadius: 2
  }));
  const totalTimeline = Array(SLOTS).fill(0).map((_, i) => TYPES.reduce((sum, t) => sum + stackedTimelines[t][i], 0));
  const sorted = totalTimeline.filter(v => v > 0).sort((a, b) => a - b);
  const rawCapa = sorted[Math.floor(sorted.length * 0.95)] || 5;
  const capa = Math.max(5, Math.ceil(rawCapa / 5) * 5);
  return { datasets, totalTimeline, capa };
}

function calcCongestion(rowsByDate, plantFilter, type) {
  const SLOTS = 144;
  const daysCount = rowsByDate.length || 1;
  const globalTimeline = Array(SLOTS).fill(0);
  const WORK_SLOT = WORK_START_MIN / 10;
  const byDate = rowsByDate.map(({ date, rows }) => {
    const timeline = Array(SLOTS).fill(0);
    const filtered = rows.filter(r =>
      plantFilter === 'all' ||
      (plantFilter === 'banwol' && r._plant === '반월') ||
      (plantFilter === 'sihwa' && r._plant === '시화')
    );
    filtered.forEach(r => {
      const inM = timeToMin(r.INTIME), outM = timeToMin(r.OUTIME);
      if (inM == null) return;
      const isProduct = (type === 'product') || (r._type === 'product');
      const isOvernight = outM != null && outM < inM;
      if (isOvernight) {
        if (!isProduct) return;
        if (outM == null || outM <= WORK_START_MIN) return;
        const start = WORK_SLOT;
        const end = Math.ceil(outM / 10);
        for (let s = start; s < Math.min(end, SLOTS); s++) timeline[s]++;
        return;
      }
      const rawStart = Math.floor(inM / 10);
      const start = isProduct ? Math.max(rawStart, WORK_SLOT) : rawStart;
      const nowSlot = Math.floor(nowKSTMin() / 10);
      const end = outM != null && outM > inM ? Math.ceil(outM / 10) : Math.min(nowSlot + 1, SLOTS);
      if (start >= end) return;
      for (let s = start; s < Math.min(end, SLOTS); s++) timeline[s]++;
    });
    timeline.forEach((v, i) => globalTimeline[i] += v);
    return { date, timeline };
  });
  globalTimeline.forEach((v, i) => globalTimeline[i] = Math.round(v / daysCount * 10) / 10);
  const sorted = globalTimeline.filter(v => v > 0).sort((a, b) => a - b);
  const rawCapa = sorted[Math.floor(sorted.length * 0.95)] || 5;
  const capa = Math.max(5, Math.ceil(rawCapa / 5) * 5);
  return { byDate, capa, globalTimeline };
}

function congKpiHtml(timeline,capa){
  const peakSlot=timeline.indexOf(Math.max(...timeline));
  const peakVal=timeline[peakSlot]||0;
  const peakPct=Math.round(peakVal/capa*100);
  const dangerSlots=timeline.filter(v=>v/capa>=1.0).length;
  const warningSlots=timeline.filter(v=>v/capa>=0.8&&v/capa<1.0).length;
  const dangerH=Math.round(dangerSlots*10/60*10)/10;
  const warningH=Math.round(warningSlots*10/60*10)/10;
  const congColor=peakPct>=100?'#ef4444':peakPct>=80?'#f59e0b':'#10b981';
  return {peakSlot,peakVal,peakPct,dangerSlots,warningSlots,dangerH,warningH,congColor,
    html:`
      <div class="kpi" style="--kc:${congColor}">
        <div class="kpi-label">피크 혼잡도</div>
        <div class="kpi-val" style="color:${congColor}">${peakPct}<span style="font-size:14px;font-weight:400">%</span></div>
        <div class="kpi-sub">${SLOT_LABELS_FULL[peakSlot]} · ${peakVal}대 동시</div>
      </div>
      <div class="kpi" style="--kc:#6366f1">
        <div class="kpi-label">추정 CAPA</div>
        <div class="kpi-val">${capa}<span style="font-size:14px;font-weight:400">대</span></div>
        <div class="kpi-sub">95퍼센타일 기준</div>
      </div>
      <div class="kpi" style="--kc:#ef4444">
        <div class="kpi-label">위험 구간</div>
        <div class="kpi-val" style="color:#ef4444">${dangerH}<span style="font-size:14px;font-weight:400">h</span></div>
        <div class="kpi-sub">혼잡도 100% 초과 (${dangerSlots}슬롯)</div>
      </div>
      <div class="kpi" style="--kc:#f59e0b">
        <div class="kpi-label">주의 구간</div>
        <div class="kpi-val" style="color:#f59e0b">${warningH}<span style="font-size:14px;font-weight:400">h</span></div>
        <div class="kpi-sub">혼잡도 80~100% (${warningSlots}슬롯)</div>
      </div>`
  };
}

  panel.innerHTML+=anCard(`<span class="dot" style="--dc:#6366f1"></span>날짜별 상세`,
    `<div style="overflow-x:auto"><table class="dow-table">
      <thead><tr><th>날짜</th><th style="text-align:left">건수</th>${plantFilter==='all'?'<th>반월</th><th>시화</th>':''}<th>중량</th></tr></thead>
      <tbody>${dowHTML}</tbody>
      <tfoot><tr style="font-weight:700;background:#f8faff">
        <td>합계</td><td style="text-align:left">${totalCnt}건</td>
        ${plantFilter==='all'?`<td>${daily.reduce((s,d)=>s+d.banwol.count,0)}</td><td>${daily.reduce((s,d)=>s+d.sihwa.count,0)}</td>`:''}
        <td>${totalSil>=1000?(totalSil/1000).toFixed(1)+'톤':totalSil+'kg'}</td>
      </tr></tfoot>
    </table></div>`
  );

  const isRaw=(type==='raw');
  const isSub=(type==='sub'||type==='container');
  const allRows=rowsByDate.flatMap(({date,rows})=>rows.map(r=>({...r,_date:date})));
  const filteredRows=allRows.filter(r=>plantFilter==='all'||(plantFilter==='banwol'&&r._plant==='반월')||(plantFilter==='sihwa'&&r._plant==='시화'));
  const bwAll=filteredRows.filter(r=>r._plant==='반월');
  const shAll=filteredRows.filter(r=>r._plant==='시화');
  const bwSil=isRaw?bwAll.reduce((s,r)=>s+(Number(r.RECCNT||0)),0):bwAll.reduce((s,r)=>s+(Number(String(r.SILWEI||'').replace(/[^\d.]/g,''))||0),0);
  const shSil=isRaw?shAll.reduce((s,r)=>s+(Number(r.RECCNT||0)),0):shAll.reduce((s,r)=>s+(Number(String(r.SILWEI||'').replace(/[^\d.]/g,''))||0),0);
  const silLabel=isRaw?'인수량':'';
  const sortByDate=arr=>[...arr].sort((a,b)=>{
    if(a._date!==b._date) return a._date<b._date?-1:1;
    const at=timeToMin(a.OUTIME),bt=timeToMin(b.OUTIME);
    if(at==null&&bt==null) return 0; if(at==null) return 1; if(bt==null) return -1;
    return at-bt;
  });
  const tableAll=[...sortByDate(bwAll),...sortByDate(shAll)];
  let bwNo=1,shNo=1;
  const tableRows=tableAll.length===0
    ?`<tr><td colspan="7" class="empty">데이터 없음</td></tr>`
    :tableAll.map((r,i)=>{
      const overnight=isOvernightEntry(r.INTIME,r.OUTIME);
      const inM=timeToMin(r.INTIME),outM=timeToMin(r.OUTIME);
      const isProduct=(type==='product');
      const case1=overnight;
      const case1_earlyOut=overnight&&outM!=null&&outM<=WORK_START_MIN;
      const case1_noOut=overnight&&outM==null;
      const case2=isProduct&&!overnight&&inM!=null&&outM!=null&&inM<WORK_START_MIN&&outM<=WORK_START_MIN;
      const case3=isProduct&&!overnight&&inM!=null&&inM<WORK_START_MIN&&(outM==null||outM>WORK_START_MIN);
      const dur=case2?null:effectiveDurMin(r.INTIME,r.OUTIME,type);
      const durValid=dur!=null&&dur>0&&dur<=480;
      const durWarn=durValid&&dur>=120;
      let durDisplay;
      if(case1_earlyOut||case1_noOut||case2) durDisplay='<span style="color:#a0aec0;font-size:11px">-</span>';
      else if(case1&&durValid) durDisplay=`${dur}<br><span style="color:#6366f1;font-size:9px">🌙06↑</span>`;
      else if(case3&&durValid) durDisplay=`${dur}<br><span style="color:#6366f1;font-size:9px">06↑</span>`;
      else if(!durValid) durDisplay='<span style="color:#f59e0b">?</span>';
      else durDisplay=String(dur);
      const isFirstSihwa=plantFilter==='all'&&r._plant==='시화'&&i===bwAll.length;
      const plantBg=r._plant==='반월'?'background:#eff6ff':'background:#f0fdf4';
      const sepBorder=isFirstSihwa?'border-top:2px solid #ff6b6b;':'';
      const border=`${sepBorder}border-bottom:1px solid #e5e7eb`;
      const baseStyle=`style="${plantBg};${border};padding:3px 3px"`;
      const baseStyleNW=`style="${plantBg};${border};padding:3px 3px;white-space:nowrap"`;
      const durStyle=durWarn?`style="${plantBg};${border};padding:3px 3px;color:#ef4444;font-weight:700"`:`style="${plantBg};${border};padding:3px 3px"`;
      const silStyle=`style="${plantBg};${border};padding:3px 3px;font-weight:500;color:#185FA5"`;
      const silwei=isRaw?null:Number(String(r.SILWEI||'').replace(/[^\d.]/g,''))||null;
      const silTd=isRaw?'':`<td ${silStyle}>${silwei!=null?String(silwei):'-'}</td>`;
      const inNoteText=case1?'🌙전날':case2?'🌙새벽':case3?'⏰06시':'';
      const inNoteSpan=inNoteText?`<br><span style="color:#6366f1;font-size:9px">${inNoteText}</span>`:'';
      const rowNo=r._plant==='반월'?bwNo++:shNo++;
      return `<tr><td ${baseStyle}>${dateToDowLabel(r._date)}</td><td ${baseStyle}>${rowNo}</td><td ${baseStyle}>${String(r.CARNUM||'')}</td>${isSub?`<td ${baseStyle}>${String(r.ITEMNM||'').trim()||'-'}</td>`:''}<td ${baseStyleNW}>${fmtTime(r.INTIME)}${inNoteSpan}</td><td ${baseStyleNW}>${fmtTime(r.OUTIME)}</td><td ${durStyle}>${durDisplay}</td>${silTd}</tr>`;
    }).join('');
  const bwBadge=`<span style="font-size:11px;font-weight:400;padding:1px 8px;border-radius:999px;background:#eff6ff;color:#185FA5">반월 ${bwAll.length}건 (${bwSil.toLocaleString()}kg${silLabel})</span>`;
  const shBadge=`<span style="font-size:11px;font-weight:400;padding:1px 8px;border-radius:999px;background:#f0fdf4;color:#3B6D11">시화 ${shAll.length}건 (${shSil.toLocaleString()}kg${silLabel})</span>`;
  const plantBadgesArr=(plantFilter==='all')?[bwBadge,shBadge]:(plantFilter==='banwol')?[bwBadge]:[shBadge];
  panel.innerHTML+=anCard(`<span class="dot" style="--dc:${cfg.dc}"></span>전체 데이터 (${filteredRows.length}건)`,
    `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">${plantBadgesArr.join('')}</div>
    <div style="max-height:400px;overflow-y:auto"><table style="table-layout:fixed;width:100%;font-size:11px;border-collapse:collapse">
      <thead><tr style="border-bottom:1.5px solid #d1d5db">
        <th style="width:54px;padding:4px 3px">날짜</th>
        <th style="width:28px;padding:4px 3px">No</th>
        <th style="width:60px;padding:4px 3px">차량</th>
        ${isSub?'<th style="width:60px;padding:4px 3px">품목</th>':''}
        <th style="width:52px;padding:4px 3px">입차</th>
        <th style="width:46px;padding:4px 3px">출차</th>
        <th style="width:44px;padding:4px 3px">체류(분)</th>
        ${isRaw?'':`<th style="width:54px;padding:4px 3px;color:#185FA5">실중량(kg)</th>`}
      </tr></thead>
      <tbody>${tableRows}</tbody>
    </table></div>`
  );
}

function renderAnalyticDaily(data,type,plantFilter,searchQ){

  let realtimeHtml = '';
  // 분석탭에서는 실시간 혼잡도 카드 제거 (입차 조회 탭 상단으로 이동했으므로)

  const cfg=AN_TYPES.find(t=>t.key===type)||AN_TYPES[0];
  const isSub=(type==='sub'||type==='container');
  const isRaw=(type==='raw');
  plantFilter=plantFilter||'all';
  searchQ=(searchQ||'').replace(/\D/g,'').slice(-4);

  const bwRaw=(data.banwol||[]).map(r=>({...r,_plant:'반월'}));
  const shRaw=(data.sihwa||[]).map(r=>({...r,_plant:'시화'}));
  let bw=[...bwRaw], sh=[...shRaw];
  if(plantFilter==='banwol') sh=[]; if(plantFilter==='sihwa') bw=[];
  const all=[...bw,...sh];

  function withDur(list){
    return list
      .map(r=>({ ...r, _dur: effectiveDurMin(r.INTIME, r.OUTIME, type), _overnight: isOvernightEntry(r.INTIME, r.OUTIME) }))
      .filter(r=>r._dur!=null&&r._dur>0&&r._dur<=480);
  }

  const allDur=withDur(all),bwDur=withDur(bw),shDur=withDur(sh);
  const avg=arr=>arr.length?Math.round(arr.reduce((s,r)=>s+r._dur,0)/arr.length):0;
  const avgAll=avg(allDur),avgBw=avg(bwDur),avgSh=avg(shDur);

  const hourBucket=Array(24).fill(0);
  all.forEach(r=>{ if(isOvernightEntry(r.INTIME, r.OUTIME)) return; const m=timeToMin(r.INTIME);if(m!=null)hourBucket[Math.floor(m/60)]++; });

  const hourDurSum=Array(24).fill(0),hourDurCnt=Array(24).fill(0);
  allDur.forEach(r=>{
    const m = r._overnight ? WORK_START_MIN : timeToMin(r.INTIME);
    if(m==null)return;
    const h=Math.floor(m/60);
    hourDurSum[h]+=r._dur; hourDurCnt[h]++;
  });

  const itemMap={};
  all.forEach(r=>{
    const nm=isSub?String(r.ITEMNM||'미분류').trim():(type==='product'?'제품':'컨테이너');
    if(!itemMap[nm]) itemMap[nm]={count:0,silwei:0,durSum:0,durCnt:0};
    itemMap[nm].count++;
    itemMap[nm].silwei+=Number(String(r.SILWEI||'').replace(/[^\d.]/g,''))||0;
    const dur=effectiveDurMin(r.INTIME, r.OUTIME, type);
    if(dur!=null&&dur>0&&dur<=480){itemMap[nm].durSum+=dur;itemMap[nm].durCnt++;}
  });
  const itemEntries=Object.entries(itemMap).sort((a,b)=>b[1].count-a[1].count);

  const peakHour=hourBucket.indexOf(Math.max(...hourBucket));
  const peakCount=hourBucket[peakHour];

  const allRowsForCong=[...(data.banwol||[]).map(r=>({...r,_plant:'반월',_type:type})),...(data.sihwa||[]).map(r=>({...r,_plant:'시화',_type:type}))];
  const {byDate:congByDate,capa}=calcCongestion([{date:__anFrom,rows:allRowsForCong}],plantFilter,type);
  const congTimeline=congByDate[0]?.timeline||Array(144).fill(0);
  const {peakSlot:cPeakSlot,peakVal:cPeakVal,peakPct:cPeakPct,dangerH,warningH}=congKpiHtml(congTimeline,capa);

  const panel=document.getElementById('analyticPanel');

  const kpiItems = [
    { label:'전체 건수', val:`${all.length}<span style="font-size:14px;font-weight:400">건</span>`, sub:(()=>{ const totalSil=all.reduce((s,r)=>s+(Number(String(r.SILWEI||'').replace(/[^\d.]/g,''))||0),0); return `반월 ${bw.length} · 시화 ${sh.length} &nbsp;|&nbsp; ${totalSil>0?totalSil.toLocaleString()+'kg':'-'}`; })(), color:cfg.dc },
    { label:'평균 체류시간', val:`${avgAll}<span style="font-size:14px;font-weight:400">분</span>`, sub:`반월 ${avgBw}분 · 시화 ${avgSh}분`, color:cfg.dc },
    { label:'피크 시간대', val:`<span style="color:#f59e0b">${String(peakHour).padStart(2,'0')}시</span>`, sub:`${peakCount}건 집중`, color:'#f59e0b' },
    ...(isSub?[{ label:'품목 수', val:`${itemEntries.length}<span style="font-size:14px;font-weight:400">종</span>`, sub:`${itemEntries[0]?itemEntries[0][0]+' 최다':''}`, color:cfg.dc }]:[]),
  ];
  panel.innerHTML = `
  <div style="background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);display:flex;margin-bottom:14px;overflow:hidden">
    ${kpiItems.map((k,i)=>`
    <div style="flex:1;padding:14px 18px;${i>0?'border-left:1px solid var(--line)':''}">
      <div style="height:3px;background:${k.color};border-radius:2px;margin-bottom:10px"></div>
      <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">${k.label}</div>
      <div style="font-size:22px;font-weight:700;line-height:1.1">${k.val}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:2px">${k.sub}</div>
    </div>`).join('')}
  </div>`;

  panel.innerHTML += anCard(
    `<span class="dot" style="--dc:${cfg.dc}"></span>시간대별 혼잡도 <span style="font-size:11px;font-weight:400;color:var(--muted);margin-left:6px">출차 완료 기준 · 실시간 반영 아님</span>`,
    `<div style="font-size:11px;color:#888;background:#f5f5f5;border-radius:8px;padding:4px 10px;display:inline-block;margin-bottom:10px">출차 완료된 차량 데이터 기준</div>
    <div id="heatmapContainer"></div>
    <div style="position:relative;height:16px;margin-top:4px" id="heatmapTicks"></div>
    <div style="display:flex;align-items:center;gap:6px;margin-top:8px">
      <span style="font-size:11px;color:var(--muted)">원활</span>
      <div style="width:14px;height:8px;border-radius:2px;background:#C0DD97"></div>
      <div style="width:14px;height:8px;border-radius:2px;background:#97C459"></div>
      <div style="width:14px;height:8px;border-radius:2px;background:#FAC775"></div>
      <div style="width:14px;height:8px;border-radius:2px;background:#EF9F27"></div>
      <div style="width:14px;height:8px;border-radius:2px;background:#E24B4A"></div>
      <span style="font-size:11px;color:var(--muted)">혼잡</span>
      <span style="font-size:11px;color:var(--muted);margin-left:8px" id="heatmapPeakNote"></span>
    </div>`
  );

  const hourArr = Array(24).fill(0);
  for(let i=0;i<144;i++) hourArr[Math.floor(i/6)] = Math.max(hourArr[Math.floor(i/6)], congTimeline[i]);

  const bwRowsForCong = (data.banwol||[]).map(r=>({...r,_plant:'반월',_type:type}));
  const shRowsForCong = (data.sihwa||[]).map(r=>({...r,_plant:'시화',_type:type}));
  const {byDate:bwCongByDate, capa:bwCapa} = calcCongestion([{date:__anFrom,rows:bwRowsForCong}],'all',type);
  const {byDate:shCongByDate, capa:shCapa} = calcCongestion([{date:__anFrom,rows:shRowsForCong}],'all',type);
  const allCapa = capa;
  const bwCongTimeline = bwCongByDate[0]?.timeline||Array(144).fill(0);
  const shCongTimeline = shCongByDate[0]?.timeline||Array(144).fill(0);
  const bwHourArr = Array(24).fill(0);
  const shHourArr = Array(24).fill(0);
  for(let i=0;i<144;i++){
    bwHourArr[Math.floor(i/6)] = Math.max(bwHourArr[Math.floor(i/6)], bwCongTimeline[i]);
    shHourArr[Math.floor(i/6)] = Math.max(shHourArr[Math.floor(i/6)], shCongTimeline[i]);
  }

  const showMulti = plantFilter === 'all';

  function buildHeatmapRow(containerId, label, arr, capVal) {
    const wrap = document.getElementById(containerId); if(!wrap) return;
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:4px';
    const lbl = document.createElement('span');
    lbl.style.cssText = 'font-size:11px;color:var(--muted);width:28px;flex-shrink:0';
    lbl.textContent = label; row.appendChild(lbl);
    const cells = document.createElement('div');
    cells.style.cssText = 'display:flex;gap:2px;flex:1';
    arr.forEach((v,h) => {
      const r = v/capVal;
      const color = r===0?'#e8e8e8':r<0.4?'#C0DD97':r<0.6?'#97C459':r<0.8?'#FAC775':r<1.0?'#EF9F27':'#E24B4A';
      const cell = document.createElement('div');
      cell.style.cssText = `flex:1;height:20px;border-radius:2px;background:${color};cursor:default`;
      cell.dataset.h=h; cell.dataset.v=v; cell.dataset.r=Math.round(r*100);
      cell.addEventListener('mouseenter',()=>{ const tip=document.createElement('div'); tip.id='hm-tip'; tip.style.cssText='position:fixed;background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:5px 8px;font-size:11px;white-space:nowrap;z-index:10000;color:#222;pointer-events:none'; tip.textContent=`${String(h).padStart(2,'0')}시 · 최대 ${v}대 (${Math.round(r*100)}%)`; document.body.appendChild(tip); });
      cell.addEventListener('mousemove',e=>{ const tip=document.getElementById('hm-tip'); if(!tip)return; tip.style.left=(e.clientX+12)+'px'; tip.style.top=(e.clientY-28)+'px'; });
      cell.addEventListener('mouseleave',()=>document.getElementById('hm-tip')?.remove());
      cells.appendChild(cell);
    });
    row.appendChild(cells); wrap.appendChild(row);
  }

  const heatmapContainer = document.getElementById('heatmapContainer');
  if(heatmapContainer) {
    if(showMulti) {
      buildHeatmapRow('heatmapContainer','반월', bwHourArr, bwCapa);
      buildHeatmapRow('heatmapContainer','시화', shHourArr, shCapa);
      buildHeatmapRow('heatmapContainer','합계', hourArr, allCapa);
    } else {
      buildHeatmapRow('heatmapContainer','', hourArr, capa);
    }
  }

  const heatmapTicks = document.getElementById('heatmapTicks');
  if(heatmapTicks){
    Array.from({length:24},(_,h)=>{
      const span=document.createElement('span');
      span.style.cssText=`font-size:9px;color:#bbb;position:absolute;left:${h/23*100}%;transform:translateX(-50%)`;
      span.textContent=String(h);
      heatmapTicks.appendChild(span);
    });
  }

  const peakHour2 = hourArr.indexOf(Math.max(...hourArr));
  const peakVal2 = hourArr[peakHour2];
  const usedCapa = showMulti ? allCapa : capa;
  const peakPct2 = Math.round(peakVal2 / usedCapa * 100);
  const peakNote = document.getElementById('heatmapPeakNote');
  if(peakNote) peakNote.textContent = `피크 ${String(peakHour2).padStart(2,'0')}시 · 동시 ${peakVal2}대 · CAPA의 ${peakPct2}%`;

  if(isSub && itemEntries.length){
    const donutId='donutChart_'+Date.now();
    const donutColors=['#06b6d4','#f97316','#a855f7','#22c55e','#f59e0b','#ef4444','#6366f1','#ec4899','#14b8a6','#84cc16'];
    const totalKg=itemEntries.reduce((s,[,v])=>s+v.silwei,0)||1;
    const legendHtml=itemEntries.map(([nm,v],i)=>{
      const pct=Math.round(v.silwei/totalKg*100);
      const avgDur=v.durCnt>0?Math.round(v.durSum/v.durCnt):null;
      return `<div style="display:flex;align-items:center;gap:6px;font-size:12px;margin-bottom:5px">
        <div style="width:10px;height:10px;border-radius:2px;background:${donutColors[i%donutColors.length]};flex-shrink:0"></div>
        <span style="flex:1;color:#333">${nm}</span>
        <span style="color:#555;font-weight:600">${pct}%</span>
        <span style="color:var(--muted);font-size:11px">(${v.count}건${avgDur!=null?' · '+avgDur+'분':''})</span>
      </div>`;
    }).join('');
    panel.innerHTML+=anCard(
      `<span class="dot" style="--dc:${cfg.dc}"></span>품목별 입차 현황`,
      `<div style="display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap">
        <div style="position:relative;width:160px;height:160px;flex-shrink:0">
          <canvas id="${donutId}" width="160" height="160"></canvas>
          <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none">
            <div style="font-size:18px;font-weight:700;color:#333">${itemEntries.length}</div>
            <div style="font-size:10px;color:var(--muted)">품목</div>
          </div>
        </div>
        <div style="flex:1;min-width:140px;padding-top:4px">${legendHtml}</div>
      </div>`
    );
    setTimeout(()=>{
      const canvas=document.getElementById(donutId);
      if(!canvas||!window.Chart) return;
      new Chart(canvas,{
        type:'doughnut',
        data:{
          labels:itemEntries.map(([nm])=>nm),
          datasets:[{data:itemEntries.map(([,v])=>v.silwei||v.count),backgroundColor:itemEntries.map((_,i)=>donutColors[i%donutColors.length]),borderWidth:2,borderColor:'#fff'}]
        },
        options:{responsive:false,cutout:'60%',plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>{const v=itemEntries[ctx.dataIndex][1];const pct=Math.round((v.silwei||v.count)/totalKg*100);return ` ${v.count}건 · ${pct}%`;}}}}}
      });
    },100);
  }

  let bwNo=1, shNo=1;
  const sortByOut=arr=>[...arr].sort((a,b)=>{
    const at=timeToMin(a.OUTIME),bt=timeToMin(b.OUTIME);
    if(at==null&&bt==null) return 0;
    if(at==null) return 1; if(bt==null) return -1;
    return at-bt;
  });
  const tableAll=[...sortByOut(bw),...sortByOut(sh)];
  const hasQ=searchQ&&searchQ.length>=2;
  const tableRows=tableAll.length===0?`<tr><td colspan="${isSub?7:6}" class="empty">데이터 없음</td></tr>`:tableAll.map((r,i)=>{
    const plant=r._plant||'-';
    const overnight=isOvernightEntry(r.INTIME, r.OUTIME);
    const inM=timeToMin(r.INTIME), outM=timeToMin(r.OUTIME);
    const isProduct=(type==='product');
    const case1=overnight;
    const case1_earlyOut = overnight && outM!=null && outM<=WORK_START_MIN;
    const case1_noOut = overnight && outM==null;
    const case2=isProduct && !overnight && inM!=null && outM!=null && inM<WORK_START_MIN && outM<=WORK_START_MIN;
    const case3=isProduct && !overnight && inM!=null && inM<WORK_START_MIN && (outM==null||outM>WORK_START_MIN);
    const dur=case2 ? null : effectiveDurMin(r.INTIME, r.OUTIME, type);
    const durValid=dur!=null&&dur>0&&dur<=480;
    const durWarn=durValid&&dur>=120?' style="color:#ef4444;font-weight:700"':'';
    let durDisplay;
    if(case1_earlyOut){ durDisplay='<span style="color:#a0aec0;font-size:11px">-</span>'; }
    else if(case1_noOut){ durDisplay='<span style="color:#a0aec0;font-size:11px">-</span>'; }
    else if(case1 && durValid){ durDisplay=`${dur}<br><span style="color:#6366f1;font-size:9px">🌙06↑</span>`; }
    else if(case2){ durDisplay='<span style="color:#a0aec0;font-size:11px">-</span>'; }
    else if(case3&&durValid){ durDisplay=`${dur}<br><span style="color:#6366f1;font-size:9px">06↑</span>`; }
    else if(!durValid){ durDisplay='<span style="color:#f59e0b" title="체류시간 오류">?</span>'; }
    else { durDisplay=String(dur); }
    const carNum=String(r.CARNUM||''),isMatch=hasQ&&carNum.includes(searchQ),isDim=hasQ&&!isMatch;
    let rowStyle='';
    if(isMatch) rowStyle=' style="background:#eff6ff;font-weight:600"';
    else if(case1_earlyOut||case2) rowStyle=' style="background:#f5f5f5"';
    else if(case1) rowStyle=' style="background:#f0f0ff"';
    else if(case3) rowStyle=' style="background:#f0f7ff"';
    if(isDim) rowStyle=' style="opacity:0.25"';
    const inNoteText=case1?'🌙전날':case2?'🌙새벽':case3?'⏰06시':'';
    const inNoteColor=case2?'#94a3b8':'#6366f1';
    const inNoteSpan=inNoteText?`<br><span style="color:${inNoteColor};font-size:9px">${inNoteText}</span>`:'';
    const itemNm=isSub?`<td style="font-size:12px;color:#555">${String(r.ITEMNM||'').trim()||'-'}</td>`:'';
    const silwei=isRaw?null:Number(String(r.SILWEI||'').replace(/[^\d.]/g,''))||null;
    const silweiDisp=silwei!=null?String(silwei):'-';
    const isFirstSihwa = plantFilter==='all' && r._plant==='시화' && tableAll.indexOf(r)===bw.length;
    const plantBg=r._plant==='반월'?'background:#eff6ff':'background:#f0fdf4';
    const sepBorder=isFirstSihwa?'border-top:2px solid #ff6b6b;':'';
    const border=`${sepBorder}border-bottom:1px solid #e5e7eb`;
    const baseStyle=`style="${plantBg};${border};padding:3px 3px"`;
    const baseStyleNW=`style="${plantBg};${border};padding:3px 3px;white-space:nowrap"`;
    const durStyle=durWarn?`style="${plantBg};${border};padding:3px 3px;color:#ef4444;font-weight:700"`:`style="${plantBg};${border};padding:3px 3px"`;
    const silStyle=`style="${plantBg};${border};padding:3px 3px;font-weight:500;color:#185FA5"`;
    const silTd=isRaw?'':`<td ${silStyle}>${silweiDisp}</td>`;
    const rowNo = r._plant==='반월' ? bwNo++ : shNo++;
    return `<tr><td ${baseStyle}>${rowNo}</td><td ${baseStyle}>${carNum}</td>${itemNm?`<td ${baseStyle}>${String(r.ITEMNM||'').trim()||'-'}</td>`:''}<td ${baseStyleNW}>${fmtTime(r.INTIME)}${inNoteSpan}</td><td ${baseStyleNW}>${fmtTime(r.OUTIME)}</td><td ${durStyle}>${durDisplay}</td>${silTd}</tr>`;
  }).join('');

  const bwSil=isRaw?bw.reduce((s,r)=>s+(Number(r.RECCNT||0)),0):bw.reduce((s,r)=>s+(Number(String(r.SILWEI||'').replace(/[^\d.]/g,''))||0),0);
  const shSil=isRaw?sh.reduce((s,r)=>s+(Number(r.RECCNT||0)),0):sh.reduce((s,r)=>s+(Number(String(r.SILWEI||'').replace(/[^\d.]/g,''))||0),0);
  const silLabel=isRaw?'인수량':'';
  const bwBadge=`<span style="font-size:11px;font-weight:400;padding:1px 8px;border-radius:999px;background:#eff6ff;color:#185FA5">반월 ${bw.length}건 (${bwSil.toLocaleString()}kg${silLabel})</span>`;
  const shBadge=`<span style="font-size:11px;font-weight:400;padding:1px 8px;border-radius:999px;background:#f0fdf4;color:#3B6D11">시화 ${sh.length}건 (${shSil.toLocaleString()}kg${silLabel})</span>`;
  const plantBadgesArr=(plantFilter==='all')?[bwBadge,shBadge]:(plantFilter==='banwol')?[bwBadge]:[shBadge];
  const plantBadgesRow=`<div style="display:flex;gap:6px;flex-wrap:wrap;margin:6px 0 0 0">${plantBadgesArr.join('')}</div>`;
  const noteRow=(type==='product'||isRaw)?`<div style="font-size:11px;color:var(--muted);margin-top:4px">${type==='product'?'※ 전날 입차 또는 06시 이전 입차는 06:00 기준으로 보정 · 체류시간도 동일 적용':'※ INTIME/OUTIME은 다음주 업데이트 예정'}</div>`:'';
  panel.innerHTML+=anCard(`<span class="dot" style="--dc:${cfg.dc}"></span>전체 데이터 (${all.length}건)`,
    `${plantBadgesRow}${noteRow}<div style="max-height:320px;overflow-y:auto;margin-top:8px"><table style="table-layout:fixed;width:100%;font-size:11px;border-collapse:collapse"><thead><tr style="border-bottom:1.5px solid #d1d5db"><th style="width:28px;padding:4px 3px">No</th><th style="width:56px;padding:4px 3px">차량</th>${isSub?'<th style="width:64px;padding:4px 3px">품목</th>':''}<th style="width:52px;padding:4px 3px">입차</th><th style="width:46px;padding:4px 3px">출차</th><th style="width:44px;padding:4px 3px">체류(분)</th>${isRaw?'':`<th style="width:54px;padding:4px 3px;color:#185FA5">실중량(kg)</th>`}</tr></thead><tbody>${tableRows}</tbody></table></div>`
  );
}

// ═══ 데이터 로딩 ═══
let __fetching=false;
async function loadSnapshot(){
  if(__fetching) return; __fetching=true;
  elUpdated.innerHTML='<span class="mini-spinner"></span>업데이트 중…';
  try{
    const data=await api({action:'snapshot_live'});
    if(data&&data.sections&&document.getElementById('btnViewLive').classList.contains('active')) render(data);
  }catch(e){ console.error('로드 실패:',e); }
  finally{ __fetching=false; }
}
async function loadWeigh(){
  elUpdated.innerHTML='<span class="mini-spinner"></span>불러오는 중…';
  try{ const data=await api({action:'get_weigh_cache',type:'product'}); renderWeigh(data); }
  catch(e){ showToast('계근 데이터를 불러올 수 없었습니다.'); }
}
function rerenderCache(){ if(__lastData) render(__lastData); }

// ═══ 탭 전환 ═══
function setTab(tabName){
  const liveActive=tabName==='live',anActive=tabName==='analytic';
  document.getElementById('btnViewLive').classList.toggle('active',liveActive);
  document.getElementById('btnViewAnalytic').classList.toggle('active',anActive);
  elSections.style.display=liveActive?'grid':'none';
  elWeighPanel.style.display='none';
  document.getElementById('periodBar').style.display=anActive?'flex':'none';
  document.getElementById('analyticPanel').style.display=anActive?'block':'none';
  // watchPanelEl은 헤더 안에 통합됨 — 항상 표시
  document.getElementById('searchSummary').style.display='none';
  // ★ 혼잡도 패널: 입차 조회 탭에서만 표시
  document.getElementById('congPanel').style.display=liveActive?'block':'none';
  // 검색어 없으면 차량 패널 숨김
  const q=(document.getElementById('searchInput').value||'').replace(/\D/g,'').slice(-4);
  if(!/^\d{4}$/.test(q)) document.getElementById('carSearchPanel').style.display='none';
}

// ═══ 이벤트 ═══
document.getElementById('plantFilter').addEventListener('change',e=>{
  localStorage.setItem(LS.plant,e.target.value);
  const live=document.getElementById('btnViewLive').classList.contains('active');
  const an=document.getElementById('btnViewAnalytic').classList.contains('active');
  if(live) rerenderCache(); else if(an) loadAnalytic(__anType,true);
});
function doSearch(){
  const val=document.getElementById('searchInput').value||'';
  localStorage.setItem(LS.q,val);
  const live=document.getElementById('btnViewLive').classList.contains('active');
  const an=document.getElementById('btnViewAnalytic').classList.contains('active');
  const q=val.replace(/\D/g,'').slice(-4);
  const isFour=/^\d{4}$/.test(q);

  if(live){
    rerenderCache();
  } else if(an){
    if(!isFour){ document.getElementById('carSearchPanel').style.display='none'; return; }
    const histEl=document.getElementById('carSearchHistory');
    updateCarSearchPanel(q, __lastData);
    const allKey=`all_${__anFrom}_${__anTo}`;
    const showHist=()=>{
      const html=buildHistoryRows(q);
      histEl.innerHTML=html||`<span style="color:#9ca3af">해당 기간 입차 기록 없음</span>`;
    };
    if(__anCache[allKey]){ showHist(); }
    else {
      histEl.innerHTML=`<span style="color:#9ca3af;font-size:12px"><span class="mini-spinner"></span> 히스토리 불러오는 중…</span>`;
      loadAllTypesForSearch().then(showHist).catch(()=>{ histEl.innerHTML=''; });
    }
  }
}
document.getElementById('searchBtn').addEventListener('click', doSearch);
document.getElementById('searchInput').addEventListener('keydown',e=>{ if(e.key==='Enter') doSearch(); });
document.getElementById('searchInput').addEventListener('input',e=>{
  // 입력값 비어있으면 즉시 초기화
  if(!(e.target.value||'').trim()){
    localStorage.setItem(LS.q,'');
    document.getElementById('searchSummary').style.display='none';
    document.getElementById('carSearchPanel').style.display='none';
    const live=document.getElementById('btnViewLive').classList.contains('active');
    if(live) rerenderCache();
  }
});
document.getElementById('watchAddBtn').addEventListener('click',()=>{
  const inp=document.getElementById('watchInput'); addWatch(inp.value).then(ok=>{if(ok)inp.value='';}); inp.focus();
});
document.getElementById('watchInput').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('watchAddBtn').click();});
document.getElementById('watchClearBtn').addEventListener('click',async()=>{
  if(!Object.keys(watchList).length) return;
  if(!confirm('감시 목록을 전부 삭제할까요?')) return;
  try{ await api({action:'clear_watch'}); Object.keys(watchList).forEach(k=>delete watchList[k]); renderWatchTags(); rerenderCache(); showToast('감시 목록 삭제됨'); }
  catch(e){ showToast('오류 발생'); }
});
document.getElementById('btnViewLive').addEventListener('click',()=>{setTab('live');rerenderCache();});
document.getElementById('btnViewAnalytic').addEventListener('click',()=>{setTab('analytic');loadAnalytic(__anType||'product');});

// ═══ 초기화 ═══
(async function init(){
  const sp=localStorage.getItem(LS.plant); if(sp) document.getElementById('plantFilter').value=sp;
  const sq=localStorage.getItem(LS.q); if(sq) document.getElementById('searchInput').value=sq;
  initPeriodBarEvents();
  await fetchWatch();
  await loadSnapshot();
  
  setInterval(fetchWatch,5*60*1000);
  setInterval(async ()=>{
    try{
      const data = await api({action:'snapshot_live'});
      if(data && data.sections){
        __lastData = data;
        elUpdated.textContent=`업데이트: ${data.updatedAt||'-'}`;
        if(document.getElementById('btnViewLive').classList.contains('active')){
          render(data);
          return;
        }
        // 분석탭일 때도 혼잡도 패널은 숨겨져 있으므로 별도 갱신 불필요
      }
    }catch(e){}
  }, 60000);
})();
</script>
