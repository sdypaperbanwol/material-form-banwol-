<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일근태현황 조회 | 대양그룹</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
  background: #f0f2f5;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 16px;
}
h1 { font-size: 18px; color: #198038; margin-bottom: 20px; font-weight: bold; }

#loading-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(255,255,255,0.88); z-index: 999;
  flex-direction: column; align-items: center; justify-content: center; gap: 14px;
}
#loading-overlay.show { display: flex; }
.spinner {
  width: 42px; height: 42px; border: 4px solid #e0e0e0;
  border-top-color: #198038; border-radius: 50%;
  animation: spin 0.75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: #444; }

.card {
  background: white; border-radius: 12px; padding: 24px;
  width: 100%; max-width: 420px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 16px;
}
.card.wide { max-width: 1100px; }
.card-title { font-size: 14px; color: #555; font-weight: bold; margin-bottom: 16px; }

label { display: block; font-size: 13px; color: #333; margin-bottom: 4px; margin-top: 12px; }
input {
  width: 100%; padding: 10px 12px; border: 1px solid #ddd;
  border-radius: 8px; font-size: 15px; outline: none; transition: border 0.2s;
}
input:focus { border-color: #198038; }

.btn {
  display: block; width: 100%; padding: 12px; border: none;
  border-radius: 8px; font-size: 15px; font-weight: bold;
  cursor: pointer; margin-top: 16px; transition: opacity 0.2s;
}
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-green  { background: #198038; color: white; }
.btn-blue   { background: #0f62fe; color: white; }
.btn-gray   { background: #e0e0e0; color: #333; }
.btn-orange { background: #ff6b00; color: white; }

.msg { margin-top: 10px; font-size: 13px; padding: 8px 12px; border-radius: 6px; display: none; }
.msg.ok  { background: #defbe6; color: #198038; display: block; }
.msg.err { background: #fff1f1; color: #da1e28; display: block; }

.user-banner {
  background: linear-gradient(135deg, #198038, #24a148);
  color: white; border-radius: 12px; padding: 16px 24px;
  width: 100%; max-width: 1100px; margin-bottom: 16px; display: none;
}
.user-banner .user-name { font-size: 20px; font-weight: bold; margin-bottom: 4px; }
.user-banner .user-info { font-size: 13px; opacity: 0.85; }

.month-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.month-tab {
  padding: 6px 16px; border-radius: 20px; border: 1px solid #ddd;
  background: white; cursor: pointer; font-size: 13px; transition: all 0.2s;
}
.month-tab.active { background: #198038; color: white; border-color: #198038; }

.summary-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
  gap: 8px; margin-bottom: 16px;
}
.summary-item { background: #f4f4f4; border-radius: 8px; padding: 10px; text-align: center; }
.summary-item .s-label { font-size: 11px; color: #666; margin-bottom: 4px; }
.summary-item .s-value { font-size: 16px; font-weight: bold; color: #198038; }

/* 화면 테이블 - 검정 통일 */
.table-wrap { overflow-x: auto; border: 1px solid #000; }
table.att-table {
  border-collapse: collapse; font-size: 12px;
  width: 100%; min-width: 900px;
}
table.att-table th {
  background: #fff; color: #000; font-weight: bold;
  padding: 7px 6px; text-align: center;
  border: 1px solid #000; white-space: nowrap; font-size: 11px;
}
table.att-table td {
  padding: 6px 6px; border: 1px solid #000;
  text-align: center; white-space: nowrap;
  color: #000; background: #fff; font-size: 12px;
}
tr.sum-row td {
  font-weight: bold; border-top: 2px solid #000;
  background: #fff !important; color: #000;
}

/* 서명 영역 */
.sign-section {
  margin-top: 24px; padding: 20px;
  background: #f9fafb; border-radius: 10px; border: 1px solid #e0e0e0;
}
.sign-notice { font-size: 12px; color: #555; margin-bottom: 16px; line-height: 1.6; }
.sign-bottom {
  display: flex; justify-content: space-between;
  align-items: flex-start; flex-wrap: wrap; gap: 16px;
}
.sign-issued { font-size: 13px; color: #555; }
.confirm-table { border-collapse: collapse; font-size: 12px; }
.confirm-table td { border: 1px solid #000; text-align: center; }
.confirm-table .label-cell {
  background: #fff; font-weight: bold; padding: 4px 10px; font-size: 11px;
}
.confirm-table .sign-cell { width: 100px; height: 80px; vertical-align: top; padding: 0; }
.confirm-table .empty-cell { width: 100px; height: 80px; }
#sign-canvas { cursor: crosshair; display: block; width: 100px; height: 80px; touch-action: none; }
.sign-btns { display: flex; gap: 8px; margin-top: 6px; justify-content: flex-end; }
.sign-btn {
  padding: 5px 12px; font-size: 12px; border: 1px solid #ddd;
  border-radius: 6px; cursor: pointer; background: white;
}
.sign-btn.clear { color: #da1e28; border-color: #da1e28; }

.submit-area { margin-top: 20px; display: flex; gap: 12px; flex-wrap: wrap; }
.submit-area .btn { flex: 1; min-width: 140px; margin-top: 0; }

.complete-box {
  background: #defbe6; border-radius: 10px; padding: 20px;
  text-align: center; display: none; margin-top: 16px;
}
.complete-box .check { font-size: 36px; margin-bottom: 8px; }
.complete-box .comp-title { font-size: 16px; font-weight: bold; color: #198038; }
.complete-box .comp-sub { font-size: 13px; color: #555; margin-top: 6px; }

#section-otp    { display: none; }
#section-result { display: none; }
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">처리 중…</div>
</div>

<h1>📋 일근태현황 조회</h1>

<!-- 1단계 -->
<div class="card" id="section-login">
  <div class="card-title">본인 인증</div>
  <label>이름</label>
  <input type="text" id="inp-name" placeholder="홍길동" autocomplete="name">
  <label>휴대폰번호</label>
  <input type="tel" id="inp-phone" placeholder="010-0000-0000"
         maxlength="13" autocomplete="tel" oninput="formatPhone(this)">
  <button class="btn btn-green" onclick="sendOtp()">인증번호 발송</button>
  <div class="msg" id="msg-login"></div>
</div>

<!-- 2단계 -->
<div class="card" id="section-otp">
  <div class="card-title">인증번호 확인</div>
  <label>인증번호 (6자리)</label>
  <input type="tel" id="inp-otp" placeholder="000000"
         maxlength="6" oninput="this.value=this.value.replace(/\D/g,'').slice(0,6)">
  <button class="btn btn-blue" onclick="verifyOtp()">조회</button>
  <button class="btn btn-gray" style="margin-top:8px" onclick="resetLogin()">다시 입력</button>
  <div class="msg" id="msg-otp"></div>
</div>

<!-- 배너 -->
<div class="user-banner" id="user-banner">
  <div class="user-name" id="banner-name"></div>
  <div class="user-info" id="banner-info"></div>
</div>

<!-- 결과 -->
<div class="card wide" id="section-result">
  <div class="card-title">근태현황</div>
  <div class="month-tabs" id="month-tabs"></div>
  <div class="summary-grid" id="summary-grid"></div>

  <div class="table-wrap">
    <table class="att-table">
      <thead id="result-thead"></thead>
      <tbody id="result-tbody"></tbody>
    </table>
  </div>

  <!-- 서명 영역 -->
  <div class="sign-section" id="sign-section">
    <div class="sign-notice">
      ※ 교대근무자는 휴게시간을 포함하여 상기와 같이 근무했음을 확인합니다.
    </div>
    <div class="sign-bottom">
      <div class="sign-issued" id="sign-issued-date"></div>
      <div>
        <table class="confirm-table">
          <tr>
            <td class="label-cell">확인</td>
            <td class="sign-cell"><canvas id="sign-canvas" width="100" height="80"></canvas></td>
            <td class="empty-cell"></td>
            <td class="empty-cell"></td>
          </tr>
        </table>
        <div class="sign-btns">
          <button class="sign-btn clear" onclick="clearSign()">서명 지우기</button>
        </div>
        <div style="font-size:11px;color:#888;margin-top:4px;text-align:right;">손가락 또는 마우스로 서명하세요</div>
      </div>
    </div>
  </div>

  <div class="submit-area">
    <button class="btn btn-orange" onclick="submitConfirm()">✅ 확인 제출</button>
    <button class="btn btn-gray" style="flex:0 0 120px" onclick="resetAll()">처음으로</button>
  </div>

  <div class="complete-box" id="complete-box">
    <div class="check">✅</div>
    <div class="comp-title">근태확인서가 제출되었습니다</div>
    <div class="comp-sub" id="comp-sub-text"></div>
  </div>

  <button class="btn btn-gray" style="margin-top:16px;max-width:180px" onclick="resetAll()">처음으로</button>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbz7tgQ7u5V5QLJjpA8BB7HV3Dx1xJ9YCYFcoflQTc6XJujO3eyG0fLigJkB8N4Mo2V6/exec';

const SHOW_COLS = ['근무일자','휴일구분','근태','출근1','퇴근1','출근2','퇴근2','정규','연장','야간','휴일','휴일연장','지각','조퇴','유급','주휴'];
const SUM_COLS  = ['정규','연장','야간','휴일','휴일연장','지각','조퇴','유급','주휴'];

let currentPhone = '', currentName = '';
let allRows = [], months = [], currentMonth = '';
let userInfo = {};
let signCanvas, signCtx, signing = false, hasSigned = false;
let issuedStr = '';

window.addEventListener('DOMContentLoaded', () => {
  signCanvas = document.getElementById('sign-canvas');
  signCtx = signCanvas.getContext('2d');
  signCtx.strokeStyle = '#000';
  signCtx.lineWidth = 2;
  signCtx.lineCap = 'round';
  signCtx.lineJoin = 'round';

  const getXY = (e, rect) => {
    if (e.touches) return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  };
  const startSign = e => {
    e.preventDefault(); signing = true; signCtx.beginPath();
    const r = signCanvas.getBoundingClientRect();
    const { x, y } = getXY(e, r);
    signCtx.moveTo(x * signCanvas.width / r.width, y * signCanvas.height / r.height);
  };
  const moveSign = e => {
    e.preventDefault(); if (!signing) return; hasSigned = true;
    const r = signCanvas.getBoundingClientRect();
    const { x, y } = getXY(e, r);
    signCtx.lineTo(x * signCanvas.width / r.width, y * signCanvas.height / r.height);
    signCtx.stroke();
  };
  const endSign = e => { e.preventDefault(); signing = false; };

  signCanvas.addEventListener('mousedown',  startSign);
  signCanvas.addEventListener('mousemove',  moveSign);
  signCanvas.addEventListener('mouseup',    endSign);
  signCanvas.addEventListener('mouseleave', endSign);
  signCanvas.addEventListener('touchstart', startSign, { passive: false });
  signCanvas.addEventListener('touchmove',  moveSign,  { passive: false });
  signCanvas.addEventListener('touchend',   endSign,   { passive: false });
});

function clearSign() {
  signCtx.clearRect(0, 0, signCanvas.width, signCanvas.height);
  hasSigned = false;
}

function formatPhone(el) {
  let v = el.value.replace(/\D/g, '').slice(0, 11);
  if (v.length <= 3) el.value = v;
  else if (v.length <= 7) el.value = v.slice(0,3) + '-' + v.slice(3);
  else el.value = v.slice(0,3) + '-' + v.slice(3,7) + '-' + v.slice(7);
}
function pad(n) { return String(n).padStart(2,'0'); }
function showLoading(t) {
  document.getElementById('loading-text').textContent = t || '처리 중…';
  document.getElementById('loading-overlay').classList.add('show');
}
function hideLoading() { document.getElementById('loading-overlay').classList.remove('show'); }
function showMsg(id, text, isOk) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + (isOk ? 'ok' : 'err');
}

function sendOtp() {
  const name  = document.getElementById('inp-name').value.trim();
  const phone = document.getElementById('inp-phone').value.trim();
  if (!name || !phone) { showMsg('msg-login','이름과 전화번호를 입력하세요',false); return; }
  if (phone.replace(/\D/g,'').length < 10) { showMsg('msg-login','올바른 전화번호를 입력하세요',false); return; }
  showLoading('인증번호 발송 중…');
  fetch(GAS_URL, { method:'POST', body: JSON.stringify({ type:'otp_request', name, phone }) })
    .then(r => r.json())
    .then(res => {
      hideLoading();
      if (res.ok) {
        currentPhone = phone.replace(/-/g,'');
        currentName  = name;
        document.getElementById('section-login').style.display = 'none';
        document.getElementById('section-otp').style.display = 'block';
        showMsg('msg-otp', res.message, true);
      } else { showMsg('msg-login', res.error, false); }
    })
    .catch(() => { hideLoading(); showMsg('msg-login','서버 오류. 잠시 후 다시 시도하세요',false); });
}

function verifyOtp() {
  const otp = document.getElementById('inp-otp').value.trim();
  if (!otp || otp.length !== 6) { showMsg('msg-otp','6자리 인증번호를 입력하세요',false); return; }
  showLoading('근태 데이터 조회 중…');
  fetch(GAS_URL, { method:'POST', body: JSON.stringify({ type:'otp_verify', phone: currentPhone, otp }) })
    .then(r => r.json())
    .then(res => {
      hideLoading();
      if (res.ok) {
        document.getElementById('section-otp').style.display = 'none';
        renderResult(res);
      } else { showMsg('msg-otp', res.error, false); }
    })
    .catch(() => { hideLoading(); showMsg('msg-otp','서버 오류. 잠시 후 다시 시도하세요',false); });
}

let isOpenGlobal = false;
let submittedMonths = [];
  
function renderResult(res) {
  allRows  = res.rows;
  userInfo = res.userInfo || {};
  isOpenGlobal = res.isOpen;
  submittedMonths = res.submittedMonths || [];

  document.getElementById('user-banner').style.display = 'block';
  document.getElementById('banner-name').textContent = res.name + ' 님';
  document.getElementById('banner-info').textContent =
    [userInfo.dept, userInfo.no ? '사번 ' + userInfo.no : ''].filter(Boolean).join(' | ');

  const mSet = new Set();
  allRows.forEach(r => {
    const d = String(r['근무일자'] || '');
    if (d.length >= 7) mSet.add(d.slice(0,7));
  });
  months = Array.from(mSet).sort().reverse();
  currentMonth = months[0] || '';

  const now = new Date();
  issuedStr = `발행일 : ${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  document.getElementById('sign-issued-date').textContent = issuedStr;

  renderMonthTabs();
  renderTable(currentMonth);
  updateSubmitArea(currentMonth);
  document.getElementById('section-result').style.display = 'block';
  window.scrollTo(0, 0);
}

function renderMonthTabs() {
  const wrap = document.getElementById('month-tabs');
  wrap.innerHTML = '';
  months.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'month-tab' + (m === currentMonth ? ' active' : '');
    btn.textContent = m;
    btn.onclick = () => {
      currentMonth = m;
      renderMonthTabs();
      renderTable(m);
      updateSubmitArea(m);
    };
    wrap.appendChild(btn);
  });
}
function updateSubmitArea(month) {
  const already = submittedMonths.includes(month);
  const canSubmit = isOpenGlobal && !already;

  document.getElementById('sign-section').style.display = canSubmit ? 'block' : 'none';
  document.querySelector('.submit-area').style.display  = canSubmit ? 'flex'  : 'none';

  const box = document.getElementById('complete-box');
  if (!canSubmit) {
    box.style.display = 'block';
    box.querySelector('.check').style.display = 'none';
    box.querySelector('.comp-title').style.display = 'none';
    if (!isOpenGlobal) {
      document.getElementById('comp-sub-text').textContent = '현재 제출이 비활성화 상태입니다. 관리자에게 문의하세요.';
    } else if (already) {
      document.getElementById('comp-sub-text').textContent = `${month} 근태확인서는 이미 제출되었습니다.`;
    }
  } else {
    box.style.display = 'none';
    box.querySelector('.check').style.display = 'block';
    box.querySelector('.comp-title').style.display = 'block';
  }
}
function fmt(n) {
  const num = parseFloat(n) || 0;
  return num === 0 ? '' : (num % 1 === 0 ? String(num) : num.toFixed(1));
}

function renderTable(month) {
  const rows = allRows.filter(r => String(r['근무일자'] || '').startsWith(month));
  const sums = {};
  SUM_COLS.forEach(c => sums[c] = 0);
  rows.forEach(r => SUM_COLS.forEach(c => { sums[c] += parseFloat(r[c]) || 0; }));

  // 합계 그리드
  const grid = document.getElementById('summary-grid');
  grid.innerHTML = '';
  SUM_COLS.forEach(c => {
    const v = sums[c];
    if (v === 0) return;
    const el = document.createElement('div');
    el.className = 'summary-item';
    el.innerHTML = `<div class="s-label">${c}</div><div class="s-value">${fmt(v)}</div>`;
    grid.appendChild(el);
  });

  // 헤더
  const thead = document.getElementById('result-thead');
  thead.innerHTML = '';
  const trh = document.createElement('tr');
  SHOW_COLS.forEach(h => {
    const th = document.createElement('th');
    th.textContent = h;
    trh.appendChild(th);
  });
  thead.appendChild(trh);

  // 바디
  const tbody = document.getElementById('result-tbody');
  tbody.innerHTML = '';
  const days = ['일','월','화','수','목','금','토'];

  rows.forEach(r => {
    const tr = document.createElement('tr');
    SHOW_COLS.forEach(h => {
      const td = document.createElement('td');
      const val = r[h];
      if (h === '근무일자') {
        if (val) {
          const d = new Date(val + 'T00:00:00+09:00');
          td.textContent = `${d.getMonth()+1}/${d.getDate()}(${days[d.getDay()]})`;
        }
      } else if (SUM_COLS.includes(h)) {
        const n = parseFloat(val) || 0;
        td.textContent = n === 0 ? '' : fmt(n);
      } else {
        // 휴일구분, 근태 등 원본값 그대로
        td.textContent = (val === null || val === undefined) ? '' : String(val);
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });

  // 합계 행
  if (rows.length > 0) {
    const tr = document.createElement('tr');
    tr.className = 'sum-row';
    SHOW_COLS.forEach((h, i) => {
      const td = document.createElement('td');
      if (i === 0) td.textContent = '계';
      else if (SUM_COLS.includes(h) && sums[h] > 0) td.textContent = fmt(sums[h]);
      else td.textContent = '';
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  }
}

async function submitConfirm() {
  if (!hasSigned) { alert('서명을 먼저 해주세요.'); return; }

  const now = new Date();
  const submitAt = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  const monthRows = allRows.filter(r => String(r['근무일자'] || '').startsWith(currentMonth));

  const payload = {
    type:      'duty_confirm',
    name:      currentName,
    phone:     currentPhone,
    dept:      userInfo.dept || '',
    empNo:     userInfo.no   || '',
    month:     currentMonth,
    issuedAt:  submitAt,
    signImage: signCanvas.toDataURL('image/png'),
    rows:      monthRows,
  };

  showLoading('제출 중…');

  fetch(GAS_URL, { method:'POST', body: JSON.stringify(payload) })
    .then(r => r.json())
    .then(() => { hideLoading(); showComplete(submitAt); })
    .catch(() => { hideLoading(); showComplete(submitAt); });
}

function showComplete(at) {
  document.getElementById('complete-box').style.display = 'block';
  document.getElementById('comp-sub-text').textContent =
    `${currentMonth} 근태확인서가 제출되었습니다. 문자로 발송된 링크에서 PDF를 확인하세요.`;
  document.getElementById('sign-section').style.display = 'none';
  document.querySelector('.submit-area').style.display = 'none';
}

function resetLogin() {
  document.getElementById('section-otp').style.display = 'none';
  document.getElementById('section-login').style.display = 'block';
  document.getElementById('msg-login').className = 'msg';
}

function resetAll() {
  ['section-result','user-banner'].forEach(id => document.getElementById(id).style.display = 'none');
  document.getElementById('section-login').style.display = 'block';
  ['inp-name','inp-phone','inp-otp'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('msg-login').className = 'msg';
