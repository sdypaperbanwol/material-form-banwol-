<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일근태현황 조회 | 대양그룹</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
  background: #f0f2f5;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 16px;
}
h1 { font-size: 18px; color: #198038; margin-bottom: 20px; font-weight: bold; }

#loading-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(255,255,255,0.88); z-index: 999;
  flex-direction: column; align-items: center; justify-content: center; gap: 14px;
}
#loading-overlay.show { display: flex; }
.spinner {
  width: 42px; height: 42px; border: 4px solid #e0e0e0;
  border-top-color: #198038; border-radius: 50%;
  animation: spin 0.75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: #444; }

.card {
  background: white; border-radius: 12px; padding: 24px;
  width: 100%; max-width: 420px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 16px;
}
.card.wide { max-width: 1100px; }
.card-title { font-size: 14px; color: #555; font-weight: bold; margin-bottom: 16px; }

label { display: block; font-size: 13px; color: #333; margin-bottom: 4px; margin-top: 12px; }
input {
  width: 100%; padding: 10px 12px; border: 1px solid #ddd;
  border-radius: 8px; font-size: 15px; outline: none; transition: border 0.2s;
}
input:focus { border-color: #198038; }

.calc-formGrid { display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-bottom:4px; }
@media (max-width: 520px){ .calc-formGrid{grid-template-columns:1fr;} }
select { width:100%; padding:10px 12px; border:1px solid #ddd; border-radius:8px; font-size:15px; outline:none; background:#fff; }
.calc-btnRow { display:flex; gap:10px; margin-top:4px; }
.calc-error { color:#da1e28; font-weight:bold; font-size:13px; margin-top:10px; }
.calc-resultBox {
  display:flex; align-items:center; justify-content:space-between; gap:12px;
  padding:16px; border:1px dashed #d6d9e6; border-radius:12px;
  background:#fafbff; margin-top:16px;
}
.calc-who { display:flex; flex-direction:column; gap:4px; }
.calc-line1 { font-weight:800; font-size:15px; }
.calc-line2 { font-size:12px; color:#6b7280; }
.calc-big { font-size:32px; font-weight:900; letter-spacing:-.5px; white-space:nowrap; color:#198038; }
.calc-small { font-size:13px; color:#6b7280; margin-top:12px; line-height:1.5; }
.calc-details { margin-top:16px; border-top:1px solid #e6e8ee; padding-top:12px; }
.calc-details pre {
  margin:0; white-space:pre-wrap; background:#f9fafb;
  border:1px solid #e6e8ee; padding:12px; border-radius:10px;
  font-size:12px; color:#111827; line-height:1.6;
}

.btn {
  display: block; width: 100%; padding: 12px; border: none;
  border-radius: 8px; font-size: 15px; font-weight: bold;
  cursor: pointer; margin-top: 16px; transition: opacity 0.2s;
}
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-green  { background: #198038; color: white; }
.btn-blue   { background: #0f62fe; color: white; }
.btn-gray   { background: #e0e0e0; color: #333; }
.btn-orange { background: #ff6b00; color: white; }

.msg { margin-top: 10px; font-size: 13px; padding: 8px 12px; border-radius: 6px; display: none; }
.msg.ok  { background: #defbe6; color: #198038; display: block; }
.msg.err { background: #fff1f1; color: #da1e28; display: block; }

.user-banner {
  background: linear-gradient(135deg, #198038, #24a148);
  color: white; border-radius: 12px; padding: 16px 24px;
  width: 100%; max-width: 1100px; margin-bottom: 16px; display: none;
}
.user-banner .user-name { font-size: 20px; font-weight: bold; margin-bottom: 4px; }
.user-banner .user-info { font-size: 13px; opacity: 0.85; }

.month-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.month-tab {
  padding: 6px 16px; border-radius: 20px; border: 1px solid #ddd;
  background: white; cursor: pointer; font-size: 13px; transition: all 0.2s;
}
.month-tab.active { background: #198038; color: white; border-color: #198038; }
.main-tabs { display: flex; gap: 8px; margin-bottom: 16px; border-bottom: 2px solid #eee; }
.main-tab {
  padding: 10px 18px; border: none; background: none; cursor: pointer;
  font-size: 14px; font-weight: bold; color: #888; border-bottom: 3px solid transparent;
}
.main-tab.active { color: #198038; border-bottom-color: #198038; }
.summary-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
  gap: 8px; margin-bottom: 16px;
}
.summary-item { background: #f4f4f4; border-radius: 8px; padding: 10px; text-align: center; }
.summary-item .s-label { font-size: 11px; color: #666; margin-bottom: 4px; }
.summary-item .s-value { font-size: 16px; font-weight: bold; color: #198038; }

.brand-bar {
  width: 100%; max-width: 420px;
  background: linear-gradient(135deg, #198038, #24a148);
  color: white; border-radius: 12px 12px 0 0;
  padding: 14px 24px; font-size: 13px; font-weight: bold;
  display: flex; align-items: center; gap: 8px;
}
.card.with-brand { border-radius: 0 0 12px 12px; margin-top: 0; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
/* 화면 테이블 - 검정 통일 */
.table-wrap { overflow-x: auto; border: 1px solid #000; }
table.att-table {
  border-collapse: collapse; font-size: 12px;
  width: 100%; min-width: 900px;
}
table.att-table th {
  background: #fff; color: #000; font-weight: bold;
  padding: 7px 6px; text-align: center;
  border: 1px solid #000; white-space: nowrap; font-size: 11px;
}
table.att-table td {
  padding: 6px 6px; border: 1px solid #000;
  text-align: center; white-space: nowrap;
  color: #000; background: #fff; font-size: 12px;
}
.leave-table { table-layout: fixed; width: 100%; min-width: 0; }
.leave-table th:nth-child(1), .leave-table td:nth-child(1) { width: 110px; } /* 근태일 */
.leave-table th:nth-child(2), .leave-table td:nth-child(2) { width: 44px; }  /* 요일 */
.leave-table th:nth-child(3), .leave-table td:nth-child(3) { width: 80px; }  /* 근태코드 */
.leave-table th:nth-child(4), .leave-table td:nth-child(4) { width: 44px; }  /* 횟수 */
.leave-table th:nth-child(5), .leave-table td:nth-child(5) { width: 44px; }  /* 시간 */
.leave-table th:nth-child(6), .leave-table td:nth-child(6) {                  /* 비고 */
  width: auto;
  text-align: left;
  padding-left: 12px;
  white-space: normal;
  word-break: keep-all;
}

/* 서명 영역 */
.sign-section {
  margin-top: 24px; padding: 20px;
  background: #f9fafb; border-radius: 10px; border: 1px solid #e0e0e0;
}
.sign-notice { font-size: 12px; color: #555; margin-bottom: 16px; line-height: 1.6; }
.sign-bottom {
  display: flex; justify-content: space-between;
  align-items: flex-start; flex-wrap: wrap; gap: 16px;
}
.sign-issued { font-size: 13px; color: #555; }
.confirm-table { border-collapse: collapse; font-size: 12px; }
.confirm-table td { border: 1px solid #000; text-align: center; }
.confirm-table .label-cell {
  background: #fff; font-weight: bold; padding: 4px 10px; font-size: 11px;
}
.confirm-table .sign-cell { width: 100px; height: 80px; vertical-align: top; padding: 0; }
.confirm-table .empty-cell { width: 100px; height: 80px; }
#sign-canvas { cursor: crosshair; display: block; width: 100px; height: 80px; touch-action: none; }
.sign-btns { display: flex; gap: 8px; margin-top: 6px; justify-content: flex-end; }
.sign-btn {
  padding: 5px 12px; font-size: 12px; border: 1px solid #ddd;
  border-radius: 6px; cursor: pointer; background: white;
}


.sign-btn.clear { color: #da1e28; border-color: #da1e28; }

.sign-save-area { margin-top: 8px; }
.sign-save-btn {
  padding: 5px 12px; font-size: 12px; border: 1px solid #198038;
  border-radius: 6px; cursor: pointer; background: white; color: #198038;
}
.sign-save-hint { font-size: 11px; color: #888; margin-top: 4px; }
.sign-saved-ok { font-size: 11px; color: #198038; margin-top: 4px; display:none; }

.submit-area { margin-top: 20px; display: flex; gap: 12px; flex-wrap: wrap; }
.submit-area .btn { flex: 1; min-width: 140px; margin-top: 0; }

.complete-box {
  background: #defbe6; border-radius: 10px; padding: 20px;
  text-align: center; display: none; margin-top: 16px;
}
.complete-box .check { font-size: 36px; margin-bottom: 8px; }
.complete-box .comp-title { font-size: 16px; font-weight: bold; color: #198038; }
.complete-box .comp-sub { font-size: 13px; color: #555; margin-top: 6px; }

#section-otp    { display: none; }
#section-result { display: none; }
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">처리 중…</div>
</div>

<h1>📋 일근태현황 조회</h1>

<!-- 1단계 -->
<div class="brand-bar">🏢 신대양제지반월(주)</div>
<div class="card with-brand" id="section-login">
  <div class="card-title">본인 인증</div>
  <label>이름</label>

  <label>휴대폰번호</label>

<div class="card" id="section-otp">

</div>

<!-- 배너 -->
<div class="user-banner" id="user-banner">
  <div class="user-name" id="banner-name"></div>
  <div class="user-info" id="banner-info"></div>
</div>

<!-- 결과 -->
<div class="card wide" id="section-result">
 <div class="card-title">근태현황</div>

<div class="main-tabs" id="main-tabs">

  <button class="main-tab" data-view="calc" onclick="switchMainTab('calc')">연차계산기</button>

<div id="daily-view">
  <div class="month-tabs" id="month-tabs"></div>
<div style="display:flex; justify-content:flex-end; margin-bottom:12px;">
  <button class="btn btn-gray" style="width:auto; padding:8px 16px; font-size:13px; margin-top:0;" onclick="printCurrentMonth()">🖨️ 인쇄 / PDF저장</button>
</div>
<div class="summary-grid" id="summary-grid"></div>

  <div class="table-wrap">
    <table class="att-table">
      <thead id="result-thead"></thead>
      <tbody id="result-tbody"></tbody>
    </table>
  </div>

  <!-- 서명 영역 -->
<!-- 서명 영역 -->
<div class="sign-section" id="sign-section">
  <div class="sign-notice">
    ※ 교대근무자는 휴게시간을 포함하여 상기와 같이 근무했음을 확인합니다.
  </div>
  <div class="sign-bottom">
    <div class="sign-issued" id="sign-issued-date"></div>
    <div>
      <table class="confirm-table">
        <tr>
          <td class="label-cell">확인</td>
          <td class="sign-cell"><canvas id="sign-canvas" width="100" height="80"></canvas></td>
          <td class="empty-cell"></td>
          <td class="empty-cell"></td>
        </tr>
      </table>
<div class="sign-btns">
  <button class="sign-btn clear" onclick="clearSign()">서명 지우기</button>
</div>
<div style="font-size:11px;color:#888;margin-top:4px;text-align:right;">손가락 또는 마우스로 서명하세요</div>
<div class="sign-save-area">

 <div class="calc-formGrid">

    <input id="calc-join" inputmode="numeric" maxlength="8" placeholder="예) 20170417">

  <div class="calc-btnRow">
    <button class="btn btn-green" style="margin-top:0;flex:1;" onclick="runCalc()">계산</button>

      <div class="calc-line1" id="calc-whoLine">-</div>

    입사일자와 기준일자를 입력 후 <b>계산</b>을 눌러주세요.
  </div>

  <div class="calc-details" id="calc-details" style="display:none;">
    <div class="card-title" style="margin-bottom:8px;">계산 내역</div>
    <pre id="calc-explain"></pre>
  </div>
</div>

  <button class="btn btn-gray" style="margin-top:16px;max-width:180px" onclick="resetAll()">처음으로</button>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbw3fdftdjNb22QADqOCJHecNVlxs0_uMCGrHYEHyiOF0K1QRZMoHv1i_6wWz0_H5yZf/exec';

const SHOW_COLS = ['근무일자','휴일구분','근태','출근1','퇴근1','출근2','퇴근2','정규','연장','야간','휴일','휴일연장','지각','조퇴','유급','주휴'];
const SUM_COLS  = ['정규','연장','야간','휴일','휴일연장','지각','조퇴','유급','주휴'];

let currentPhone = '', currentName = '';
let allRows = [], months = [], currentMonth = '';
let userInfo = {};
let leaveRows = [];
const LEAVE_CODES = ['년차휴가','년차반일','휴가','특휴','공상'];
let signCanvas, signCtx, signing = false, hasSigned = false;
let issuedStr = '';

window.addEventListener('DOMContentLoaded', () => {
  signCanvas = document.getElementById('sign-canvas');
  signCtx = signCanvas.getContext('2d');
  signCtx.strokeStyle = '#000';
  signCtx.lineWidth = 2;
  signCtx.lineCap = 'round';
  signCtx.lineJoin = 'round';

  const getXY = (e, rect) => {
    if (e.touches) return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  };
  const startSign = e => {
    e.preventDefault(); signing = true; signCtx.beginPath();
    const r = signCanvas.getBoundingClientRect();
    const { x, y } = getXY(e, r);
    signCtx.moveTo(x * signCanvas.width / r.width, y * signCanvas.height / r.height);
  };
const moveSign = e => {
    e.preventDefault(); if (!signing) return; hasSigned = true;
    const r = signCanvas.getBoundingClientRect();
    const { x, y } = getXY(e, r);
    signCtx.lineTo(x * signCanvas.width / r.width, y * signCanvas.height / r.height);
    signCtx.stroke();
    localStorage.setItem('dyhr_sign', signCanvas.toDataURL('image/png'));
  };
  const endSign = e => { e.preventDefault(); signing = false; };

  signCanvas.addEventListener('mousedown',  startSign);
  signCanvas.addEventListener('mousemove',  moveSign);
  signCanvas.addEventListener('mouseup',    endSign);
  signCanvas.addEventListener('mouseleave', endSign);
  signCanvas.addEventListener('touchstart', startSign, { passive: false });
  signCanvas.addEventListener('touchmove',  moveSign,  { passive: false });
signCanvas.addEventListener('touchend',   endSign,   { passive: false });

  // 저장된 서명 복원
  const savedSign = localStorage.getItem('dyhr_sign');
  if (savedSign) {
    const img = new Image();
    img.onload = () => {
      signCtx.drawImage(img, 0, 0);
      hasSigned = true;
    };
    img.src = savedSign;
  }
});

function clearSign() {
  signCtx.clearRect(0, 0, signCanvas.width, signCanvas.height);
  hasSigned = false;
  localStorage.removeItem('dyhr_sign');
}
function saveSign() {
  if (!hasSigned) { alert('서명을 먼저 해주세요.'); return; }
  const signData = signCanvas.toDataURL('image/png');
  localStorage.setItem('dyhr_sign', signData);

  showLoading('서명 저장 중…');
  fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify({ type: 'sign_save', phone: currentPhone, signData })
  })
    .then(r => r.json())
    .then(res => {
      hideLoading();
      if (res.ok) {
        const ok = document.getElementById('sign-saved-ok');
        ok.style.display = 'block';
        setTimeout(() => { ok.style.display = 'none'; }, 3000);
      } else { alert('서버 저장 실패: ' + res.error); }
    })
    .catch(() => { hideLoading(); alert('서버 오류로 저장 실패'); });
}
function loadSign(base64) {
  if (!base64) return;
  const img = new Image();
  img.onload = () => {
    signCtx.clearRect(0, 0, signCanvas.width, signCanvas.height);
    signCtx.drawImage(img, 0, 0, signCanvas.width, signCanvas.height);
    hasSigned = true;
    localStorage.setItem('dyhr_sign', base64);
  };
  img.src = base64;
}

function formatPhone(el) {
  let v = el.value.replace(/\D/g, '').slice(0, 11);
  if (v.length <= 3) el.value = v;
  else if (v.length <= 7) el.value = v.slice(0,3) + '-' + v.slice(3);
  else el.value = v.slice(0,3) + '-' + v.slice(3,7) + '-' + v.slice(7);
}
function pad(n) { return String(n).padStart(2,'0'); }
function showLoading(t) {
  document.getElementById('loading-text').textContent = t || '처리 중…';
  document.getElementById('loading-overlay').classList.add('show');
}
function hideLoading() { document.getElementById('loading-overlay').classList.remove('show'); }
function showMsg(id, text, isOk) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + (isOk ? 'ok' : 'err');
}

function sendOtp() {
  const name  = document.getElementById('inp-name').value.trim();
  const phone = document.getElementById('inp-phone').value.trim();
  if (!name || !phone) { showMsg('msg-login','이름과 전화번호를 입력하세요',false); return; }
  if (phone.replace(/\D/g,'').length < 10) { showMsg('msg-login','올바른 전화번호를 입력하세요',false); return; }
  showLoading('인증번호 발송 중…');
  fetch(GAS_URL, { method:'POST', body: JSON.stringify({ type:'otp_request', name, phone }) })
    .then(r => r.json())
    .then(res => {
      hideLoading();
      if (res.ok) {
        currentPhone = phone.replace(/-/g,'');
        currentName  = name;
        document.getElementById('section-login').style.display = 'none';

        }
      } else if (SUM_COLS.includes(h)) {
        const n = parseFloat(val) || 0;
        td.textContent = n === 0 ? '' : fmt(n);
      } else {
        // 휴일구분, 근태 등 원본값 그대로
        td.textContent = (val === null || val === undefined) ? '' : String(val);
      }
      tr.appendChild(td);

  if (rows.length > 0) {

      else td.textContent = '';
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  }

// ===== 연차 계산기 =====
function onlyDigits8(el){
  el.addEventListener('input', () => { el.value = el.value.replace(/\D/g,'').slice(0,8); });
}
onlyDigits8(document.getElementById('calc-join'));
onlyDigits8(document.getElementById('calc-base'));

function calcParseDate(s){
  if (!s || s.length !== 8) return null;
  const y = Number(s.slice(0,4)), m = Number(s.slice(4,6)), d = Number(s.slice(6,8));
  if (!y || m<1 || m>12 || d<1 || d>31) return null;
  const dt = new Date(y, m-1, d);
  if (dt.getFullYear() !== y || dt.getMonth() !== (m-1) || dt.getDate() !== d) return null;
  return dt;
}
function fmtDate(d){
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), dd = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}
function calcAddDays(date, n){
  const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  d.setDate(d.getDate() + n);
  return d;
}
function calcClamp(n, lo, hi){ return Math.max(lo, Math.min(hi, n)); }
function calcIsJan1(d){ return d.getMonth() === 0 && d.getDate() === 1; }
function calcYearEnd(y){ return new Date(y,11,31); }
function calcDaysInYear(y){
  const a = new Date(y,0,1), b = new Date(y+1,0,1);
  return Math.round((b-a)/86400000);
}
function calcDiffDaysInclusive(a,b){
  const A = new Date(a.getFullYear(), a.getMonth(), a.getDate());
  const B = new Date(b.getFullYear(), b.getMonth(), b.getDate());
  const diff = Math.round((B-A)/86400000);
  return diff >= 0 ? diff + 1 : 0;
}
function calcStartYear15(join){ return join.getFullYear() + (calcIsJan1(join) ? 1 : 2); }

function calcMonthPeriodEnd(join, n){
  const y = join.getFullYear(), m = join.getMonth(), day = join.getDate();
  const targetY = y + Math.floor((m + n) / 12), targetM = (m + n) % 12;
  const targetLast = new Date(targetY, targetM + 1, 0).getDate();
  if (day <= targetLast) return new Date(targetY, targetM, day - 1);
  return new Date(targetY, targetM, targetLast);
}
function calcMonthlyAccrualDate(join, n){ return calcAddDays(calcMonthPeriodEnd(join, n), 1); }

function calcCountMonthlyUpToBase(join, base){
  const firstMonthlyAccrual = calcMonthlyAccrualDate(join, 1);
  if (base < firstMonthlyAccrual) {
    return { monthly: 0, accrualDates: [], firstMonthlyAccrual,
      firstMonthlyEnd: calcMonthPeriodEnd(join, 1),
      anniv: new Date(join.getFullYear()+1, join.getMonth(), join.getDate()) };
  }
  const anniv = new Date(join.getFullYear()+1, join.getMonth(), join.getDate());
  const annivMonth = anniv.getMonth(), annivYear = anniv.getFullYear();
  let monthly = 0;
  const accrualDates = [];
  for (let k=1; k<=11; k++){
    const d = calcMonthlyAccrualDate(join, k);
    accrualDates.push(d);
    if (d > base) continue;
    const isFirstDay = (d.getDate() === 1);
    const isMonthBeforeAnniv = (d.getFullYear() === annivYear) && (d.getMonth() === ((annivMonth + 11) % 12));
    if (base < anniv && isFirstDay && isMonthBeforeAnniv) continue;
    monthly += 1;
  }
  monthly = calcClamp(monthly, 0, 11);
  return { monthly, accrualDates, firstMonthlyAccrual, firstMonthlyEnd: calcMonthPeriodEnd(join, 1), anniv };
}

function calcProratedFromJoinYear(join){
  if (calcIsJan1(join)) return { prorated: 0, workedDays: 0, yDays: calcDaysInYear(join.getFullYear()), periodEnd: calcYearEnd(join.getFullYear()) };
  const joinY = join.getFullYear(), end = calcYearEnd(joinY);
  const workedDays = calcDiffDaysInclusive(join, end), yDays = calcDaysInYear(joinY);
  const prorated = Math.ceil((workedDays / yDays) * 15);
  return { prorated, workedDays, yDays, periodEnd: end };
}

function calcAnnualEntitlementForYear(join, baseYear){
  const s15 = calcStartYear15(join);
  let leave = 0;
  if (baseYear < s15) leave = 0;
  else { leave = 15 + Math.floor((baseYear - s15)/2); leave = Math.min(25, leave); }
  return { leave, s15 };
}

function calcSetError(msg){
  const el = document.getElementById('calc-err');
  if (!msg){ el.style.display = 'none'; el.textContent = ''; return; }
  el.style.display = 'block'; el.textContent = msg;
}

function calcShowResult({whoLabel, join, base, total, explain}){
  document.getElementById('calc-emptyHelp').style.display = 'none';
  document.getElementById('calc-resultBox').style.display = 'flex';
  document.getElementById('calc-details').style.display = 'block';
  document.getElementById('calc-whoLine').textContent = whoLabel;
  document.getElementById('calc-metaLine').textContent = `입사 ${fmtDate(join)} · 기준일 ${fmtDate(base)}`;
  document.getElementById('calc-outDays').textContent = `${total} 개`;
  document.getElementById('calc-explain').textContent = explain;
}

function calcResetAll(){
  document.getElementById('calc-join').value = '';
  document.getElementById('calc-base').value = '';
  calcSetError('');
  document.getElementById('calc-resultBox').style.display = 'none';
  document.getElementById('calc-details').style.display = 'none';
  document.getElementById('calc-emptyHelp').style.display = 'block';
}

function runCalc(){
  calcSetError('');
  const join = calcParseDate(document.getElementById('calc-join').value.trim());
  const base = calcParseDate(document.getElementById('calc-base').value.trim());

  if (!join || !base){ calcSetError('입사일자와 기준일자를 YYYYMMDD 형식(숫자 8자리)으로 입력해주세요.'); return; }
  if (base < join){ calcSetError('기준일자는 입사일자보다 빠를 수 없습니다.'); return; }

  const joinY = join.getFullYear(), baseY = base.getFullYear();
  let total = 0, whoLabel = '', explain = '';

  if (baseY === joinY) {
    const m = calcCountMonthlyUpToBase(join, base);
    total = m.monthly;
    whoLabel = `신입`;
    explain += `【입사연도(${joinY})】\n- 월차만 계산 (최대 11)\n\n`;
    explain += `① 월차(최대 11)\n- 1개월차 발생일: ${fmtDate(m.firstMonthlyAccrual)} (종료일 ${fmtDate(m.firstMonthlyEnd)})\n- 기준일까지 발생: ${m.monthly}개\n\n`;
    explain += `합계: ${total}개\n`;
  }
  else if (baseY === joinY + 1 && !calcIsJan1(join)) {
    const m = calcCountMonthlyUpToBase(join, base);
    const p = calcProratedFromJoinYear(join);
    total = m.monthly + p.prorated;
    whoLabel = `신입`;
    explain += `① 월차(최대 11)\n- 기준일까지 발생: ${m.monthly}개\n\n`;
    explain += `② 전년도(${joinY}) 일할(15기준, 올림)\n- 기간: ${fmtDate(join)} ~ ${fmtDate(p.periodEnd)}\n- 해당 연도 일수: ${p.yDays}일\n- 근무일수(포함): ${p.workedDays}일\n- 일할 결과(올림): ${p.prorated}개\n\n`;
    explain += `합계: ${total}개\n`;
  }
  else {
    const ent = calcAnnualEntitlementForYear(join, baseY);
    total = ent.leave;
    whoLabel = `재직자`;
    explain += `【연부여 기준(${baseY}년)】\n- 15개 시작연도: ${ent.s15}년\n- 증가: 2년에 1개 증가\n- 상한: 최대 25개(신입 합산 구간 제외)\n\n`;
    explain += `결과: ${total}개\n`;
  }

  calcShowResult({ whoLabel, join, base, total, explain });
}

calcResetAll();
</script>
