<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>근태현황 관리자조회 | 대양그룹</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
  background: #f0f2f5;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 16px;
}
h1 { font-size: 18px; color: #198038; margin-bottom: 20px; font-weight: bold; }

#loading-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(255,255,255,0.88); z-index: 999;
  flex-direction: column; align-items: center; justify-content: center; gap: 14px;
}
#loading-overlay.show { display: flex; }
.spinner {
  width: 42px; height: 42px; border: 4px solid #e0e0e0;
  border-top-color: #198038; border-radius: 50%;
  animation: spin 0.75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: #444; }

.card {
  background: white; border-radius: 12px; padding: 24px;
  width: 100%; max-width: 420px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 16px;
}
.card.wide { max-width: 1100px; }
.card-title { font-size: 14px; color: #555; font-weight: bold; margin-bottom: 16px; }

label { display: block; font-size: 13px; color: #333; margin-bottom: 4px; margin-top: 12px; }
input {
  width: 100%; padding: 10px 12px; border: 1px solid #ddd;
  border-radius: 8px; font-size: 15px; outline: none; transition: border 0.2s;
}
input:focus { border-color: #198038; }

.btn {
  display: block; width: 100%; padding: 12px; border: none;
  border-radius: 8px; font-size: 15px; font-weight: bold;
  cursor: pointer; margin-top: 16px; transition: opacity 0.2s;
}
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-green  { background: #198038; color: white; }
.btn-gray   { background: #e0e0e0; color: #333; }

.msg { margin-top: 10px; font-size: 13px; padding: 8px 12px; border-radius: 6px; display: none; }
.msg.ok  { background: #defbe6; color: #198038; display: block; }
.msg.err { background: #fff1f1; color: #da1e28; display: block; }

.brand-bar {
  width: 100%; max-width: 1100px;
  background: linear-gradient(135deg, #198038, #24a148);
  color: white; border-radius: 12px 12px 0 0;
  padding: 14px 24px; font-size: 13px; font-weight: bold;
  display: flex; align-items: center; gap: 8px;
}
.card.with-brand { border-radius: 0 0 12px 12px; margin-top: 0; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }

/* ── 검색 ── */
.search-box { margin-bottom: 18px; }
.search-box input { font-size: 15px; }

/* ── 부서별 목록 ── */
.dept-group { margin-bottom: 18px; }
.dept-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px; background: #198038; color: white;
  border-radius: 8px; font-size: 14px; font-weight: bold;
  cursor: pointer; user-select: none;
}
.dept-header .count { font-size: 12px; opacity: 0.85; font-weight: normal; }
.dept-header .arrow { transition: transform 0.2s; }
.dept-header.collapsed .arrow { transform: rotate(-90deg); }
.person-list {
  display: flex; flex-direction: column;
  border: 1px solid #e0e0e0; border-top: none;
  border-radius: 0 0 8px 8px; overflow: hidden;
}
.person-list.collapsed { display: none; }
.person-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; background: white; cursor: pointer;
  border-bottom: 1px solid #f0f0f0; transition: background 0.15s;
}
.person-item:last-child { border-bottom: none; }
.person-item:hover { background: #f4fbf6; }
.person-item .p-name { font-size: 14px; font-weight: bold; color: #222; }
.person-item .p-no { font-size: 12px; color: #999; margin-left: 8px; font-weight: normal; }
.person-item .p-arrow { color: #ccc; font-size: 14px; }
.empty-hint { text-align: center; color: #999; font-size: 13px; padding: 20px; }

/* ── 사용자 배너 ── */
.user-banner {
  background: linear-gradient(135deg, #198038, #24a148);
  color: white; border-radius: 12px; padding: 16px 24px;
  width: 100%; max-width: 1100px; margin-bottom: 16px; display: none;
  align-items: center; justify-content: space-between; gap: 16px;
}
.user-banner .user-name { font-size: 20px; font-weight: bold; margin-bottom: 4px; }
.user-banner .user-info { font-size: 13px; opacity: 0.85; }
.user-banner .back-btn {
  padding: 8px 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.6);
  background: rgba(255,255,255,0.15); color: white; font-size: 13px; cursor: pointer;
  white-space: nowrap;
}

.month-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.month-tab {
  padding: 6px 16px; border-radius: 20px; border: 1px solid #ddd;
  background: white; cursor: pointer; font-size: 13px; transition: all 0.2s;
}
.month-tab.active { background: #198038; color: white; border-color: #198038; }
.main-tabs { display: flex; gap: 8px; margin-bottom: 16px; border-bottom: 2px solid #eee; }
.main-tab {
  padding: 10px 18px; border: none; background: none; cursor: pointer;
  font-size: 14px; font-weight: bold; color: #888; border-bottom: 3px solid transparent;
}
.main-tab.active { color: #198038; border-bottom-color: #198038; }
.summary-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
  gap: 8px; margin-bottom: 16px;
}
.summary-item { background: #f4f4f4; border-radius: 8px; padding: 10px; text-align: center; }
.summary-item .s-label { font-size: 11px; color: #666; margin-bottom: 4px; }
.summary-item .s-value { font-size: 16px; font-weight: bold; color: #198038; }

.table-wrap { overflow-x: auto; border: 1px solid #000; }
table.att-table {
  border-collapse: collapse; font-size: 12px;
  width: 100%; min-width: 900px;
}
table.att-table th {
  background: #fff; color: #000; font-weight: bold;
  padding: 7px 6px; text-align: center;
  border: 1px solid #000; white-space: nowrap; font-size: 11px;
}
table.att-table td {
  padding: 6px 6px; border: 1px solid #000;
  text-align: center; white-space: nowrap;
  color: #000; background: #fff; font-size: 12px;
}
.leave-table { table-layout: fixed; width: 100%; min-width: 0; }
.leave-table th:nth-child(1), .leave-table td:nth-child(1) { width: 110px; }
.leave-table th:nth-child(2), .leave-table td:nth-child(2) { width: 44px; }
.leave-table th:nth-child(3), .leave-table td:nth-child(3) { width: 80px; }
.leave-table th:nth-child(4), .leave-table td:nth-child(4) { width: 44px; }
.leave-table th:nth-child(5), .leave-table td:nth-child(5) { width: 44px; }
.leave-table th:nth-child(6), .leave-table td:nth-child(6) {
  width: auto; text-align: left; padding-left: 12px;
  white-space: normal; word-break: keep-all;
}

#section-key    { display: block; }
#section-list   { display: none; }
#section-result { display: none; }
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">처리 중…</div>
</div>

<h1>🔐 근태현황 관리자조회</h1>

<!-- 0단계: 관리자 키 입력 -->
<div class="brand-bar">🏢 신대양제지반월(주) · 관리자용</div>
<div class="card with-brand" id="section-key">
  <div class="card-title">관리자 인증</div>
  <label>관리자 키</label>
  <input type="password" id="inp-adminkey" placeholder="관리자 키 입력" autocomplete="off">
  <button class="btn btn-green" onclick="enterAdmin()">입장</button>
  <div class="msg" id="msg-key"></div>
</div>

<!-- 1단계: 부서별 인원 목록 -->
<div class="card wide" id="section-list">
  <div class="card-title">인원 목록</div>
  <div class="search-box">
    <input type="text" id="inp-search" placeholder="이름으로 검색…" oninput="renderList()">
  </div>
  <div id="dept-groups"></div>
</div>

<!-- 사용자 배너 -->
<div class="user-banner" id="user-banner">
  <div>
    <div class="user-name" id="banner-name"></div>
    <div class="user-info" id="banner-info"></div>
  </div>
  <button class="back-btn" onclick="backToList()">← 목록으로</button>
</div>

<!-- 2단계: 상세 결과 -->
<div class="card wide" id="section-result">
  <div class="card-title">근태현황</div>

  <div class="main-tabs" id="main-tabs">
    <button class="main-tab active" data-view="daily" onclick="switchMainTab('daily')">일근태현황</button>
    <button class="main-tab" data-view="leave" onclick="switchMainTab('leave')">휴가사용내역</button>
  </div>

  <div id="daily-view">
    <div class="month-tabs" id="month-tabs"></div>
    <div class="summary-grid" id="summary-grid"></div>
    <div class="table-wrap">
      <table class="att-table">
        <thead id="result-thead"></thead>
        <tbody id="result-tbody"></tbody>
      </table>
    </div>
  </div>

  <div id="leave-view" style="display:none">
    <div class="summary-grid" id="leave-summary-grid"></div>
    <div class="table-wrap">
      <table class="att-table leave-table">
        <thead id="leave-thead"></thead>
        <tbody id="leave-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxOlpZAEQLdKUUx6vedItuTbHVKIHpTEqDrKV2AwmI5rq-6E_2oXv5cfZtlm5acKf9-/exec';

const SHOW_COLS = ['근무일자','휴일구분','근태','출근1','퇴근1','출근2','퇴근2','정규','연장','야간','휴일','휴일연장','지각','조퇴','유급','주휴'];
const SUM_COLS  = ['정규','연장','야간','휴일','휴일연장','지각','조퇴','유급','주휴'];
const LEAVE_CODES = ['년차휴가','년차반일','휴가','특휴','공상'];

let adminKey = '';
let fullList = [];       // [{name, no, dept}]

// 부서 표시 순서: 여기 나열된 부서가 먼저, 나머지(관리직 등)는 그 뒤에 이름순
const DEPT_PRIORITY = ['반월 초지파트', '반월 원질파트', '반월 공무파트', '반월 소각파트', '반월 환경파트', '반월 전기파트'];
function deptSortKey(dept) {
  const idx = DEPT_PRIORITY.indexOf(dept);
  return idx === -1 ? DEPT_PRIORITY.length : idx;
}
let currentName = '';
let allRows = [], months = [], currentMonth = '';
let userInfo = {};
let leaveRows = [];

function showLoading(t) {
  document.getElementById('loading-text').textContent = t || '처리 중…';
  document.getElementById('loading-overlay').classList.add('show');
}
function hideLoading() { document.getElementById('loading-overlay').classList.remove('show'); }
function showMsg(id, text, isOk) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + (isOk ? 'ok' : 'err');
}
function pad(n) { return String(n).padStart(2,'0'); }
function fmt(n) {
  const num = parseFloat(n) || 0;
  return num === 0 ? '' : (num % 1 === 0 ? String(num) : num.toFixed(1));
}

// ── 0단계: 관리자 인증 ──
function enterAdmin() {
  const key = document.getElementById('inp-adminkey').value.trim();
  if (!key) { showMsg('msg-key', '관리자 키를 입력하세요', false); return; }
  adminKey = key;

  showLoading('인원 목록 불러오는 중…');
  fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ type: 'admin_list', adminKey }) })
    .then(r => r.json())
    .then(res => {
      hideLoading();
      if (!res.ok) { showMsg('msg-key', res.error || '인증 실패', false); adminKey = ''; return; }
      fullList = res.list || [];
      document.getElementById('section-key').style.display = 'none';
      document.getElementById('section-list').style.display = 'block';
      renderList();
    })
    .catch(() => { hideLoading(); showMsg('msg-key', '서버 오류. 잠시 후 다시 시도하세요', false); });
}

// ── 1단계: 부서별 목록 렌더 ──
function renderList() {
  const q = document.getElementById('inp-search').value.trim().toLowerCase();
  const filtered = q ? fullList.filter(p => p.name.toLowerCase().includes(q)) : fullList;

  const byDept = {};
  filtered.forEach(p => {
    if (!byDept[p.dept]) byDept[p.dept] = [];
    byDept[p.dept].push(p);
  });
  const deptNames = Object.keys(byDept).sort((a, b) => {
    const ka = deptSortKey(a), kb = deptSortKey(b);
    if (ka !== kb) return ka - kb;
    return a.localeCompare(b);
  });

  const wrap = document.getElementById('dept-groups');
  wrap.innerHTML = '';

  if (deptNames.length === 0) {
    wrap.innerHTML = '<div class="empty-hint">검색 결과가 없습니다</div>';
    return;
  }

  deptNames.forEach(dept => {
    const people = byDept[dept].sort((a,b) => a.name.localeCompare(b.name));
    const group = document.createElement('div');
    group.className = 'dept-group';

    const header = document.createElement('div');
    header.className = 'dept-header';
    header.innerHTML = `<span>${dept} <span class="count">(${people.length}명)</span></span><span class="arrow">▾</span>`;

    const list = document.createElement('div');
    list.className = 'person-list';
    list.innerHTML = people.map(p =>
      `<div class="person-item" onclick="selectPerson('${p.name.replace(/'/g,"\\'")}')">
        <span class="p-name">${p.name}<span class="p-no">${p.no ? '· 사번 ' + p.no : ''}</span></span>
        <span class="p-arrow">›</span>
      </div>`
    ).join('');

    header.onclick = () => {
      header.classList.toggle('collapsed');
      list.classList.toggle('collapsed');
    };

    group.appendChild(header);
    group.appendChild(list);
    wrap.appendChild(group);
  });
}

// ── 인원 선택 → 상세 조회 ──
function selectPerson(name) {
  showLoading('근태 데이터 조회 중…');
  fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ type: 'admin_lookup', adminKey, name }) })
    .then(r => r.json())
    .then(res => {
      hideLoading();
      if (!res.ok) { alert(res.error || '조회 실패'); return; }
      renderResult(res);
    })
    .catch(() => { hideLoading(); alert('서버 오류로 조회 실패'); });
}

function renderResult(res) {
  currentName = res.name;
  allRows  = res.rows || [];
  userInfo = res.userInfo || {};
  leaveRows = res.leaveRows || [];

  document.getElementById('section-list').style.display = 'none';
  document.getElementById('user-banner').style.display = 'flex';
  document.getElementById('banner-name').textContent = res.name + ' 님';
  document.getElementById('banner-info').textContent =
    [userInfo.dept, userInfo.no ? '사번 ' + userInfo.no : ''].filter(Boolean).join(' | ');

  const mSet = new Set();
  allRows.forEach(r => {
    const d = String(r['근무일자'] || '');
    if (d.length >= 7) mSet.add(d.slice(0,7));
  });
  months = Array.from(mSet).sort().reverse();
  currentMonth = months[0] || '';

  switchMainTab('daily');
  renderMonthTabs();
  renderTable(currentMonth);
  document.getElementById('section-result').style.display = 'block';
  window.scrollTo(0, 0);
}

function backToList() {
  document.getElementById('section-result').style.display = 'none';
  document.getElementById('user-banner').style.display = 'none';
  document.getElementById('section-list').style.display = 'block';
  currentName = ''; allRows = []; months = []; currentMonth = ''; leaveRows = [];
}

function switchMainTab(view) {
  document.querySelectorAll('.main-tab').forEach(b => b.classList.remove('active'));
  document.querySelector(`.main-tab[data-view="${view}"]`).classList.add('active');
  document.getElementById('daily-view').style.display = view === 'daily' ? 'block' : 'none';
  document.getElementById('leave-view').style.display  = view === 'leave' ? 'block' : 'none';
  if (view === 'leave') renderLeaveTable();
}

function renderLeaveTable() {
  const grid = document.getElementById('leave-summary-grid');
  grid.innerHTML = '';
  const counts = {};
  LEAVE_CODES.forEach(c => counts[c] = 0);
  leaveRows.forEach(r => {
    if (counts.hasOwnProperty(r['근태코드'])) counts[r['근태코드']] += parseFloat(r['근태횟수']) || 0;
  });
  LEAVE_CODES.forEach(c => {
    if (!counts[c]) return;
    const el = document.createElement('div');
    el.className = 'summary-item';
    el.innerHTML = `<div class="s-label">${c}</div><div class="s-value">${counts[c]}</div>`;
    grid.appendChild(el);
  });

  document.getElementById('leave-thead').innerHTML =
    '<tr><th>근태일</th><th>요일</th><th>근태코드</th><th>횟수</th><th>시간</th><th>비고</th></tr>';

  const tbody = document.getElementById('leave-tbody');
  if (leaveRows.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" style="color:#888;">사용 내역이 없습니다</td></tr>';
    return;
  }
  tbody.innerHTML = leaveRows.map(r => `
    <tr>
      <td>${r['근태일']||''}</td>
      <td>${r['요일']||''}</td>
      <td>${r['근태코드']||''}</td>
      <td>${r['근태횟수']||''}</td>
      <td>${r['근태시간']||''}</td>
      <td>${r['비고']||''}</td>
    </tr>`).join('');
}

function renderMonthTabs() {
  const wrap = document.getElementById('month-tabs');
  wrap.innerHTML = '';
  months.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'month-tab' + (m === currentMonth ? ' active' : '');
    btn.textContent = m;
    btn.onclick = () => {
      currentMonth = m;
      renderMonthTabs();
      renderTable(m);
    };
    wrap.appendChild(btn);
  });
}

function renderTable(month) {
  const rows = allRows.filter(r => String(r['근무일자'] || '').startsWith(month));
  const sums = {};
  SUM_COLS.forEach(c => sums[c] = 0);
  rows.forEach(r => SUM_COLS.forEach(c => { sums[c] += parseFloat(r[c]) || 0; }));

  const grid = document.getElementById('summary-grid');
  grid.innerHTML = '';
  SUM_COLS.forEach(c => {
    const v = sums[c];
    if (v === 0) return;
    const el = document.createElement('div');
    el.className = 'summary-item';
    el.innerHTML = `<div class="s-label">${c}</div><div class="s-value">${fmt(v)}</div>`;
    grid.appendChild(el);
  });

  const thead = document.getElementById('result-thead');
  thead.innerHTML = '';
  const trh = document.createElement('tr');
  SHOW_COLS.forEach(h => {
    const th = document.createElement('th');
    th.textContent = h;
    trh.appendChild(th);
  });
  thead.appendChild(trh);

  const tbody = document.getElementById('result-tbody');
  tbody.innerHTML = '';
  const days = ['일','월','화','수','목','금','토'];

  rows.forEach(r => {
    const tr = document.createElement('tr');
    SHOW_COLS.forEach(h => {
      const td = document.createElement('td');
      const val = r[h];
      if (h === '근무일자') {
        if (val) {
          const d = new Date(val + 'T00:00:00+09:00');
          td.textContent = `${d.getMonth()+1}/${d.getDate()}(${days[d.getDay()]})`;
        }
      } else if (SUM_COLS.includes(h)) {
        const n = parseFloat(val) || 0;
        td.textContent = n === 0 ? '' : fmt(n);
      } else {
        td.textContent = (val === null || val === undefined) ? '' : String(val);
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });

  if (rows.length > 0) {
    const tr = document.createElement('tr');
    tr.className = 'sum-row';
    SHOW_COLS.forEach((h, i) => {
      const td = document.createElement('td');
      if (i === 0) td.textContent = '계';
      else if (SUM_COLS.includes(h) && sums[h] > 0) td.textContent = fmt(sums[h]);
      else td.textContent = '';
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  }
}
</script>
</body>
</html>
