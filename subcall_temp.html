<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>입차 호출</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Malgun Gothic', sans-serif; background: #eaf4ee; min-height: 100vh; padding: 16px 16px 130px; }
  .wrap { max-width: 560px; margin: 0 auto; }

  /* 수신자 섹션 하단 고정 */
  .receiver-fixed {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #eaf4ee;
    padding: 8px 16px 12px;
    box-shadow: 0 -2px 8px rgba(0,0,0,0.08);
    z-index: 50;
  }
  .receiver-fixed .wrap { margin: 0 auto; }

  .header { background: #2c7a4b; color: #fff; padding: 14px 16px; border-radius: 8px 8px 0 0; font-size: 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
  .btn-refresh { background: rgba(255,255,255,0.25); border: none; color: #fff; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-family: inherit; }

  .list { background: #fff; border-radius: 0 0 8px 8px; min-height: 100px; }

  /* 카드 아이템 */
  .item {
    display: flex;
    align-items: stretch;
    padding: 14px;
    border-bottom: 1px solid #f0f0f0;
    gap: 12px;
  }
  .item:last-child { border-bottom: none; }

  .info { flex: 1; display: flex; flex-direction: column; gap: 7px; }

  /* 품목명 - 가장 크게, 상단 */
  .grade-name {
    font-size: 17px;
    font-weight: bold;
    color: #1a1a1a;
  }

  /* 나머지 4줄 정보 */
  .row {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 14px;
    color: #333;
  }
  .row-icon { font-size: 15px; }
  .row-label { color: #888; font-size: 12px; min-width: 28px; }
  .row-val { font-size: 14px; color: #222; }
  .row-val.car { color: #3a6ea5; font-weight: bold; font-size: 15px; }
  .row-val.time { color: #999; font-size: 13px; }

  /* 호출 버튼 - 세로 꽉 채움 */
  .btn-call {
    padding: 0 18px;
    background: #e07b20;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    white-space: nowrap;
    font-family: inherit;
    align-self: stretch;
    min-width: 60px;
  }
  .btn-call:hover { background: #c06010; }
  .btn-call:disabled { background: #ccc; cursor: not-allowed; }

  .empty { text-align: center; color: #aaa; padding: 40px 16px; font-size: 14px; }
  .loading { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 40px; color: #888; font-size: 13px; }
  .spin { width: 20px; height: 20px; border: 3px solid #ddd; border-top-color: #2c7a4b; border-radius: 50%; animation: sp 0.7s linear infinite; }
  @keyframes sp { to { transform: rotate(360deg); } }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(16px); background: #222; color: #fff; padding: 9px 18px; border-radius: 20px; font-size: 13px; opacity: 0; transition: all 0.25s; z-index: 99; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.ok { background: #2c7a4b; }
  .toast.err { background: #c0392b; }
</style>
<script>
(function() {
  const ua = navigator.userAgent.toLowerCase();
  const isMobile = /android|iphone|ipad|ipod|mobile|tablet/.test(ua);
  if (!isMobile) {
    document.body.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:'Malgun Gothic',sans-serif;background:#eaf4ee;text-align:center;padding:20px;">
        <div style="font-size:48px;margin-bottom:16px;">📵</div>
        <div style="font-size:18px;font-weight:bold;color:#333;margin-bottom:8px;">모바일에서만 접속 가능합니다</div>
        <div style="font-size:13px;color:#888;">스마트폰으로 접속해 주세요</div>
      </div>`;
  }
})();
</script>
</head>
<body>
<div class="wrap">
  <div class="header">
    📞 입차 호출
    <button class="btn-refresh" onclick="load()">↺ 새로고침</button>
  </div>
  <div class="list" id="list">
    <div class="loading"><div class="spin"></div>불러오는 중...</div>
  </div>
</div>

<!-- 수신자 관리 - 하단 고정 -->
<div class="receiver-fixed">
  <div class="wrap">
    <div class="header" style="border-radius:8px 8px 0 0;background:#4a6fa5;padding:10px 14px;font-size:13px;">
      🔔 등록 알림 수신자
      <button onclick="toggleReceiver()" id="btnToggle"
        style="background:rgba(255,255,255,0.25);border:none;color:#fff;padding:3px 10px;border-radius:4px;cursor:pointer;font-size:12px;font-family:inherit;">▲ 접기</button>
    </div>
    <div id="receiverPanel" style="background:#fff;border-radius:0 0 8px 8px;padding:10px 14px;">
      <div style="display:flex;gap:8px;margin-bottom:8px;">
        <input type="tel" id="newPhone" placeholder="010-0000-0000" maxlength="13"
          oninput="fmtPhone(this)"
          style="flex:1;padding:7px 10px;border:1px solid #ccc;border-radius:4px;font-size:14px;font-family:inherit;"
        >
        <button onclick="addReceiver()" style="padding:7px 14px;background:#4a6fa5;color:#fff;border:none;border-radius:4px;font-size:13px;font-weight:bold;cursor:pointer;white-space:nowrap;">추가</button>
      </div>
      <div id="receiverList"><div class="loading"><div class="spin"></div></div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const GAS = 'https://script.google.com/macros/s/AKfycbzwqT58dzzjYS6C3u-1GkPSLYmjVBrTRFjZnrrqMMuvUwta17FwL9lsv-HuBFmVFsb3/exec';

window.onload = () => { load(); loadReceivers(); };

// 자동 새로고침: 30초마다
// setInterval(load, 30000);

// 수신자 패널 접기/펼치기
function toggleReceiver() {
  const panel = document.getElementById('receiverPanel');
  const btn   = document.getElementById('btnToggle');
  if (panel.style.display === 'none') {
    panel.style.display = '';
    btn.textContent = '▲ 접기';
    document.body.style.paddingBottom = '130px';
  } else {
    panel.style.display = 'none';
    btn.textContent = '▼ 펼치기';
    document.body.style.paddingBottom = '48px';
  }
}

async function load() {
  const el = document.getElementById('list');
  el.innerHTML = '<div class="loading"><div class="spin"></div>불러오는 중...</div>';
  try {
    const r = await fetch(GAS + '?action=list');
    const d = await r.json();
    if (!d.rows?.length) { el.innerHTML = '<div class="empty">대기 중인 항목 없음</div>'; return; }
    el.innerHTML = d.rows.map(row => {
      const carnum   = row.carnum  || '';
      const vendor   = row.vendorName || '';
      const phone    = row.phone   || '';
      const grade    = row.grade   || row.product || '';
      const memo     = row.memo    || '';
      const dateStr  = row.date    ? String(row.date).slice(0,16) : '';
      const safeVendor = vendor.replace(/'/g, "\\'");
      const safeGrade  = grade.replace(/'/g, "\\'");
      const safeCar    = carnum.replace(/'/g, "\\'");

      return `
      <div class="item" id="item-${row.rowIndex}">
        <div class="info">
          <div class="grade-name">${grade || '-'}</div>
          ${carnum ? `<div class="row"><span class="row-icon">🚛</span><span class="row-val car">${carnum}</span></div>` : ''}
          <div class="row"><span class="row-icon">🏢</span><span class="row-val">${vendor}</span></div>
          <div class="row"><span class="row-icon">📱</span><span class="row-val">${phone}</span></div>
          ${dateStr ? `<div class="row"><span class="row-icon">🕐</span><span class="row-val time">${dateStr}</span></div>` : ''}
          ${memo ? `<div class="row"><span class="row-icon">📝</span><span class="row-val time">${memo}</span></div>` : ''}
        </div>
        <button class="btn-call"
          onclick="call(this, ${row.rowIndex}, '${phone}', '${safeVendor}', '${safeCar}', '${safeGrade}')">
          호출
        </button>
      </div>`;
    }).join('');
  } catch(e) {
    el.innerHTML = '<div class="empty" style="color:#c0392b">로드 실패</div>';
  }
}

async function call(btn, rowIndex, phone, vendorName, carnum, grade) {
  if (!confirm(`${vendorName}에게 입차 호출 문자를 발송할까요?`)) return;
  btn.disabled = true; btn.textContent = '발송중...';
  try {
    const r = await fetch(GAS, {
      method: 'POST',
      body: JSON.stringify({ action: 'sms', rowIndex, phone, vendorName, carnum, grade })
    });
    const d = await r.json();
    if (d.status === 'ok') {
      toast('호출 완료!', 'ok');
      document.getElementById(`item-${rowIndex}`)?.remove();
      if (!document.querySelector('.item')) {
        document.getElementById('list').innerHTML = '<div class="empty">대기 중인 항목 없음</div>';
      }
    } else {
      toast('실패: ' + (d.message || ''), 'err');
      btn.disabled = false; btn.textContent = '호출';
    }
  } catch(e) {
    toast('오류: ' + e.message, 'err');
    btn.disabled = false; btn.textContent = '호출';
  }
}

// ── 수신자 관리
async function loadReceivers() {
  const el = document.getElementById('receiverList');
  try {
    const r = await fetch(GAS + '?action=getReceivers');
    const d = await r.json();
    const list = d.receivers || [];
    if (!list.length) {
      el.innerHTML = '<div style="color:#bbb;font-size:13px;text-align:center;padding:12px;">등록된 수신자 없음</div>';
      return;
    }
    el.innerHTML = list.map((p, i) => `
      <div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f5f5f5;" id="recv-${i}">
        <span style="font-size:14px;">${p}</span>
        <button onclick="removeReceiver('${p}')" style="background:none;border:none;color:#e74c3c;font-size:18px;cursor:pointer;padding:0 4px;">×</button>
      </div>`).join('');
  } catch(e) {
    el.innerHTML = '<div style="color:#e74c3c;font-size:13px;text-align:center;padding:12px;">로드 실패</div>';
  }
}

async function addReceiver() {
  const input = document.getElementById('newPhone');
  const phone = input.value.trim();
  if (phone.length < 10) { toast('번호를 확인하세요', 'err'); return; }
  try {
    const r = await fetch(GAS, {
      method: 'POST',
      body: JSON.stringify({ action: 'addReceiver', phone })
    });
    const d = await r.json();
    if (d.status === 'ok') { input.value = ''; loadReceivers(); toast('추가됨', 'ok'); }
    else toast('실패: ' + (d.message||''), 'err');
  } catch(e) { toast('오류', 'err'); }
}

async function removeReceiver(phone) {
  if (!confirm(`${phone} 삭제할까요?`)) return;
  try {
    const r = await fetch(GAS, {
      method: 'POST',
      body: JSON.stringify({ action: 'removeReceiver', phone })
    });
    const d = await r.json();
    if (d.status === 'ok') { loadReceivers(); toast('삭제됨', 'ok'); }
    else toast('실패', 'err');
  } catch(e) { toast('오류', 'err'); }
}

function fmtPhone(input) {
  let v = input.value.replace(/\D/g,'');
  if (v.length <= 3) input.value = v;
  else if (v.length <= 7) input.value = v.slice(0,3)+'-'+v.slice(3);
  else input.value = v.slice(0,3)+'-'+v.slice(3,7)+'-'+v.slice(7,11);
}

function toast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 2200);
}
</script>
</body>
</html>
