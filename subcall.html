<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>입차 호출</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Malgun Gothic', sans-serif; background: #eaf4ee; min-height: 100vh; padding: 16px; }
  .header { background: #2c7a4b; color: #fff; padding: 14px 16px; border-radius: 8px 8px 0 0; font-size: 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
  .btn-refresh { background: rgba(255,255,255,0.25); border: none; color: #fff; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-family: inherit; }
  .wrap { max-width: 560px; margin: 0 auto; }
  .list { background: #fff; border-radius: 0 0 8px 8px; min-height: 100px; }

  .item { display: flex; align-items: center; padding: 12px 14px; border-bottom: 1px solid #f0f0f0; gap: 12px; }
  .item:last-child { border-bottom: none; }
  .info { flex: 1; }
  .vendor { font-size: 14px; font-weight: bold; color: #1a1a1a; }
  .tags { display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
  .tag { font-size: 11px; background: #eef6f1; color: #2c7a4b; padding: 2px 8px; border-radius: 10px; }
  .tag.car { background: #eef2ff; color: #3a6ea5; }
  .btn-call { padding: 7px 16px; background: #2c7a4b; color: #fff; border: none; border-radius: 4px; font-size: 13px; font-weight: bold; cursor: pointer; white-space: nowrap; font-family: inherit; }
  .btn-call:hover { background: #1e5c36; }
  .btn-call:disabled { background: #ccc; cursor: not-allowed; }

  .empty { text-align: center; color: #aaa; padding: 40px 16px; font-size: 14px; }
  .loading { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 40px; color: #888; font-size: 13px; }
  .spin { width: 20px; height: 20px; border: 3px solid #ddd; border-top-color: #2c7a4b; border-radius: 50%; animation: sp 0.7s linear infinite; }
  @keyframes sp { to { transform: rotate(360deg); } }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(16px); background: #222; color: #fff; padding: 9px 18px; border-radius: 20px; font-size: 13px; opacity: 0; transition: all 0.25s; z-index: 99; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.ok { background: #2c7a4b; }
  .toast.err { background: #c0392b; }
</style>
<script>
(function() {
  const ua = navigator.userAgent.toLowerCase();
  const isMobile = /android|iphone|ipad|ipod|mobile|tablet/.test(ua);
  if (!isMobile) {
    document.body.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:'Malgun Gothic',sans-serif;background:#eaf4ee;text-align:center;padding:20px;">
        <div style="font-size:48px;margin-bottom:16px;">📵</div>
        <div style="font-size:18px;font-weight:bold;color:#333;margin-bottom:8px;">모바일에서만 접속 가능합니다</div>
        <div style="font-size:13px;color:#888;">스마트폰으로 접속해 주세요</div>
      </div>`;
  }
})();
</script>
</head>
<body>
<div class="wrap">
  <div class="header">
    📞 입차 호출
    <button class="btn-refresh" onclick="load()">↺ 새로고침</button>
  </div>
  <div class="list" id="list">
    <div class="loading"><div class="spin"></div>불러오는 중...</div>
  </div>
</div>
<!-- 수신자 관리 -->
<div class="wrap" style="margin-top:12px;">
  <div class="header" style="border-radius:8px 8px 0 0;background:#4a6fa5;">
    🔔 등록 알림 수신자
  </div>
  <div style="background:#fff;border-radius:0 0 8px 8px;padding:14px;">
    <div style="display:flex;gap:8px;margin-bottom:12px;">
      <input type="tel" id="newPhone" placeholder="010-0000-0000" maxlength="13"
        oninput="fmtPhone(this)"
        style="flex:1;padding:8px 10px;border:1px solid #ccc;border-radius:4px;font-size:14px;font-family:inherit;"
      >
      <button onclick="addReceiver()" style="padding:8px 16px;background:#4a6fa5;color:#fff;border:none;border-radius:4px;font-size:13px;font-weight:bold;cursor:pointer;white-space:nowrap;">추가</button>
    </div>
    <div id="receiverList"><div class="loading"><div class="spin"></div></div></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script>
const GAS = 'https://script.google.com/macros/s/AKfycbzGT-6Q2YNAMbXlFPyb44U8_rf8IAF4YOQq9tU5F6aYKyKfLD8nHA1z0gy-sSAQrDiI/exec';

window.onload = () => { load(); loadReceivers(); };

async function load() {
  const el = document.getElementById('list');
  el.innerHTML = '<div class="loading"><div class="spin"></div>불러오는 중...</div>';
  try {
    const r = await fetch(GAS + '?action=list');
    const d = await r.json();
    if (!d.rows?.length) { el.innerHTML = '<div class="empty">대기 중인 항목 없음</div>'; return; }
    el.innerHTML = d.rows.map(row => `
      <div class="item" id="item-${row.rowIndex}">
        <div class="info">
          <div class="vendor">${row.vendorName}</div>
          <div class="tags">
            ${row.carnum ? `<span class="tag car">🚛 ${row.carnum}</span>` : ''}
            <span class="tag">📦 ${row.grade || row.product}</span>
            <span class="tag">📱 ${row.phone}</span>
            ${row.memo ? `<span class="tag">📝 ${row.memo}</span>` : ''}
            ${row.date ? `<span class="tag" style="color:#aaa;">🕐 ${row.date}</span>` : ''}
          </div>
        </div>
        <button class="btn-call" onclick="call(this, ${row.rowIndex}, '${row.phone}', '${row.vendorName}', '${row.carnum||''}', '${row.grade||row.product}')">호출</button>
      </div>`).join('');
  } catch(e) {
    el.innerHTML = '<div class="empty" style="color:#c0392b">로드 실패</div>';
  }
}

async function call(btn, rowIndex, phone, vendorName, carnum, grade) {
  if (!confirm(`${vendorName}에게 입차 호출 문자를 발송할까요?`)) return;
  btn.disabled = true; btn.textContent = '발송중...';
  try {
    const r = await fetch(GAS, {
      method: 'POST',
      body: JSON.stringify({ action: 'sms', rowIndex, phone, vendorName, carnum, grade })
    });
    const d = await r.json();
    if (d.status === 'ok') {
      toast('호출 완료!', 'ok');
      // 해당 항목 제거
      document.getElementById(`item-${rowIndex}`)?.remove();
      if (!document.querySelector('.item')) {
        document.getElementById('list').innerHTML = '<div class="empty">대기 중인 항목 없음</div>';
      }
    } else {
      toast('실패: ' + (d.message || ''), 'err');
      btn.disabled = false; btn.textContent = '호출';
    }
  } catch(e) {
    toast('오류: ' + e.message, 'err');
    btn.disabled = false; btn.textContent = '호출';
  }
}

// ── 수신자 관리
async function loadReceivers() {
  const el = document.getElementById('receiverList');
  try {
    const r = await fetch(GAS + '?action=getReceivers');
    const d = await r.json();
    const list = d.receivers || [];
    if (!list.length) {
      el.innerHTML = '<div style="color:#bbb;font-size:13px;text-align:center;padding:12px;">등록된 수신자 없음</div>';
      return;
    }
    el.innerHTML = list.map((p, i) => `
      <div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f5f5f5;" id="recv-${i}">
        <span style="font-size:14px;">${p}</span>
        <button onclick="removeReceiver('${p}')" style="background:none;border:none;color:#e74c3c;font-size:18px;cursor:pointer;padding:0 4px;">×</button>
      </div>`).join('');
  } catch(e) {
    el.innerHTML = '<div style="color:#e74c3c;font-size:13px;text-align:center;padding:12px;">로드 실패</div>';
  }
}

async function addReceiver() {
  const input = document.getElementById('newPhone');
  const phone = input.value.trim();
  if (phone.length < 10) { toast('번호를 확인하세요', 'err'); return; }
  try {
    const r = await fetch(GAS, {
      method: 'POST',
      body: JSON.stringify({ action: 'addReceiver', phone })
    });
    const d = await r.json();
    if (d.status === 'ok') { input.value = ''; loadReceivers(); toast('추가됨', 'ok'); }
    else toast('실패: ' + (d.message||''), 'err');
  } catch(e) { toast('오류', 'err'); }
}

async function removeReceiver(phone) {
  if (!confirm(`${phone} 삭제할까요?`)) return;
  try {
    const r = await fetch(GAS, {
      method: 'POST',
      body: JSON.stringify({ action: 'removeReceiver', phone })
    });
    const d = await r.json();
    if (d.status === 'ok') { loadReceivers(); toast('삭제됨', 'ok'); }
    else toast('실패', 'err');
  } catch(e) { toast('오류', 'err'); }
}

function fmtPhone(input) {
  let v = input.value.replace(/\D/g,'');
  if (v.length <= 3) input.value = v;
  else if (v.length <= 7) input.value = v.slice(0,3)+'-'+v.slice(3);
  else input.value = v.slice(0,3)+'-'+v.slice(3,7)+'-'+v.slice(7,11);
}

function toast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 2200);
}
</script>
</body>
</html>
