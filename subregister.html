<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>부자재 입고 등록</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; background: #edf1f7; min-height: 100vh; padding: 20px 16px; color: #333; }
  .container { max-width: 480px; margin: 0 auto; background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); overflow: hidden; }

  /* 헤더 */
  .header { background: #3a6ea5; color: #fff; padding: 20px 20px 18px; }
  .header-title { font-size: 17px; font-weight: bold; letter-spacing: -0.3px; }
  .header-sub { font-size: 12px; color: rgba(255,255,255,0.65); margin-top: 3px; }

  .form-body { padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .field { display: flex; flex-direction: column; gap: 6px; }

  /* 라벨 */
  label { font-size: 13px; color: #444; font-weight: bold; }

  input[type="text"], input[type="tel"], textarea {
    border: 1px solid #d8dde6; border-radius: 8px; padding: 10px 12px;
    font-size: 14px; font-family: inherit; color: #333; background: #fff; width: 100%; outline: none;
    transition: border-color 0.15s;
  }
  input:focus, textarea:focus { border-color: #3a6ea5; background: #fafcff; }
  textarea { resize: vertical; min-height: 68px; }

  /* 선택 행 - outline 버튼 */
  .select-row { display: flex; gap: 8px; align-items: center; }
  .select-row input { flex: 1; background: #f7f9fc; cursor: pointer; color: #555; }
  .btn-popup {
    white-space: nowrap; padding: 10px 14px;
    background: #fff; color: #3a6ea5;
    border: 1.5px solid #3a6ea5; border-radius: 8px;
    font-size: 13px; font-weight: bold; cursor: pointer;
    transition: background 0.15s;
  }
  .btn-popup:hover { background: #eef4ff; }

  /* 등록 버튼 - solid, 크고 둥글게 */
  .btn-save {
    width: 100%; padding: 14px; background: #3a6ea5; color: #fff;
    border: none; border-radius: 10px; font-size: 16px; font-weight: bold;
    cursor: pointer; margin-top: 4px; letter-spacing: 0.5px;
    transition: background 0.15s;
  }
  .btn-save:hover { background: #2d5a8a; }
  .btn-save:disabled { background: #b0b8c8; cursor: not-allowed; }

  /* 팝업 공통 */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; align-items: center; justify-content: center; }
  .overlay.active { display: flex; }
  .popup { background: #fff; border-radius: 10px; width: 340px; max-height: 70vh; display: flex; flex-direction: column; box-shadow: 0 4px 24px rgba(0,0,0,0.18); overflow: hidden; }
  .popup-header { background: #3a6ea5; color: #fff; padding: 13px 16px; font-size: 14px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
  .popup-close { background: none; border: none; color: #fff; font-size: 18px; cursor: pointer; }
  .popup-search { padding: 10px 12px; border-bottom: 1px solid #eee; }
  .popup-search input { width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; }
  .popup-list { overflow-y: auto; flex: 1; }
  .popup-item { padding: 10px 14px; cursor: pointer; font-size: 13px; border-bottom: 1px solid #f5f5f5; }
  .popup-item:hover { background: #eef4ff; }
  .popup-item.pinned { color: #3a6ea5; font-weight: bold; background: #f0f6ff; }
  .popup-item.pinned:hover { background: #ddeeff; }

  /* 스피너 */
  .spinner-wrap { display: flex; align-items: center; justify-content: center; padding: 30px; gap: 10px; color: #888; font-size: 13px; }
  .spinner { width: 22px; height: 22px; border: 3px solid #ddd; border-top-color: #3a6ea5; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 토스트 */
  .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px); background: #333; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: all 0.3s; z-index: 999; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { background: #27ae60; }
  .toast.error { background: #e74c3c; }
  .loading-text { color: #888; font-size: 13px; text-align: center; padding: 20px; }

  /* 대기 목록 */
  .wait-section { background: #f7f9fc; border-top: 1px solid #e8ecf2; padding: 14px 16px 16px; }
  .wait-header { font-size: 13px; font-weight: bold; color: #555; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .wait-count-badge { background: #3a6ea5; color: #fff; font-size: 11px; padding: 1px 7px; border-radius: 10px; font-weight: bold; }
  .btn-reload { background: none; border: 1px solid #ccc; border-radius: 4px; padding: 2px 8px; cursor: pointer; font-size: 12px; color: #666; margin-left: auto; }
  .btn-reload:hover { background: #eee; }

  /* 대기 카드 */
  .wait-card { background: #fff; border: 1px solid #e4e9f0; border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; }
  .wait-card:last-child { margin-bottom: 0; }
  .wait-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .wait-grade-name { font-size: 14px; font-weight: bold; color: #222; }
  .wait-car-badge { font-size: 12px; font-weight: bold; color: #3a6ea5; background: #eef4ff; padding: 2px 8px; border-radius: 6px; }
  .wait-card-info { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 4px; }
  .wait-vendor-name { font-size: 13px; color: #444; }
  .wait-time { font-size: 11px; color: #aaa; }
  .wait-empty { text-align: center; color: #bbb; font-size: 13px; padding: 20px; }

  .btn-del { background: none; border: 1px solid #e0a0a0; color: #c0392b; border-radius: 4px; padding: 3px 9px; font-size: 11px; cursor: pointer; white-space: nowrap; }
  .btn-del:hover { background: #ffeaea; }
  .otp-row { display: flex; gap: 6px; padding: 8px 0 2px; align-items: center; }
  .btn-otp-confirm { padding: 5px 12px; background: #3a6ea5; color: #fff; border: none; border-radius: 4px; font-size: 12px; cursor: pointer; }
  .btn-otp-cancel { padding: 5px 10px; background: #eee; color: #555; border: none; border-radius: 4px; font-size: 12px; cursor: pointer; }
  .wait-loading { display: flex; justify-content: center; padding: 16px; }
  .spin { width: 18px; height: 18px; border: 2px solid #ddd; border-top-color: #3a6ea5; border-radius: 50%; animation: spin 0.7s linear infinite; }
</style>
<script>
(function() {
  const ua = navigator.userAgent.toLowerCase();
  const isMobile = /android|iphone|ipad|ipod|mobile|tablet/.test(ua);
  if (!isMobile) {
    document.body.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:'Malgun Gothic',sans-serif;background:#edf1f7;text-align:center;padding:20px;">
        <div style="font-size:48px;margin-bottom:16px;">📵</div>
        <div style="font-size:18px;font-weight:bold;color:#333;margin-bottom:8px;">모바일에서만 접속 가능합니다</div>
        <div style="font-size:13px;color:#888;">스마트폰으로 접속해 주세요</div>
      </div>`;
  }
})();
</script>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="header-title">부자재 입고 등록</div>
    <div class="header-sub">반월공장 부자재 차량 사전 등록</div>
  </div>
  <div class="form-body">

    <div class="field">
      <label>거래처</label>
      <div class="select-row">
        <input type="text" id="vendorName" placeholder="거래처를 선택하세요" readonly onclick="openVendorPopup()">
        <input type="hidden" id="vendorCode">
        <button class="btn-popup" onclick="openVendorPopup()">선택</button>
      </div>
    </div>

    <div class="field">
      <label>품목</label>
      <div class="select-row">
        <input type="text" id="gradeName" placeholder="품목을 선택하세요" readonly onclick="openGradePopup()">
        <input type="hidden" id="gradeCode">
        <button class="btn-popup" onclick="openGradePopup()">선택</button>
      </div>
    </div>

    <div class="field">
      <label>차량번호 (뒤 4자리)</label>
      <input type="text" id="carnum" placeholder="예: 1234" maxlength="4" pattern="[0-9]*" inputmode="numeric">
    </div>

    <div class="field">
      <label>핸드폰 번호</label>
      <input type="tel" id="phone" placeholder="010-0000-0000" maxlength="13" oninput="formatPhone(this)">
    </div>

    <div class="field">
      <label>메모</label>
      <textarea id="memo" placeholder="특이사항 등 메모 입력"></textarea>
    </div>

    <button class="btn-save" id="btnSave" onclick="saveData()">등록</button>
  </div>

  <div class="wait-section">
    <div class="wait-header">
      대기 중 <span id="waitCount"></span>
      <button class="btn-reload" onclick="loadList()">↺ 새로고침</button>
    </div>
    <div id="waitList"><div class="wait-loading"><div class="spin"></div></div></div>
  </div>
</div>

<!-- 거래처 팝업 -->
<div class="overlay" id="vendorOverlay">
  <div class="popup">
    <div class="popup-header">
      거래처 선택
      <button class="popup-close" onclick="closeVendorPopup()">✕</button>
    </div>
    <div class="popup-search">
      <input type="text" id="vendorSearch" placeholder="거래처명 검색..." oninput="filterVendors()">
    </div>
    <div class="popup-list" id="vendorList">
      <div class="spinner-wrap"><div class="spinner"></div>불러오는 중...</div>
    </div>
  </div>
</div>

<!-- 품목 팝업 -->
<div class="overlay" id="gradeOverlay">
  <div class="popup">
    <div class="popup-header">
      품목 선택
      <button class="popup-close" onclick="closeGradePopup()">✕</button>
    </div>
    <div class="popup-search">
      <input type="text" id="gradeSearch" placeholder="품목명 검색..." oninput="filterGrades()">
    </div>
    <div class="popup-list" id="gradeList">
      <div class="spinner-wrap"><div class="spinner"></div>불러오는 중...</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzwqT58dzzjYS6C3u-1GkPSLYmjVBrTRFjZnrrqMMuvUwta17FwL9lsv-HuBFmVFsb3/exec';
const SCALE_BASE = 'https://scale.dygroup.co.kr:8443/banwol/admin';

const PINNED_GRADES = ['폐합성수지'];

let allVendors = [];
let allGrades  = [];

window.onload = async () => {
  await loadGrades();
  await loadList();
};

// ── 대기 목록 ──────────────────────────────────
async function loadList() {
  const el = document.getElementById('waitList');
  const countEl = document.getElementById('waitCount');
  try {
    const r = await fetch(GAS_URL + '?action=list');
    const d = await r.json();
    const rows = d.rows || [];
    countEl.innerHTML = rows.length
      ? `<span class="wait-count-badge">${rows.length}</span>`
      : '';
    if (!rows.length) {
      el.innerHTML = '<div class="wait-empty">대기 중인 항목 없음</div>';
      return;
    }
    el.innerHTML = rows.map(row => `
      <div class="wait-card" id="wi-${row.rowIndex}">
        <div class="wait-card-top">
          <span class="wait-grade-name">${row.grade || row.product || '-'}</span>
          ${row.carnum ? `<span class="wait-car-badge">${row.carnum}</span>` : ''}
        </div>
        <div class="wait-card-info">
          <span class="wait-vendor-name">${row.vendorName}</span>
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="wait-time">${String(row.date).slice(0,16)}</span>
            <button class="btn-del" onclick="requestDelete(${row.rowIndex}, '${row.phone}')">삭제</button>
          </div>
        </div>
      </div>
      <div class="otp-row" id="otp-${row.rowIndex}" style="display:none;">
        <input type="number" id="otp-input-${row.rowIndex}" placeholder="인증번호 6자리" maxlength="6"
          style="flex:1;padding:6px 8px;border:1px solid #ccc;border-radius:4px;font-size:13px;">
        <button class="btn-otp-confirm" onclick="confirmDelete(${row.rowIndex}, '${row.phone}')">확인</button>
        <button class="btn-otp-cancel" onclick="cancelDelete(${row.rowIndex})">취소</button>
      </div>`).join('');
  } catch(e) {
    el.innerHTML = '<div class="wait-empty">로드 실패</div>';
  }
}

// ── 품목 로드 ──────────────────────────────────
async function loadGrades() {
  try {
    const scaleUrl = encodeURIComponent(`${SCALE_BASE}/getGradesList.do?product=01`);
    const res = await fetch(`${GAS_URL}?action=proxy&url=${scaleUrl}`);
    const data = await res.json();
    const list = Array.isArray(data) ? data : (data.list || []);
    allGrades = list.map(g => ({
      code: String(g.RCODEX ?? g.code ?? g),
      name: String(g.NMCODX ?? g.name ?? g)
    }));
    allGrades = sortWithPinned(allGrades);
  } catch(e) {
    allGrades = [];
  }
}

function sortWithPinned(list) {
  const pinned = list.filter(g => PINNED_GRADES.includes(g.name));
  const rest   = list.filter(g => !PINNED_GRADES.includes(g.name));
  return [...pinned, ...rest];
}

// ── 품목 팝업 ──────────────────────────────────
async function openGradePopup() {
  document.getElementById('gradeOverlay').classList.add('active');
  document.getElementById('gradeSearch').value = '';
  if (allGrades.length === 0) await loadGrades();
  renderGrades(allGrades);
  setTimeout(() => document.getElementById('gradeSearch').focus(), 100);
}

function closeGradePopup() {
  document.getElementById('gradeOverlay').classList.remove('active');
}

function renderGrades(list) {
  const listEl = document.getElementById('gradeList');
  if (list.length === 0) {
    listEl.innerHTML = '<div class="loading-text">검색 결과 없음</div>';
    return;
  }
  listEl.innerHTML = list.map(g => {
    const isPinned = PINNED_GRADES.includes(g.name);
    return `<div class="popup-item ${isPinned ? 'pinned' : ''}"
      onclick="selectGrade('${g.code}','${g.name.replace(/'/g,"\\'")}')">
      ${isPinned ? '📌 ' : ''}${g.name}
    </div>`;
  }).join('');
}

function filterGrades() {
  const q = document.getElementById('gradeSearch').value.trim();
  if (!q) { renderGrades(allGrades); return; }
  renderGrades(allGrades.filter(g => g.name.includes(q) || g.code.includes(q)));
}

function selectGrade(code, name) {
  document.getElementById('gradeCode').value = code;
  document.getElementById('gradeName').value = name;
  closeGradePopup();
}

// ── 거래처 팝업 ──────────────────────────────────
async function openVendorPopup() {
  document.getElementById('vendorOverlay').classList.add('active');
  document.getElementById('vendorSearch').value = '';
  if (allVendors.length === 0) await loadVendors();
  else renderVendors(allVendors);
  setTimeout(() => document.getElementById('vendorSearch').focus(), 100);
}

function closeVendorPopup() {
  document.getElementById('vendorOverlay').classList.remove('active');
}

async function loadVendors() {
  const listEl = document.getElementById('vendorList');
  listEl.innerHTML = '<div class="spinner-wrap"><div class="spinner"></div>불러오는 중...</div>';
  try {
    const scaleUrl = encodeURIComponent(`${SCALE_BASE}/getCustomList.do?product=00&searchCustomCode=`);
    const res = await fetch(`${GAS_URL}?action=proxy&url=${scaleUrl}`);
    const data = await res.json();
    const list = data.list || [];
    if (list.length === 0) throw new Error('거래처 없음');
    allVendors = list.map(v => ({ code: v.CUSTCD, name: v.JSNAME }));
    renderVendors(allVendors);
  } catch(e) {
    listEl.innerHTML = '<div class="loading-text" style="color:#e74c3c">거래처 로드 실패</div>';
  }
}

function renderVendors(list) {
  const listEl = document.getElementById('vendorList');
  if (list.length === 0) { listEl.innerHTML = '<div class="loading-text">검색 결과 없음</div>'; return; }
  listEl.innerHTML = list.map(v => `
    <div class="popup-item" onclick="selectVendor('${v.code}','${v.name.replace(/'/g,"\\'")}')">
      <span style="color:#aaa;font-size:11px;margin-right:8px;">${v.code}</span>${v.name}
    </div>`).join('');
}

function filterVendors() {
  const q = document.getElementById('vendorSearch').value.trim();
  if (!q) { renderVendors(allVendors); return; }
  renderVendors(allVendors.filter(v => v.name.includes(q) || v.code.includes(q)));
}

function selectVendor(code, name) {
  document.getElementById('vendorCode').value = code;
  document.getElementById('vendorName').value = name;
  closeVendorPopup();
}

// ── 저장 ──────────────────────────────────────
function formatPhone(input) {
  let v = input.value.replace(/\D/g,'');
  if (v.length <= 3) input.value = v;
  else if (v.length <= 7) input.value = v.slice(0,3)+'-'+v.slice(3);
  else input.value = v.slice(0,3)+'-'+v.slice(3,7)+'-'+v.slice(7,11);
}

async function saveData() {
  const vendorCode = document.getElementById('vendorCode').value;
  const vendorName = document.getElementById('vendorName').value;
  const gradeCode  = document.getElementById('gradeCode').value;
  const gradeName  = document.getElementById('gradeName').value;
  const carnum     = document.getElementById('carnum').value.trim();
  const phone      = document.getElementById('phone').value;
  const memo       = document.getElementById('memo').value;

  if (!vendorName) { showToast('거래처를 선택하세요', 'error'); return; }
  if (!gradeName)  { showToast('품목을 선택하세요', 'error'); return; }
  if (!carnum)     { showToast('차량번호를 입력하세요', 'error'); return; }
  if (!phone)      { showToast('핸드폰 번호를 입력하세요', 'error'); return; }

  const btn = document.getElementById('btnSave');
  btn.disabled = true; btn.textContent = '등록 중...';

  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'save',
        date: new Date().toLocaleString('ko-KR', {timeZone:'Asia/Seoul'}),
        vendorCode, vendorName,
        product: '부자재',
        grade: gradeName,
        carnum, phone, memo
      })
    });
    const result = await res.json();
    if (result.status === 'ok') {
      showToast('등록 완료!', 'success');
      document.getElementById('vendorCode').value = '';
      document.getElementById('vendorName').value = '';
      document.getElementById('gradeCode').value  = '';
      document.getElementById('gradeName').value  = '';
      document.getElementById('carnum').value = '';
      document.getElementById('phone').value  = '';
      document.getElementById('memo').value   = '';
      await loadList();
    } else {
      showToast('저장 실패: ' + (result.message || ''), 'error');
    }
  } catch(e) {
    showToast('오류: ' + e.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = '등록';
  }
}

// ── OTP / 삭제 ────────────────────────────────
async function requestDelete(rowIndex, phone) {
  const btn = document.querySelector(`#wi-${rowIndex} .btn-del`);
  btn.disabled = true; btn.textContent = '발송중...';
  try {
    const r = await fetch(`${GAS_URL}?action=sendOtp&phone=${encodeURIComponent(phone)}&rowIndex=${rowIndex}`);
    const d = await r.json();
    if (d.status === 'ok') {
      document.getElementById(`otp-${rowIndex}`).style.display = 'flex';
      showToast('인증번호를 발송했습니다', 'success');
      btn.textContent = '재발송';
      btn.disabled = false;
    } else {
      showToast('발송 실패: ' + (d.message||''), 'error');
      btn.textContent = '삭제'; btn.disabled = false;
    }
  } catch(e) {
    showToast('오류: ' + e.message, 'error');
    btn.textContent = '삭제'; btn.disabled = false;
  }
}

async function confirmDelete(rowIndex, phone) {
  const otp = document.getElementById(`otp-input-${rowIndex}`).value.trim();
  if (otp.length !== 6) { showToast('6자리 입력하세요', 'error'); return; }
  try {
    const r = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'deleteRow', rowIndex, otp, phone })
    });
    const d = await r.json();
    if (d.status === 'ok') {
      document.getElementById(`wi-${rowIndex}`)?.remove();
      document.getElementById(`otp-${rowIndex}`)?.remove();
      showToast('삭제되었습니다', 'success');
      await loadList();
    } else {
      showToast(d.message || '인증 실패', 'error');
    }
  } catch(e) {
    showToast('오류: ' + e.message, 'error');
  }
}

function cancelDelete(rowIndex) {
  document.getElementById(`otp-${rowIndex}`).style.display = 'none';
  const btn = document.querySelector(`#wi-${rowIndex} .btn-del`);
  if (btn) { btn.textContent = '삭제'; btn.disabled = false; }
}

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => { t.className = 'toast'; }, 2500);
}

document.getElementById('vendorOverlay').addEventListener('click', function(e) {
