<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>부자재 입고 등록</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; background: #f0f2f5; min-height: 100vh; padding: 24px 16px; color: #333; }
  .container { max-width: 480px; margin: 0 auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow: hidden; }
  .header { background: #3a6ea5; color: #fff; padding: 16px 20px; font-size: 15px; font-weight: bold; }
  .form-body { padding: 20px; display: flex; flex-direction: column; gap: 14px; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  label { font-size: 12px; color: #666; font-weight: bold; }
  select, input[type="text"], input[type="tel"], textarea {
    border: 1px solid #d0d0d0; border-radius: 4px; padding: 8px 10px;
    font-size: 14px; font-family: inherit; color: #333; background: #fff; width: 100%; outline: none;
  }
  select:focus, input:focus, textarea:focus { border-color: #3a6ea5; }
  textarea { resize: vertical; min-height: 72px; }
  .vendor-row { display: flex; gap: 8px; align-items: center; }
  .vendor-row input { flex: 1; background: #f7f7f7; }
  .btn-vendor { white-space: nowrap; padding: 8px 14px; background: #5a8ac6; color: #fff; border: none; border-radius: 4px; font-size: 13px; cursor: pointer; }
  .btn-vendor:hover { background: #3a6ea5; }
  .btn-save { width: 100%; padding: 12px; background: #3a6ea5; color: #fff; border: none; border-radius: 4px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 4px; }
  .btn-save:hover { background: #2d5a8a; }
  .btn-save:disabled { background: #aaa; cursor: not-allowed; }

  /* 팝업 */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
  .overlay.active { display: flex; }
  .popup { background: #fff; border-radius: 6px; width: 340px; max-height: 70vh; display: flex; flex-direction: column; box-shadow: 0 4px 20px rgba(0,0,0,0.2); overflow: hidden; }
  .popup-header { background: #3a6ea5; color: #fff; padding: 12px 16px; font-size: 14px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
  .popup-close { background: none; border: none; color: #fff; font-size: 18px; cursor: pointer; }
  .popup-search { padding: 10px 12px; border-bottom: 1px solid #eee; }
  .popup-search input { width: 100%; padding: 7px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
  .popup-list { overflow-y: auto; flex: 1; }
  .popup-item { padding: 9px 14px; cursor: pointer; font-size: 13px; display: flex; gap: 10px; border-bottom: 1px solid #f5f5f5; }
  .popup-item:hover { background: #eef4ff; }
  .popup-item .code { color: #888; font-size: 11px; min-width: 36px; }

  /* 스피너 */
  .spinner-wrap { display: flex; align-items: center; justify-content: center; padding: 30px; gap: 10px; color: #888; font-size: 13px; }
  .spinner { width: 22px; height: 22px; border: 3px solid #ddd; border-top-color: #3a6ea5; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 토스트 */
  .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px); background: #333; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: all 0.3s; z-index: 999; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { background: #27ae60; }
  .toast.error { background: #e74c3c; }
  .loading-text { color: #888; font-size: 13px; text-align: center; padding: 20px; }

  .wait-section { border-top: 1px solid #eee; padding: 14px 20px; }
  .wait-header { font-size: 13px; font-weight: bold; color: #555; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .btn-reload { background: none; border: 1px solid #ccc; border-radius: 4px; padding: 2px 8px; cursor: pointer; font-size: 12px; color: #666; margin-left: auto; }
  .btn-reload:hover { background: #f5f5f5; }
  .wait-item { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid #f5f5f5; gap: 8px; }
  .wait-item:last-child { border-bottom: none; }
  .wait-car { font-size: 13px; font-weight: bold; color: #3a6ea5; min-width: 36px; }
  .wait-vendor { font-size: 13px; color: #333; flex: 1; }
  .wait-grade { font-size: 11px; color: #888; background: #f0f4f8; padding: 2px 7px; border-radius: 10px; }
  .wait-time { font-size: 11px; color: #aaa; white-space: nowrap; }
  .wait-empty { text-align: center; color: #bbb; font-size: 13px; padding: 16px; }
  .btn-del { background: none; border: 1px solid #e0a0a0; color: #c0392b; border-radius: 4px; padding: 2px 8px; font-size: 11px; cursor: pointer; white-space: nowrap; }
  .btn-del:hover { background: #ffeaea; }
  .otp-row { display: flex; gap: 6px; padding: 6px 0 8px; align-items: center; }
  .btn-otp-confirm { padding: 5px 12px; background: #3a6ea5; color: #fff; border: none; border-radius: 4px; font-size: 12px; cursor: pointer; }
  .btn-otp-cancel { padding: 5px 10px; background: #eee; color: #555; border: none; border-radius: 4px; font-size: 12px; cursor: pointer; }
  .wait-loading { display: flex; justify-content: center; padding: 16px; }
  .spin { width: 18px; height: 18px; border: 2px solid #ddd; border-top-color: #3a6ea5; border-radius: 50%; animation: spin 0.7s linear infinite; }
</style>
<script>
// 모바일 체크
(function() {
  const ua = navigator.userAgent.toLowerCase();
  const isMobile = /android|iphone|ipad|ipod|mobile|tablet/.test(ua);
  if (!isMobile) {
    document.body.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:'Malgun Gothic',sans-serif;background:#f0f2f5;text-align:center;padding:20px;">
        <div style="font-size:48px;margin-bottom:16px;">📵</div>
        <div style="font-size:18px;font-weight:bold;color:#333;margin-bottom:8px;">모바일에서만 접속 가능합니다</div>
        <div style="font-size:13px;color:#888;">스마트폰으로 접속해 주세요</div>
      </div>`;
  }
})();
</script>
</head>
<body>

<div class="container">
  <div class="header">📋 부자재 입고 등록</div>
  <div class="form-body">
    <div class="field">
      <label>거래처</label>
      <div class="vendor-row">
        <input type="text" id="vendorName" placeholder="거래처를 선택하세요" readonly>
        <input type="hidden" id="vendorCode">
        <button class="btn-vendor" onclick="openVendorPopup()">선택</button>
      </div>
    </div>
    <div class="field">
      <label>품목</label>
      <select id="grade">
        <option value="999">전체</option>
      </select>
    </div>
    <div class="field">
      <label>차량번호 (뒤 4자리)</label>
      <input type="text" id="carnum" placeholder="예: 1234" maxlength="4" pattern="[0-9]*" inputmode="numeric">
    </div>
    <div class="field">
      <label>핸드폰 번호</label>
      <input type="tel" id="phone" placeholder="010-0000-0000" maxlength="13" oninput="formatPhone(this)">
    </div>
    <div class="field">
      <label>메모</label>
      <textarea id="memo" placeholder="특이사항 등 메모 입력"></textarea>
    </div>
    <button class="btn-save" id="btnSave" onclick="saveData()">등록</button>
  </div>

  <!-- 대기 목록 -->
  <div class="wait-section">
    <div class="wait-header">
      ⏳ 대기 중 <span id="waitCount"></span>
      <button class="btn-reload" onclick="loadList()">↺</button>
    </div>
    <div id="waitList"><div class="wait-loading"><div class="spin"></div></div></div>
  </div>
</div>

<!-- 거래처 팝업 -->
<div class="overlay" id="vendorOverlay">
  <div class="popup">
    <div class="popup-header">
      거래처 선택
      <button class="popup-close" onclick="closeVendorPopup()">✕</button>
    </div>
    <div class="popup-search">
      <input type="text" id="vendorSearch" placeholder="거래처명 검색..." oninput="filterVendors()">
    </div>
    <div class="popup-list" id="vendorList">
      <div class="spinner-wrap"><div class="spinner"></div>불러오는 중...</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbysTo7JrGWxXQ9XGp32XFMAwDoAD62tvz3gklo9shf0D4Lolkxgrcz4WvaLa1D6OtQZ/exec';
const SCALE_BASE = 'https://scale.dygroup.co.kr:8443/banwol/admin';

let allVendors = [];

window.onload = async () => {
  await loadGrades();
  await loadList();
};

async function loadList() {
  const el = document.getElementById('waitList');
  const countEl = document.getElementById('waitCount');
  try {
    const r = await fetch(GAS_URL + '?action=list');
    const d = await r.json();
    const rows = d.rows || [];
    countEl.textContent = rows.length ? `(${rows.length})` : '';
    if (!rows.length) {
      el.innerHTML = '<div class="wait-empty">대기 중인 항목 없음</div>';
      return;
    }
    el.innerHTML = rows.map(row => `
      <div class="wait-item" id="wi-${row.rowIndex}">
        <span class="wait-car">${row.carnum || '-'}</span>
        <span class="wait-vendor">${row.vendorName}</span>
        <span class="wait-grade">${row.grade || row.product}</span>
        <span class="wait-time">${String(row.date).slice(0,16)}</span>
        <button class="btn-del" onclick="requestDelete(${row.rowIndex}, '${row.phone}')">삭제</button>
      </div>
      <div class="otp-row" id="otp-${row.rowIndex}" style="display:none;">
        <input type="number" id="otp-input-${row.rowIndex}" placeholder="인증번호 6자리" maxlength="6"
          style="flex:1;padding:6px 8px;border:1px solid #ccc;border-radius:4px;font-size:13px;">
        <button class="btn-otp-confirm" onclick="confirmDelete(${row.rowIndex}, '${row.phone}')">확인</button>
        <button class="btn-otp-cancel" onclick="cancelDelete(${row.rowIndex})">취소</button>
      </div>`).join('');
  } catch(e) {
    el.innerHTML = '<div class="wait-empty">로드 실패</div>';
  }
}

// 품목(등급) 로드
async function loadGrades() {
  try {
    const scaleUrl = encodeURIComponent(`${SCALE_BASE}/getGradesList.do?product=01`);
    const res = await fetch(`${GAS_URL}?action=proxy&url=${scaleUrl}`);
    const data = await res.json();
    const sel = document.getElementById('grade');
    sel.innerHTML = '';
    const list = Array.isArray(data) ? data : (data.list || []);
    list.forEach(g => {
      const opt = document.createElement('option');
      opt.value = g.RCODEX ?? g.code ?? g;
      opt.textContent = g.NMCODX ?? g.name ?? g;
      sel.appendChild(opt);
    });
    if (list.length === 0) sel.innerHTML = '<option value="999">전체</option>';
  } catch(e) {
    document.getElementById('grade').innerHTML = '<option value="999">전체</option>';
  }
}

// 거래처 팝업
async function openVendorPopup() {
  document.getElementById('vendorOverlay').classList.add('active');
  document.getElementById('vendorSearch').value = '';
  if (allVendors.length === 0) await loadVendors();
  else renderVendors(allVendors);
}

function closeVendorPopup() {
  document.getElementById('vendorOverlay').classList.remove('active');
}

async function loadVendors() {
  const listEl = document.getElementById('vendorList');
  listEl.innerHTML = '<div class="spinner-wrap"><div class="spinner"></div>불러오는 중...</div>';
  try {
    const scaleUrl = encodeURIComponent(`${SCALE_BASE}/getCustomList.do?product=00&searchCustomCode=`);
    const res = await fetch(`${GAS_URL}?action=proxy&url=${scaleUrl}`);
    const data = await res.json();
    const list = data.list || [];
    if (list.length === 0) throw new Error('거래처 없음');
    allVendors = list.map(v => ({ code: v.CUSTCD, name: v.JSNAME }));
    renderVendors(allVendors);
  } catch(e) {
    listEl.innerHTML = '<div class="loading-text" style="color:#e74c3c">거래처 로드 실패</div>';
  }
}

function renderVendors(list) {
  const listEl = document.getElementById('vendorList');
  if (list.length === 0) { listEl.innerHTML = '<div class="loading-text">검색 결과 없음</div>'; return; }
  listEl.innerHTML = list.map(v => `
    <div class="popup-item" onclick="selectVendor('${v.code}','${v.name.replace(/'/g,"\\'")}')">
      <span class="code">${v.code}</span>
      <span>${v.name}</span>
    </div>`).join('');
}

function filterVendors() {
  const q = document.getElementById('vendorSearch').value.trim();
  if (!q) { renderVendors(allVendors); return; }
  renderVendors(allVendors.filter(v => v.name.includes(q) || v.code.includes(q)));
}

function selectVendor(code, name) {
  document.getElementById('vendorCode').value = code;
  document.getElementById('vendorName').value = name;
  closeVendorPopup();
}

function formatPhone(input) {
  let v = input.value.replace(/\D/g,'');
  if (v.length <= 3) input.value = v;
  else if (v.length <= 7) input.value = v.slice(0,3)+'-'+v.slice(3);
  else input.value = v.slice(0,3)+'-'+v.slice(3,7)+'-'+v.slice(7,11);
}

async function saveData() {
  const vendorCode = document.getElementById('vendorCode').value;
  const vendorName = document.getElementById('vendorName').value;
  const grade = document.getElementById('grade').value;
  const gradeName = document.getElementById('grade').selectedOptions[0]?.textContent || grade;
  const carnum = document.getElementById('carnum').value.trim();
  const phone = document.getElementById('phone').value;
  const memo = document.getElementById('memo').value;

  if (!vendorName) { showToast('거래처를 선택하세요', 'error'); return; }
  if (!carnum) { showToast('차량번호를 입력하세요', 'error'); return; }
  if (!phone) { showToast('핸드폰 번호를 입력하세요', 'error'); return; }

  const btn = document.getElementById('btnSave');
  btn.disabled = true; btn.textContent = '등록 중...';

  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'save',
        date: new Date().toLocaleString('ko-KR', {timeZone:'Asia/Seoul'}),
        vendorCode, vendorName,
        product: '부자재',
        grade: gradeName,
        carnum, phone, memo
      })
    });
    const result = await res.json();
    if (result.status === 'ok') {
      showToast('등록 완료!', 'success');
      document.getElementById('vendorCode').value = '';
      document.getElementById('vendorName').value = '';
      document.getElementById('carnum').value = '';
      document.getElementById('phone').value = '';
      document.getElementById('memo').value = '';
      await loadList();
    } else {
      showToast('저장 실패: ' + (result.message || ''), 'error');
    }
  } catch(e) {
    showToast('오류: ' + e.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = '등록';
  }
}

async function requestDelete(rowIndex, phone) {
  const btn = document.querySelector(`#wi-${rowIndex} .btn-del`);
  btn.disabled = true; btn.textContent = '발송중...';
  try {
    const r = await fetch(`${GAS_URL}?action=sendOtp&phone=${encodeURIComponent(phone)}&rowIndex=${rowIndex}`);
    const d = await r.json();
    if (d.status === 'ok') {
      document.getElementById(`otp-${rowIndex}`).style.display = 'flex';
      showToast('인증번호를 발송했습니다', 'success');
      btn.textContent = '재발송';
      btn.disabled = false;
    } else {
      showToast('발송 실패: ' + (d.message||''), 'error');
      btn.textContent = '삭제'; btn.disabled = false;
    }
  } catch(e) {
    showToast('오류: ' + e.message, 'error');
    btn.textContent = '삭제'; btn.disabled = false;
  }
}

async function confirmDelete(rowIndex, phone) {
  const otp = document.getElementById(`otp-input-${rowIndex}`).value.trim();
  if (otp.length !== 6) { showToast('6자리 입력하세요', 'error'); return; }
  try {
    const r = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'deleteRow', rowIndex, otp, phone })
    });
    const d = await r.json();
    if (d.status === 'ok') {
      document.getElementById(`wi-${rowIndex}`)?.remove();
      document.getElementById(`otp-${rowIndex}`)?.remove();
      showToast('삭제되었습니다', 'success');
      await loadList();
    } else {
      showToast(d.message || '인증 실패', 'error');
    }
  } catch(e) {
    showToast('오류: ' + e.message, 'error');
  }
}

function cancelDelete(rowIndex) {
  document.getElementById(`otp-${rowIndex}`).style.display = 'none';
  const btn = document.querySelector(`#wi-${rowIndex} .btn-del`);
  if (btn) { btn.textContent = '삭제'; btn.disabled = false; }
}

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => { t.className = 'toast'; }, 2500);
}

document.getElementById('vendorOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeVendorPopup();
});
</script>
</body>
</html>
