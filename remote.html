<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>반월지원파트 원격 지원</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: #f0f2f5;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .wrap {
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }

  .logo {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: #2563eb;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .logo svg { width: 22px; height: 22px; stroke: #fff; }

  .header-text h1 { font-size: 17px; font-weight: 700; color: #111; }
  .header-text p { font-size: 12px; color: #6b7280; margin-top: 2px; }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    color: #9ca3af;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin: 20px 0 8px;
  }

  .pc-card {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .pc-info { flex: 1; min-width: 0; }

  .pc-name {
    font-size: 14px;
    font-weight: 600;
    color: #111;
    margin-bottom: 4px;
  }

  .pc-meta {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .pc-id {
    font-size: 12px;
    color: #6b7280;
    font-family: monospace;
    letter-spacing: 0.03em;
  }

  .pc-pw {
    font-size: 12px;
    color: #9ca3af;
  }

  .btn-connect {
    padding: 9px 16px;
    background: #2563eb;
    color: #fff;
    border: none;
    border-radius: 9px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
  }

  .btn-connect:hover { background: #1d4ed8; }
  .btn-connect:active { transform: scale(0.97); }
  .btn-connect svg { width: 14px; height: 14px; stroke: #fff; }

  .notice {
    background: #fffbeb;
    border: 1px solid #fde68a;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 12px;
    color: #92400e;
    line-height: 1.7;
    margin-top: 20px;
  }

  .notice b { font-weight: 700; }

  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(8px);
    background: #111;
    color: #fff;
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.25s, transform 0.25s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 999;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 400px) {
    .pc-name { font-size: 13px; }
    .btn-connect { padding: 8px 13px; font-size: 12px; }
  }
</style>
</head>
<body>

<div class="wrap">

  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>반월지원파트 원격 지원</h1>
      <p>신대양제지 반월공장 — HopToDesk 웹 접속</p>
    </div>
  </div>

  <div class="section-label">본공장</div>

  <div class="pc-card">
    <div class="pc-info">
      <div class="pc-name">계근대</div>
      <div class="pc-meta">
        <span class="pc-id">299 413 060</span>
        <span class="pc-pw">qwer@123</span>
      </div>
    </div>
    <button class="btn-connect" onclick="connect('299413060', '본공장 계근대')">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
      접속
    </button>
  </div>

  <div class="pc-card">
    <div class="pc-info">
      <div class="pc-name">TMS</div>
      <div class="pc-meta">
        <span class="pc-id">288 849 885</span>
        <span class="pc-pw">qwer@123</span>
      </div>
    </div>
    <button class="btn-connect" onclick="connect('288849885', '본공장 TMS')">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
      접속
    </button>
  </div>

  <div class="section-label">2공장</div>

  <div class="pc-card">
    <div class="pc-info">
      <div class="pc-name">계근대</div>
      <div class="pc-meta">
        <span class="pc-id">288 833 052</span>
        <span class="pc-pw">qwer@123</span>
      </div>
    </div>
    <button class="btn-connect" onclick="connect('288833052', '2공장 계근대')">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
      접속
    </button>
  </div>

  <div class="pc-card">
    <div class="pc-info">
      <div class="pc-name">TMS</div>
      <div class="pc-meta">
        <span class="pc-id">152 295 554</span>
        <span class="pc-pw">qwer@123</span>
      </div>
    </div>
    <button class="btn-connect" onclick="connect('152295554', '2공장 TMS')">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
      접속
    </button>
  </div>

  <div class="notice">
    <b>접속 방법</b><br>
    버튼 클릭 → ID 자동복사 + web.hoptodesk.com 열림<br>
    입력창에 붙여넣기(Ctrl+V / 길게눌러 붙여넣기) → Connect → 비밀번호 입력
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  function connect(id, name) {
    navigator.clipboard.writeText(id).then(() => {
      showToast('✓ ' + name + ' ID 복사됨 — 붙여넣기 후 Connect');
    }).catch(() => {
      showToast('ID: ' + id + ' — 직접 입력하세요');
    });
    setTimeout(() => window.open('https://web.hoptodesk.com', '_blank'), 300);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }
</script>
</body>
</html>
